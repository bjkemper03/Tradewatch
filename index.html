<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TRADEWATCH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500;700&display=swap');
:root {
  --bg:#0a0e1a;--card:#111827;--deep:#060a12;--border:#1e2535;
  --green:#00e676;--yellow:#ffd600;--red:#ff1744;--muted:#5a6a7e;--dim:#8892a4;--text:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spinner{width:28px;height:28px;border:3px solid var(--green);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2535;border-radius:2px}
#app{max-width:680px;margin:0 auto;padding-bottom:50px;}
.hdr{padding:18px 18px 0;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.5px;}
.logo span{color:var(--green);}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px;}
.sig-pill{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;}
.sig-dot{width:8px;height:8px;border-radius:50%;}
.tabs{display:flex;padding:14px 18px 0;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{flex:1 0 auto;padding:8px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;letter-spacing:1px;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tab.active{border-bottom-color:var(--green);color:var(--text);}
.content{padding:18px;}
.card{background:var(--card);border-radius:10px;padding:16px;margin-bottom:12px;}
.sec-label{font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.mc{background:var(--deep);border-radius:7px;padding:9px 11px;}
.mc-l{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;}
.mc-v{font-size:13px;font-weight:700;}
.score-row{margin-bottom:12px;}
.score-meta{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;}
.score-track{height:4px;background:#1e2535;border-radius:2px;}
.score-fill{height:100%;border-radius:2px;transition:width 1.2s ease;}
.btn{padding:11px;border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:2px;width:100%;transition:all .2s;}
.btn-green{background:var(--green);color:var(--bg);}
.btn-green:disabled{background:#1e2535;color:var(--muted);cursor:default;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline-green{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green);}
.btn-purple{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);color:#a78bfa;}
.btn-yellow{background:rgba(255,214,0,.12);border:1px solid rgba(255,214,0,.3);color:var(--yellow);}
input,select,textarea{width:100%;background:#1e2535;border:1px solid #2d3748;border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;outline:none;box-sizing:border-box;}
textarea{resize:vertical;min-height:80px;line-height:1.6;}
select{appearance:none;cursor:pointer;}
.field{margin-bottom:10px;}
.field label{font-size:9px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:4px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
/* Calendar */
.cal-row{display:flex;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;align-items:center;border:1px solid var(--border);background:var(--card);}
.cal-row.dte{background:rgba(255,214,0,.03);border-color:rgba(255,214,0,.2);}
.cal-day{min-width:32px;text-align:center;}
.cal-d{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;line-height:1;}
.cal-m{font-size:8px;color:var(--muted);}
.chip{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;letter-spacing:.5px;}
/* Sector cards */
.sector-card{background:var(--card);border-radius:9px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--border);}
.sector-card.up{border-left-color:var(--green);}
.sector-card.down{border-left-color:var(--red);}
.sector-card.flat{border-left-color:var(--yellow);}
.sector-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.sector-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;}
.sector-badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:10px;}
.sector-desc{font-size:10px;color:var(--muted);line-height:1.5;}
/* Leg builder */
.leg-row{display:flex;gap:6px;align-items:center;margin-bottom:7px;padding:10px;background:var(--deep);border-radius:8px;}
.leg-row.sell{border:1px solid rgba(255,23,68,.2);}
.leg-row.buy{border:1px solid rgba(0,230,118,.2);}
/* Trade cards */
.trade-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border);}
.trade-card.warn{border-color:rgba(255,23,68,.3);}
.leg-badge{display:inline-block;padding:4px 8px;border-radius:5px;font-size:10px;margin:0 3px 4px 0;}
.leg-badge.sell{background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.2);color:var(--red);}
.leg-badge.buy{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:var(--green);}
.t-actions{display:flex;gap:6px;margin-top:8px;}
.t-actions input{flex:1;}
.act-btn{padding:7px 10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border:none;white-space:nowrap;}
/* Analyze */
.res-hero{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;margin-bottom:14px;}
.res-circle{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace;font-weight:700;font-size:9px;letter-spacing:1px;}
/* Stats */
.strat-block{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.strat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.strat-name{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;}
.win-track{height:3px;background:#1e2535;border-radius:2px;margin-top:8px;}
.win-fill{height:100%;border-radius:2px;}
.strat-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.strat-pill{padding:5px 10px;border-radius:6px;font-size:9px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;font-family:'DM Mono',monospace;letter-spacing:.5px;transition:all .15s;}
.strat-pill.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08);}
.data-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:5px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:8px;font-size:11px;letter-spacing:1px;z-index:999;display:none;}
.fear-meter{height:8px;border-radius:4px;background:linear-gradient(to right,#ff1744,#ffd600,#00e676);position:relative;margin:10px 0;}
.fear-needle{position:absolute;top:-4px;width:4px;height:16px;background:white;border-radius:2px;transform:translateX(-50%);transition:left 1s ease;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><div class="logo">TRADE<span>WATCH</span></div><div class="logo-sub" id="today"></div></div>
    <div class="sig-pill" id="hdr-sig" style="display:none"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('signal')">SIGNAL</button>
    <button class="tab" onclick="showTab('calendar')">CALENDAR</button>
    <button class="tab" onclick="showTab('sectors')">SECTORS</button>
    <button class="tab" onclick="showTab('analyze')">ANALYZE</button>
    <button class="tab" onclick="showTab('trades')">TRADES</button>
    <button class="tab" onclick="showTab('stats')">STATS</button>
  </div>
  <div class="content">
    <div id="tab-signal"></div>
    <div id="tab-calendar" style="display:none"></div>
    <div id="tab-sectors" style="display:none"></div>
    <div id="tab-analyze" style="display:none"></div>
    <div id="tab-trades" style="display:none"></div>
    <div id="tab-stats" style="display:none"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const AV = 'J0BM2LMG9Z7SFZFV';
const TRADES_KEY = 'tw_trades_v4';
const CACHE_KEY = 'tw_market_cache';
const CACHE_TTL = 15 * 60 * 1000; // 15 min

// Historical seed data
const HIST = {
  totalTrades: 56, wins: 42, losses: 13, breakeven: 1,
  winRate: 76.36, avgWinPct: 51.71, avgLossPct: -47.56,
  totalPnl: 736, profitFactor: 2.84,
  note: 'Historical data: ~3 months ending May 2026'
};

// ── State ─────────────────────────────────────────────────────────────────────
let trades = JSON.parse(localStorage.getItem(TRADES_KEY) || '[]');
let mktData = null;
let azResult = null;
let formLegs = [];
let formStrat = 'PUT CREDIT SPREAD';

const STRATS = ['PUT CREDIT SPREAD','BWB / PUT RATIO','CASH SECURED PUT','COVERED CALL','CALL CREDIT SPREAD','IRON CONDOR','PUT DEBIT SPREAD','CALL DEBIT SPREAD','OTHER'];
const DEF_LEGS = {
  'PUT CREDIT SPREAD':[{a:'SELL',t:'PUT',n:1,s:''},{a:'BUY',t:'PUT',n:1,s:''}],
  'BWB / PUT RATIO':[{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'PUT',n:2,s:''},{a:'BUY',t:'PUT',n:1,s:''}],
  'CASH SECURED PUT':[{a:'SELL',t:'PUT',n:1,s:''}],
  'COVERED CALL':[{a:'SELL',t:'CALL',n:1,s:''}],
  'CALL CREDIT SPREAD':[{a:'SELL',t:'CALL',n:1,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'IRON CONDOR':[{a:'SELL',t:'PUT',n:1,s:''},{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'CALL',n:1,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'PUT DEBIT SPREAD':[{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'PUT',n:1,s:''}],
  'CALL DEBIT SPREAD':[{a:'BUY',t:'CALL',n:1,s:''},{a:'SELL',t:'CALL',n:1,s:''}],
  'OTHER':[{a:'BUY',t:'PUT',n:1,s:''}]
};

// ── Utilities ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const sc = s => s==='GREEN'?'#00e676':s==='YELLOW'?'#ffd600':'#ff1744';
const bc = s => s>=62?'#00e676':s>=42?'#ffd600':'#ff1744';
const cc = p => p>=7?'#00e676':p>=4?'#ffd600':'#ff1744';
const saveTrades = () => localStorage.setItem(TRADES_KEY, JSON.stringify(trades));

function toast(msg, dur=2500) {
  const t=$('toast'); t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none', dur);
}

function showTab(name) {
  const names=['signal','calendar','sectors','analyze','trades','stats'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  names.forEach(n=>$(`tab-${n}`).style.display=n===name?'block':'none');
  if(name==='trades') renderTrades();
  if(name==='stats') renderStats();
  if(name==='sectors') renderSectors();
  if(name==='calendar') renderCalendar();
}

function mc(label, value, color) {
  return `<div class="mc"><div class="mc-l">${label}</div><div class="mc-v" style="color:${color||'var(--text)'}">${value}</div></div>`;
}

function scoreBar(label, score, weight) {
  return `<div class="score-row">
    <div class="score-meta"><span style="color:var(--dim)">${label}</span><span style="color:${bc(score)}">${Math.round(score)}/100 · ${weight}</span></div>
    <div class="score-track"><div class="score-fill" style="width:${score}%;background:${bc(score)}"></div></div>
  </div>`;
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function scoreVix(level, chg, inverted) {
  let s=60;
  if(level<18)s+=15; else if(level<22)s+=5; else if(level<28)s-=8; else if(level<35)s-=22; else s-=40;
  if(chg>40)s-=30; else if(chg>25)s-=18; else if(chg>15)s-=8; else if(chg<-20)s+=10; else if(chg<-10)s+=5;
  if(inverted)s-=25;
  return Math.max(0,Math.min(100,s));
}
function scoreStructure(spy50, spy200, qqq50, breadth) {
  let s=55;
  if(spy50)s+=15; else s-=20;
  if(spy200)s+=10; else s-=12;
  if(qqq50)s+=10; else s-=10;
  if(breadth>65)s+=15; else if(breadth>50)s+=5; else if(breadth>35)s-=5; else s-=20;
  return Math.max(0,Math.min(100,s));
}
function scoreFearGreed(fg) {
  // 0=extreme fear, 100=extreme greed. Neutral ~50 is fine for sellers.
  // Extreme fear (<20) = bad. Extreme greed (>80) = complacent but ok.
  let s=60;
  if(fg<15)s-=30; else if(fg<25)s-=18; else if(fg<35)s-=8;
  else if(fg>85)s+=5; else if(fg>70)s+=8; else s+=5;
  return Math.max(0,Math.min(100,s));
}
function composite(vs, ss, fg, hasEvent) {
  const w = vs*0.40 + ss*0.35 + fg*0.20 + (hasEvent?0:5);
  if(Math.min(vs,ss)<25||w<38) return 'RED';
  if(Math.min(vs,ss)<45||w<58) return 'YELLOW';
  return 'GREEN';
}

// ── Data Fetchers ─────────────────────────────────────────────────────────────
async function fetchVIX() {
  try {
    // Yahoo Finance chart API - works without CORS issues from hosted pages
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=10d';
    const r = await fetch(url);
    const d = await r.json();
    const result = d.chart.result[0];
    const closes = result.indicators.quote[0].close;
    const timestamps = result.timestamp;
    const valid = closes.map((c,i)=>({c,t:timestamps[i]})).filter(x=>x.c!=null);
    const current = valid[valid.length-1].c;
    const prev5 = valid[Math.max(0,valid.length-6)].c;
    const chg = ((current-prev5)/prev5*100);
    const date = new Date(valid[valid.length-1].t*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return {level:parseFloat(current.toFixed(2)), chg:parseFloat(chg.toFixed(1)), date, ok:true};
  } catch(e) { return {level:20,chg:0,date:'N/A',ok:false}; }
}

async function fetchFearGreed() {
  try {
    const r = await fetch('https://production.dataviz.cnn.io/index/fearandgreed/graphdata');
    const d = await r.json();
    const score = Math.round(d.fear_and_greed.score);
    const rating = d.fear_and_greed.rating;
    return {score, rating, ok:true};
  } catch(e) {
    // Fallback: use AV RSI as proxy
    try {
      const url=`https://www.alphavantage.co/query?function=RSI&symbol=SPY&interval=daily&time_period=14&series_type=close&apikey=${AV}`;
      const r=await fetch(url);
      const d=await r.json();
      const rsiData=d['Technical Analysis: RSI'];
      if(!rsiData) return {score:50,rating:'Neutral',ok:false};
      const latest=Object.keys(rsiData).sort().reverse()[0];
      const rsi=parseFloat(rsiData[latest].RSI);
      const score=Math.round(rsi);
      const rating=score>70?'Greed':score>55?'Slight Greed':score>45?'Neutral':score>30?'Slight Fear':'Fear';
      return {score,rating,ok:false};
    } catch(e2){ return {score:50,rating:'Neutral',ok:false}; }
  }
}

async function fetchSPYData() {
  try {
    const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=SPY&apikey=${AV}&outputsize=compact`;
    const r=await fetch(url);
    const d=await r.json();
    const s=d['Time Series (Daily)'];
    if(!s) return {price:500,above50:true,above200:true,sma20:490,sma50:485,sma200:470};
    const dates=Object.keys(s).sort().reverse();
    const closes=dates.slice(0,200).map(dt=>parseFloat(s[dt]['4. close']));
    const price=closes[0];
    const sma20=closes.slice(0,20).reduce((a,b)=>a+b,0)/20;
    const sma50=closes.slice(0,50).reduce((a,b)=>a+b,0)/Math.min(50,closes.length);
    const sma200=closes.slice(0,200).reduce((a,b)=>a+b,0)/Math.min(200,closes.length);
    return {price:parseFloat(price.toFixed(2)),above50:price>sma50,above200:price>sma200,sma20:sma20.toFixed(2),sma50:sma50.toFixed(2),sma200:sma200.toFixed(2)};
  } catch(e){ return {price:500,above50:true,above200:true,sma20:490,sma50:485,sma200:470}; }
}

async function fetchQQQ() {
  try {
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/QQQ?interval=1d&range=60d`;
    const r=await fetch(url);
    const d=await r.json();
    const closes=d.chart.result[0].indicators.quote[0].close.filter(c=>c!=null);
    const price=closes[closes.length-1];
    const sma50=closes.slice(-50).reduce((a,b)=>a+b,0)/Math.min(50,closes.length);
    return {price:price.toFixed(2),above50:price>sma50};
  } catch(e){ return {price:400,above50:true}; }
}

async function fetchSectorData() {
  // Fetch sector ETF performance vs SPY using Yahoo Finance
  const sectors = [
    {ticker:'XLK',name:'Technology',desc:'Large-cap tech: Apple, Microsoft, Nvidia'},
    {ticker:'XLE',name:'Energy',desc:'Oil, gas, energy producers'},
    {ticker:'XLF',name:'Financials',desc:'Banks, insurance, brokerages'},
    {ticker:'XLV',name:'Healthcare',desc:'Pharma, biotech, medical devices'},
    {ticker:'XLY',name:'Consumer Disc.',desc:'Retail, autos, leisure'},
    {ticker:'XLI',name:'Industrials',desc:'Manufacturing, defense, aerospace'},
    {ticker:'XLC',name:'Comm. Services',desc:'Google, Meta, Netflix, telecom'},
    {ticker:'SOXX',name:'Semiconductors',desc:'Chips: Nvidia, AMD, Intel, AEHR'}
  ];
  const results = [];
  for(const sec of sectors) {
    try {
      const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sec.ticker}?interval=1d&range=5d`;
      const r=await fetch(url);
      const d=await r.json();
      const closes=d.chart.result[0].indicators.quote[0].close.filter(c=>c!=null);
      if(closes.length<2){results.push({...sec,chg:0,trend:'flat'});continue;}
      const chg=((closes[closes.length-1]-closes[0])/closes[0]*100);
      const trend=chg>1?'up':chg<-1?'down':'flat';
      results.push({...sec,chg:parseFloat(chg.toFixed(2)),trend});
    } catch(e){ results.push({...sec,chg:0,trend:'flat'}); }
  }
  return results;
}

async function loadMarketData(force=false) {
  // Check cache first
  if(!force) {
    try {
      const cached=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
      if(cached && Date.now()-cached.ts < CACHE_TTL) {
        mktData=cached.data; renderSignal(); return;
      }
    } catch(e){}
  }

  $('tab-signal').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:320px;gap:14px"><div class="spinner"></div><p style="color:var(--dim);font-size:11px;letter-spacing:2px">FETCHING LIVE DATA...</p><p style="font-size:9px;color:var(--muted)">VIX · Fear/Greed · SPY/QQQ</p></div>`;

  const [vix, fg, spy, qqq] = await Promise.all([fetchVIX(), fetchFearGreed(), fetchSPYData(), fetchQQQ()]);

  // Fetch sector data separately (can be slow)
  const sectors = await fetchSectorData();

  mktData = {vix, fg, spy, qqq, sectors, ts: Date.now()};
  localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(), data:mktData}));
  renderSignal();
}

function renderSignal() {
  if(!mktData) return;
  const {vix,fg,spy,qqq} = mktData;
  const vs = scoreVix(vix.level, vix.chg, false);
  const ss = scoreStructure(spy.above50, spy.above200, qqq.above50, 55);
  const fgs = scoreFearGreed(fg.score);

  // Only flag event if FOMC/CPI within 5 days
  const today=new Date();
  const criticalEvents=[{d:'2026-05-07'},{d:'2026-05-13'},{d:'2026-06-11'}];
  const hasEvent=criticalEvents.some(e=>{
    const days=Math.ceil((new Date(e.d+'T12:00:00')-today)/86400000);
    return days>=0&&days<=5;
  });

  const sig=composite(vs,ss,fgs,hasEvent);
  const col=sc(sig);

  // Update header pill
  const pill=$('hdr-sig');
  pill.style.display='flex';
  pill.style.background=col+'15';
  pill.style.border=`1px solid ${col}30`;
  pill.innerHTML=`<div class="sig-dot" style="background:${col};box-shadow:0 0 6px ${col}"></div><span style="color:${col}">${sig}</span>`;

function getGuidance(sig, vix, fg, spy) {
  if(sig==='GREEN') return `VIX at ${vix.level} is ${vix.level<20?'low — ideal for premium selling':'moderate and stable'}. Fear/Greed at ${fg.score} (${fg.rating}) shows ${fg.score>50?'normal market confidence':'cautious but not extreme fear'}. SPY is ${spy.above50?'above':'below'} its 50MA. Your 14-21 DTE put credit spreads and BWBs are well-positioned. Trade your normal size.`;
  if(sig==='YELLOW') return `Mixed conditions. VIX at ${vix.level}${vix.chg>10?` spiking +${vix.chg}% in 5 days — watch this closely`:' is elevated'}. Fear/Greed at ${fg.score} — ${fg.score<35?'fear is rising, spreads can gap against you quickly':'markets are uncertain'}. Consider sizing down 25-50%, stick to wider cushions, and prioritize closing positions near your profit target rather than holding for max.`;
  return `High risk environment. VIX at ${vix.level}${vix.chg>15?` and spiking fast (+${vix.chg}% in 5 days)`:''} with Fear/Greed at ${fg.score} (${fg.rating}). This is the environment that hurts premium sellers. Consider closing open positions, avoid opening new ones, and wait for conditions to stabilize. Your strategy works — protect the capital until the setup returns.`;
}

    const cushPct = price>0&&strikeNum>0 ? ((price-strikeNum)/price*100) : null;

    // Parse expiration
    let expDate=null;
    if(expRaw) {
      const parts=expRaw.includes('/')?expRaw.split('/'):null;
      if(parts&&parts.length===3) expDate=new Date(`${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}T12:00:00`);
    }

    // Earnings risk
    let eRisk=false, eDate=null;
    if(earnings) {
      eDate=earnings.date;

    azResult={tick,strat,strike,longStrike,expRaw,price,cushPct,delta:optData?.delta,iv:optData?.iv,eRisk,eDate,supports:levels.supports,resistances:levels.resistances,exitSignal:levels.supports[0]||null,credit,spreadWidth};

async function fetchQuote(ticker) {
  try {
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
    const r=await fetch(url);
    const d=await r.json();
    const q=d.chart.result[0].meta;
    return {price:parseFloat(q.regularMarketPrice||q.previousClose||0)};
  } catch(e){return {price:0};}
}

async function fetchLevels(ticker) {
  try {
    const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&apikey=${AV}&outputsize=compact`;
    const r=await fetch(url);
    const d=await r.json();
    const s=d['Time Series (Daily)'];
    if(!s)return{supports:[],resistances:[],sma20:0,sma50:0};
    const dates=Object.keys(s).sort().reverse().slice(0,60);
    const closes=dates.map(dt=>parseFloat(s[dt]['4. close']));
    const highs=dates.map(dt=>parseFloat(s[dt]['2. high']));
    const lows=dates.map(dt=>parseFloat(s[dt]['3. low']));
    const sma20=closes.slice(0,20).reduce((a,b)=>a+b,0)/20;
    const sma50=closes.slice(0,Math.min(50,closes.length)).reduce((a,b)=>a+b,0)/Math.min(50,closes.length);
    const supports=new Set([Math.round(sma20*2)/2,Math.round(sma50*2)/2]);
    const resistances=new Set();
    for(let i=2;i<Math.min(20,lows.length-2);i++){
      if(lows[i]<lows[i-1]&&lows[i]<lows[i+1]&&lows[i]<lows[i-2]&&lows[i]<lows[i+2])supports.add(Math.round(lows[i]*2)/2);
      if(highs[i]>highs[i-1]&&highs[i]>highs[i+1])resistances.add(Math.round(highs[i]*2)/2);
    }
    const price=closes[0];
    return {
      supports:[...supports].filter(s=>s<price).sort((a,b)=>b-a).slice(0,3),
      resistances:[...resistances].filter(r=>r>price).sort((a,b)=>a-b).slice(0,2),
      sma20:sma20.toFixed(2),sma50:sma50.toFixed(2)
    };
  } catch(e){return{supports:[],resistances:[],sma20:0,sma50:0};}
}

async function fetchEarnings(ticker) {
  try {
    const url=`https://www.alphavantage.co/query?function=EARNINGS_CALENDAR&symbol=${ticker}&horizon=3month&apikey=${AV}`;
    const r=await fetch(url);
    const text=await r.text();
    const lines=text.trim().split('\n');
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',');
      if(cols[0]?.toUpperCase()===ticker.toUpperCase())return{date:cols[2]};
    }
    return null;
  } catch(e){return null;}
}

async function fetchOptionDelta(ticker, strike, expRaw, strat) {
  try {
    const url=`https://www.alphavantage.co/query?function=REALTIME_OPTIONS&symbol=${ticker}&apikey=${AV}`;
    const r=await fetch(url);
    const d=await r.json();
    const opts=d.data||[];
    const isCall=strat.includes('CALL')&&!strat.includes('PUT');
    const type=isCall?'call':'put';
    const target=parseFloat(strike);
    const filtered=opts.filter(o=>o.type?.toLowerCase()===type);
    if(filtered.length===0)return null;
    const closest=filtered.reduce((p,c)=>Math.abs(parseFloat(c.strike)-target)<Math.abs(parseFloat(p.strike)-target)?c:p);
    return {
      delta:parseFloat(closest.delta||0),
      iv:parseFloat(closest.implied_volatility||0)*100,
      bid:parseFloat(closest.bid||0),
      ask:parseFloat(closest.ask||0)
    };
  } catch(e){return null;}
}

  showTab('trades');
  setTimeout(()=>{

    if(tog&&$('tf-form').style.display==='none')tog.click();
    setTimeout(()=>{
      if($('tf-tick'))$('tf-tick').value=azResult.tick;
      if($('tf-price'))$('tf-price').value=azResult.price?.toFixed(2)||'';
      if($('tf-exp'))$('tf-exp').value=azResult.expRaw||'';
      if($('tf-credit'))$('tf-credit').value=azResult.credit||'';
      if($('tf-exit'))$('tf-exit').value=azResult.exitSignal||'';
      if($('tf-notes'))$('tf-notes').value=`Pre-analyzed. Delta:${azResult.delta?.toFixed(2)||'N/A'} Width:$${azResult.spreadWidth||'?'}${azResult.eRisk?' ⚠ EARNINGS '+azResult.eDate:''}`;
      renderLegs();
    },50);
  },100);
}

// ── Trades Tab ────────────────────────────────────────────────────────────────
function renderTrades() {
  const open=trades.filter(t=>t.status==='OPEN');
  const closed=trades.filter(t=>t.status==='CLOSED');
  let html=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="sec-label" style="margin:0">OPEN · ${open.length}</div>
      <button id="tf-toggle" onclick="toggleForm()" style="padding:7px 14px;background:var(--green);border:none;border-radius:6px;color:var(--bg);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;font-weight:700">+ LOG TRADE</button>
    </div>
    <div id="tf-form" style="display:none">
      <div class="card" style="margin-bottom:16px">
        <div class="field"><label>STRATEGY</label>
          <div class="strat-pills" id="strat-pills">
            ${STRATS.map(s=>`<button class="strat-pill ${s===formStrat?'active':''}" onclick="pickStrat('${s}')">${s}</button>`).join('')}
          </div>
        </div>
        <div class="fg2">
          <div class="field"><label>TICKER</label><input id="tf-tick" placeholder="NVDA" oninput="this.value=this.value.toUpperCase()"></div>
          <div class="field"><label>STOCK PRICE AT OPEN $</label><input id="tf-price" placeholder="118.50" type="number" step="0.01"></div>
        </div>
        <div class="field" style="margin-bottom:8px"><label>OPTION LEGS</label></div>
        <div id="legs-wrap"></div>
        <button onclick="addLeg()" style="padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;margin-bottom:12px">+ ADD LEG</button>
        <div class="fg2">
          <div class="field"><label>EXPIRATION</label><input id="tf-exp" placeholder="05/23/2026"></div>
          <div class="field"><label>DTE AT OPEN</label><input id="tf-dte" placeholder="18" type="number"></div>
          <div class="field"><label>CREDIT / SHARE $</label><input id="tf-credit" placeholder="0.45" type="number" step="0.01"></div>
          <div class="field"><label>COLLATERAL $</label><input id="tf-col" placeholder="200" type="number"></div>
          <div class="field"><label>EXIT TRIGGER $</label><input id="tf-exit" placeholder="108" type="number" step="0.01"></div>
          <div class="field"><label>NOTES</label><input id="tf-notes" placeholder="Context..."></div>
        </div>
        <button class="btn btn-green" onclick="submitTrade()">→ LOG TRADE</button>
      </div>
    </div>`;

  if(open.length===0&&!$('tf-form')?.style.display==='block')
    html+=`<div style="text-align:center;color:var(--muted);padding:50px 0;font-size:11px">NO OPEN TRADES — LOG YOUR FIRST ONE</div>`;

  open.forEach(t=>{
    const cush=parseFloat(t.cushionPct)||0;
    const pnl=parseFloat(t.currentPnlPct)||0;
    const dLeft=t.expDate?Math.ceil((new Date(t.expDate+'T12:00:00')-new Date())/86400000):'?';
    const lowC=cush>0&&cush<5;
    const legs=t.legs||[];
    html+=`<div class="trade-card ${lowC?'warn':''}">
      ${lowC?`<div style="padding:6px 10px;border-radius:6px;background:rgba(255,23,68,.08);color:var(--red);font-size:10px;margin-bottom:8px">⚠ LOW CUSHION — MONITOR</div>`:''}
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div>
          <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px">${t.ticker}</span>
          <span style="font-size:9px;color:var(--muted);margin-left:8px">${t.strategy}</span>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${t.expDate} · ${typeof dLeft==='number'?`${dLeft}D LEFT`:''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:${cc(cush)}">${t.cushionPct||'?'}% CUSHION</div>
          <div style="font-size:10px;color:var(--muted)">BE $${t.breakeven||'?'}</div>
        </div>
      </div>
      <div style="flex-wrap:wrap;display:flex;margin-bottom:10px">
        ${legs.map(l=>`<span class="leg-badge ${l.a==='SELL'?'sell':'buy'}">${l.a} ${l.n}× $${l.s} ${l.t}</span>`).join('')}
      </div>
      <div class="g3" style="margin-bottom:10px">
        ${mc('CREDIT',`$${t.creditReceived||'?'}`, '#00e676')}
        ${mc('COLLATERAL',`$${t.maxRisk||'?'}`, 'var(--text)')}
        ${mc('EXIT $',t.exitSignal?`$${t.exitSignal}`:'—', '#ff8a80')}
      </div>
      <div class="t-actions">
        <input type="number" placeholder="P&L %" value="${t.currentPnlPct||''}" onblur="updPnl(${t.id},this.value)" style="color:${pnl>=40?'#00e676':pnl<-15?'#ff1744':'var(--text)'}">
        <button class="act-btn" onclick="closeT(${t.id},'PROFIT')" style="background:rgba(0,230,118,.15);color:#00e676">✓ WIN</button>
        <button class="act-btn" onclick="closeT(${t.id},'STOP')" style="background:rgba(255,23,68,.15);color:#ff1744">✗ LOSS</button>
        <button class="act-btn" onclick="delT(${t.id})" style="background:transparent;color:var(--muted);border:1px solid var(--border)">🗑</button>
      </div>
      ${t.exitSignal?`<div style="font-size:10px;color:#ff8a80;margin-top:6px">⚡ Close if ${t.ticker} breaks $${t.exitSignal}</div>`:''}
    </div>`;
  });

  if(closed.length>0){
    html+=`<div class="sec-label" style="margin-top:24px;margin-bottom:10px">CLOSED</div>`;
    closed.forEach(t=>{
      const pnl=parseFloat(t.currentPnlPct)||0;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--deep);border-radius:8px;margin-bottom:6px;opacity:.75">
        <div style="flex:1"><span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--dim);margin-right:8px">${t.ticker}</span><span style="font-size:10px;color:var(--muted)">${t.strategy}</span></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:12px;color:${pnl>0?'#00e676':'#ff1744'}">${pnl>0?'+':''}${pnl}%</span>
          <span class="chip" style="background:${t.closeReason==='PROFIT'?'rgba(0,230,118,.15)':'rgba(255,23,68,.15)'};color:${t.closeReason==='PROFIT'?'#00e676':'#ff1744'}">${t.closeReason}</span>
          <button onclick="delT(${t.id})" style="background:transparent;border:none;color:var(--muted);cursor:pointer">✕</button>
        </div>
      </div>`;
    });
  }
  $('tab-trades').innerHTML=html;
  renderLegs();
}

function toggleForm(){
  const f=$('tf-form'),b=$('tf-toggle');
  const show=f.style.display==='none';
  f.style.display=show?'block':'none';
  b.textContent=show?'CANCEL':'+ LOG TRADE';
  b.style.background=show?'#1e2535':'var(--green)';
  b.style.color=show?'var(--muted)':'var(--bg)';
  if(show)renderLegs();
}

function pickStrat(s){
  formStrat=s;
  formLegs=DEF_LEGS[s].map(l=>({...l}));
  document.querySelectorAll('.strat-pill').forEach(p=>p.classList.toggle('active',p.textContent===s));
  renderLegs();
}

function renderLegs(){
  const w=$('legs-wrap');
  if(!w)return;
  if(formLegs.length===0)formLegs=DEF_LEGS[formStrat].map(l=>({...l}));
  w.innerHTML=formLegs.map((leg,i)=>`
    <div class="leg-row ${leg.a==='SELL'?'sell':'buy'}">
      <select onchange="updLeg(${i},'a',this.value)" style="background:#1e2535;border:none;color:${leg.a==='SELL'?'#ff1744':'#00e676'};font-family:'DM Mono',monospace;font-size:11px;font-weight:700;outline:none;padding:4px 6px;border-radius:4px;cursor:pointer">
        <option ${leg.a==='SELL'?'selected':''}>SELL</option><option ${leg.a==='BUY'?'selected':''}>BUY</option>
      </select>
      <input type="number" value="${leg.n}" min="1" max="10" onchange="updLeg(${i},'n',parseInt(this.value)||1)" style="width:40px;text-align:center;padding:5px 6px">
      <span style="color:var(--muted);font-size:10px">×</span>
      <select onchange="updLeg(${i},'t',this.value)" style="background:#1e2535;border:none;color:var(--dim);font-family:'DM Mono',monospace;font-size:11px;outline:none;padding:4px 6px;border-radius:4px;cursor:pointer">
        <option ${leg.t==='PUT'?'selected':''}>PUT</option><option ${leg.t==='CALL'?'selected':''}>CALL</option>
      </select>
      <input type="number" value="${leg.s}" placeholder="Strike $" step="0.5" onchange="updLeg(${i},'s',this.value)" style="flex:1;padding:5px 8px">
      ${formLegs.length>1?`<button onclick="remLeg(${i})" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px">×</button>`:''}
    </div>`).join('');
}

function updLeg(i,f,v){formLegs[i][f]=v;}
function addLeg(){formLegs.push({a:'BUY',t:'PUT',n:1,s:''});renderLegs();}
function remLeg(i){formLegs.splice(i,1);renderLegs();}

function submitTrade(){
  const tick=$('tf-tick')?.value?.trim()?.toUpperCase();
  if(!tick){alert('Enter a ticker');return;}
  const price=parseFloat($('tf-price')?.value)||0;
  const credit=parseFloat($('tf-credit')?.value)||0;
  const col=parseFloat($('tf-col')?.value)||0;
  const sl=formLegs.find(l=>l.a==='SELL');
  const strike=parseFloat(sl?.s)||0;
  const be=strike>0&&credit>0?(strike-credit).toFixed(2):'?';
  const cush=price>0&&be!=='?'?((price-parseFloat(be))/price*100).toFixed(1):'?';
  const rr=col>0&&credit>0?(credit/col*100).toFixed(1):'?';
  trades.unshift({
    id:Date.now(),ticker:tick,strategy:formStrat,
    legs:formLegs.map(l=>({...l})),
    expDate:$('tf-exp')?.value||'',dteOpen:$('tf-dte')?.value||'',
    creditReceived:$('tf-credit')?.value||'',maxRisk:$('tf-col')?.value||'',
    stockAtOpen:$('tf-price')?.value||'',exitSignal:$('tf-exit')?.value||'',
    notes:$('tf-notes')?.value||'',openDate:new Date().toISOString().slice(0,10),
    shortStrike:sl?.s||'',breakeven:be,cushionPct:cush,rrPct:rr,
    status:'OPEN',currentPnlPct:'',closeReason:''
  });
  saveTrades(); formLegs=DEF_LEGS[formStrat].map(l=>({...l}));
  toast('Trade logged!'); renderTrades();
}

function updPnl(id,v){const t=trades.find(t=>t.id===id);if(t){t.currentPnlPct=v;saveTrades();}}
function closeT(id,r){const t=trades.find(t=>t.id===id);if(t){t.status='CLOSED';t.closeReason=r;saveTrades();renderTrades();}}
function delT(id){trades=trades.filter(t=>t.id!==id);saveTrades();renderTrades();}

// ── Stats Tab ─────────────────────────────────────────────────────────────────
function renderStats() {
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const open=trades.filter(t=>t.status==='OPEN');

  // Merge historical + live
  const totalTrades=HIST.totalTrades+closed.length;
  const totalWins=HIST.wins+closed.filter(t=>parseFloat(t.currentPnlPct)>0).length;
  const totalLosses=HIST.losses+closed.filter(t=>parseFloat(t.currentPnlPct)<0).length;
  const winRate=totalTrades>0?((totalWins/totalTrades)*100).toFixed(1):HIST.winRate;
  const livePnl=closed.reduce((acc,t)=>{
    const cr=parseFloat(t.creditReceived)||0;
    const pnl=parseFloat(t.currentPnlPct)||0;
    return acc+(cr*100*pnl/100);
  },0);
  const totalPnl=HIST.totalPnl+livePnl;

  // By strategy (live only)
  const byStrat={};
  closed.forEach(t=>{
    const k=t.strategy||'UNKNOWN';
    const cr=parseFloat(t.creditReceived)||0;
    const col=parseFloat(t.maxRisk)||100;
    const pnl=parseFloat(t.currentPnlPct)||0;
    const roc=(cr*100*pnl/100)/col*100;
    const legs=t.legs||[];
    const sell=legs.find(l=>l.a==='SELL');
    const buy=legs.find(l=>l.a==='BUY');
    const width=sell&&buy?Math.abs((parseFloat(sell.s)||0)-(parseFloat(buy.s)||0)):0;
    if(!byStrat[k])byStrat[k]={wins:0,losses:0,totalRoc:0,count:0,widths:[],collaterals:[]};
    if(pnl>0)byStrat[k].wins++;else byStrat[k].losses++;
    byStrat[k].totalRoc+=roc;byStrat[k].count++;
    if(width>0)byStrat[k].widths.push(width);
    if(col>0)byStrat[k].collaterals.push(col);
  });

  let html=`
    <div class="sec-label">PERFORMANCE — HISTORICAL + LIVE</div>
    <div class="g2">
      ${mc('WIN RATE',`${winRate}%`,parseFloat(winRate)>65?'#00e676':'#ffd600')}
      ${mc('TOTAL P&L',`$${totalPnl.toFixed(0)}`,totalPnl>0?'#00e676':'#ff1744')}
      ${mc('TOTAL TRADES',`${totalWins}W / ${totalLosses}L`,'var(--text)')}
      ${mc('PROFIT FACTOR',HIST.profitFactor,'#00e676')}
      ${mc('OPEN TRADES',open.length,'var(--text)')}
      ${mc('LIVE P&L',`$${livePnl.toFixed(0)}`,livePnl>=0?'#00e676':'#ff1744')}
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="sec-label">HISTORICAL BASELINE (56 TRADES · MAY 2026)</div>
      <div class="g2">
        ${mc('HIST WIN RATE',`${HIST.winRate}%`,'#00e676')}
        ${mc('HIST P&L',`$${HIST.totalPnl}`,'#00e676')}
        ${mc('AVG WIN',`+${HIST.avgWinPct}%`,'#00e676')}
        ${mc('AVG LOSS',`${HIST.avgLossPct}%`,'#ff1744')}
      </div>
      <div style="font-size:9px;color:var(--muted)">${HIST.note}</div>
    </div>`;

  if(Object.keys(byStrat).length>0){
    html+=`<div class="card"><div class="sec-label">LIVE TRADES BY STRATEGY</div>`;
    Object.entries(byStrat).forEach(([strat,d])=>{
      const wr=((d.wins/d.count)*100).toFixed(0);
      const avgRoc=(d.totalRoc/d.count).toFixed(1);
      const avgW=d.widths.length?(d.widths.reduce((a,b)=>a+b,0)/d.widths.length).toFixed(1):'N/A';
      const avgC=d.collaterals.length?(d.collaterals.reduce((a,b)=>a+b,0)/d.collaterals.length).toFixed(0):'N/A';
      const wc=parseInt(wr)>=65?'#00e676':'#ffd600';
      html+=`<div class="strat-block">
        <div class="strat-hdr">
          <span class="strat-name">${strat}</span>
          <div style="display:flex;gap:6px">
            <span class="chip" style="background:${wc}20;color:${wc}">${wr}% WIN</span>
            <span class="chip" style="background:rgba(136,146,164,.1);color:var(--muted)">${d.count}×</span>
          </div>
        </div>
        <div class="g3">
          ${mc('AVG WIDTH',avgW!=='N/A'?`$${avgW}`:'N/A','var(--text)')}
          ${mc('AVG COLLATERAL',avgC!=='N/A'?`$${avgC}`:'N/A','var(--text)')}
          ${mc('AVG ROC',`${parseFloat(avgRoc)>0?'+':''}${avgRoc}%`,parseFloat(avgRoc)>0?'#00e676':'#ff1744')}
        </div>
        <div class="win-track"><div class="win-fill" style="width:${wr}%;background:${wc}"></div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="card">
    <div class="sec-label">AI COACHING</div>
    ${closed.length>0
      ?`<button class="btn btn-purple" onclick="getCoaching()" id="coach-btn">✦ GENERATE COACHING INSIGHT</button><div id="coach-out" style="margin-top:12px;font-size:12px;color:#c8d0dc;line-height:1.7"></div>`
      :`<div style="font-size:11px;color:var(--muted)">Log some live trades and close them to get personalized coaching.</div>`}
  </div>`;

  $('tab-stats').innerHTML=html;
}

async function getCoaching(){
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  if(closed.length===0)return;
  const btn=$('coach-btn');
  btn.disabled=true;btn.textContent='ANALYZING...';
  const summary=closed.map(t=>`${t.ticker} ${t.strategy} legs:${(t.legs||[]).map(l=>`${l.a}${l.n}x$${l.s}${l.t}`).join('/')} col:$${t.maxRisk} cr:$${t.creditReceived} pnl:${t.currentPnlPct}% ${t.closeReason}`).join('\n');
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        messages:[{role:'user',content:`Options coach. Trader uses put credit spreads and BWBs, 14-21 DTE, 76% historical win rate over 56 trades. Analyze these LIVE closed trades. 3 specific insights on spread width, collateral sizing, ROC. Plain text, 3 short paragraphs.\n\n${summary}`}]})
    });
    const d=await resp.json();
    $('coach-out').textContent=d.content?.map(c=>c.text||'').join('');
  }catch(e){$('coach-out').textContent='Could not generate — try again.';}
  finally{btn.disabled=false;btn.textContent='↺ REGENERATE';}
}

formLegs=DEF_LEGS['PUT CREDIT SPREAD'].map(l=>({...l}));

renderAnalyze();
