<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>OptionsPlus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --bg:#0b0e17;--surface:#131720;--surface2:#1a1f2e;--surface3:#222840;
  --border:#252d3d;--border2:#2d3752;
  --blue:#6366f1;--blue2:#818cf8;--blue-dim:#6366f120;
  --green:#22c55e;--green-dim:#22c55e18;
  --red:#ef4444;--red-dim:#ef444418;
  --yellow:#f59e0b;--yellow-dim:#f59e0b18;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --mono:'JetBrains Mono',monospace;
  --sans:'Space Grotesk',sans-serif;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes drawLine{from{stroke-dashoffset:var(--dash)}to{stroke-dashoffset:0}}
.spin{width:22px;height:22px;border:2px solid var(--blue);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.fadeup{animation:fadeUp .2s ease forwards}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--border2)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* LAYOUT */
#app{max-width:440px;margin:0 auto;min-height:100vh;padding-bottom:var(--nav-h);position:relative}
.page{padding:0 0 8px;display:none}
.page.active{display:block}

/* HEADER */
.hdr{padding:14px 16px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.logo{font-family:var(--sans);font-weight:700;font-size:18px;letter-spacing:-.3px;color:var(--text)}
.logo span{color:var(--blue2)}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-top:1px}
.sig-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.3px;font-family:var(--mono)}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding:0 4px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;cursor:pointer;padding:8px 0;color:var(--text3);transition:color .15s;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--blue2)}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8}
.nav-btn span{font-size:9px;font-family:var(--sans);font-weight:500;letter-spacing:.3px}
.nav-pip{width:4px;height:4px;border-radius:50%;background:var(--blue2);margin-top:1px;opacity:0;transition:opacity .15s}
.nav-btn.active .nav-pip{opacity:1}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin:0 12px 10px}
.card-flush{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;padding:0 16px;margin-bottom:8px}
.section-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.8px;text-transform:uppercase}
.section-action{font-size:11px;color:var(--blue2);cursor:pointer;font-weight:500}

/* STAT TILES */
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 12px;margin-bottom:10px}
.tile{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.tile-label{font-size:9px;color:var(--text3);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.tile-value{font-size:16px;font-weight:700;font-family:var(--mono);line-height:1}
.tile-sub{font-size:9px;color:var(--text3);margin-top:3px}
.tile2{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px;margin-bottom:10px}
.tile2 .tile{padding:11px 12px}
.tile2 .tile-value{font-size:15px}

/* INPUTS */
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;line-height:1.5;min-height:60px}
select{appearance:none;cursor:pointer}
.fld{margin-bottom:9px}
.fld label{font-size:10px;color:var(--text2);font-weight:500;letter-spacing:.3px;display:block;margin-bottom:4px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:9px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:9px}

/* STRIKE INPUT */
.strike-input{
  flex:1 1 100px;min-width:80px;
  background:var(--surface2);border:2px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:var(--mono);font-size:17px;font-weight:700;
  padding:10px 12px;outline:none;-webkit-appearance:none;-moz-appearance:textfield;
  transition:border-color .15s;
}
.strike-input:focus{border-color:var(--blue)}
.strike-input::placeholder{color:var(--border2);font-size:13px;font-weight:400}

/* LEG ROWS */
.leg-row{display:flex;gap:7px;align-items:center;margin-bottom:8px;padding:10px 12px;background:var(--surface2);border-radius:9px;flex-wrap:nowrap;border:1px solid var(--border)}
.leg-row.sell{border-color:rgba(239,68,68,.3)}
.leg-row.buy-l{border-color:rgba(34,197,94,.3)}
.leg-row select,.leg-row input{width:auto}
.leg-action{flex:0 0 62px;background:var(--surface3);border:none;font-family:var(--mono);font-size:11px;font-weight:700;outline:none;padding:6px 7px;border-radius:5px;cursor:pointer;transition:background .15s}
.leg-ct{flex:0 0 40px;text-align:center;padding:5px 4px;background:var(--surface3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
.leg-type{flex:0 0 58px;background:var(--surface3);border:none;color:var(--text2);font-family:var(--mono);font-size:11px;outline:none;padding:5px 6px;border-radius:5px;cursor:pointer}
.leg-x{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 3px;flex-shrink:0;line-height:1}
@media(max-width:400px){.leg-row{flex-wrap:wrap}.strike-input{flex:1 1 100%;min-width:100%;margin-top:4px}}

/* BUTTONS */
.btn{padding:11px 16px;border:none;border-radius:9px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.2px;transition:all .15s}
.btn-w{width:100%;display:block}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#5558e8}
.btn-primary:disabled{background:var(--surface3);color:var(--text3);cursor:default}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}
.btn-success{background:var(--green-dim);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.btn-danger{background:var(--red-dim);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.btn-purple{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:var(--blue2)}
.btn-yellow{background:var(--yellow-dim);border:1px solid rgba(245,158,11,.3);color:var(--yellow)}
.btn-sm{padding:6px 12px;font-size:11px}

/* CHIPS / BADGES */
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:500;font-family:var(--mono);letter-spacing:.2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono)}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:9px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:transparent;transition:all .15s;margin:0 3px 3px 0;font-family:var(--mono)}
.tag.on{border-color:rgba(99,102,241,.5);color:var(--blue2);background:rgba(99,102,241,.08)}

/* STATUS COLORS */
.c-green{color:var(--green)}
.c-red{color:var(--red)}
.c-yellow{color:var(--yellow)}
.c-blue{color:var(--blue2)}
.c-dim{color:var(--text2)}
.c-muted{color:var(--text3)}

/* DATA ROW */
.data-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.data-row:last-child{border-bottom:none}
.data-label{font-size:12px;color:var(--text2)}
.data-value{font-size:12px;font-weight:600;font-family:var(--mono)}

/* STRATEGY PILLS */
.strat-group-label{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin:8px 0 4px}
.sp{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .15s;letter-spacing:.1px;font-family:var(--sans)}
.sp.active{border-color:var(--blue);color:var(--blue2);background:var(--blue-dim)}

/* TRADE CARDS */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin:0 12px 9px}
.tc.safe{border-color:rgba(34,197,94,.25)}
.tc.warn{border-color:rgba(245,158,11,.3)}
.tc.risk{border-color:rgba(239,68,68,.35)}
.lb{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:600;margin:0 3px 3px 0;font-family:var(--mono)}
.lb-sell{background:var(--red-dim);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.lb-buy{background:var(--green-dim);border:1px solid rgba(34,197,94,.25);color:var(--green)}

/* CALENDAR */
.cal-tabs{display:flex;gap:0;margin:0 12px 10px;background:var(--surface2);border-radius:8px;padding:3px;border:1px solid var(--border)}
.cal-tab{flex:1;text-align:center;padding:7px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .15s}
.cal-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.cal-ev{display:flex;gap:11px;padding:11px 14px;border-radius:10px;margin:0 12px 7px;align-items:flex-start;background:var(--surface);border:1px solid var(--border)}
.cal-ev.dte{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.03)}
.cal-ev.imm{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.03)}
.cal-date-box{min-width:38px;text-align:center;flex-shrink:0}
.cal-day{font-family:var(--mono);font-weight:700;font-size:18px;line-height:1}
.cal-mon{font-size:9px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}

/* SIGNAL GAUGE */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 10px}
.gauge-label{font-size:11px;color:var(--text2);font-weight:500;margin-top:6px;letter-spacing:.3px}
.gauge-val{font-family:var(--mono);font-weight:700;font-size:28px;line-height:1;margin-top:2px}

/* SCORE BARS */
.sb{margin-bottom:11px}
.sb-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.sb-track{height:4px;background:var(--surface3);border-radius:2px}
.sb-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* SECTORS */
.sec{background:var(--surface);border-radius:10px;padding:12px 14px;margin:0 12px 7px;display:flex;align-items:center;gap:12px;border-left:3px solid var(--border);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}

/* EQUITY CHART */
.chart-wrap{padding:0 12px 0;margin-bottom:10px}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}

/* MODAL/OVERLAY */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:440px;border-top:1px solid var(--border)}

/* LOADING */
.lc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;gap:12px}
.lc p{font-size:11px;color:var(--text3);letter-spacing:.5px}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:8px;font-size:12px;font-weight:500;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}

/* INLINE DATA */
.dl{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.dl-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.est-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(245,158,11,.25);font-family:var(--mono)}
.real-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.25);font-family:var(--mono)}
.mhdr{font-size:10px;color:var(--blue2);letter-spacing:1.5px;margin:14px 16px 6px;font-weight:600;text-transform:uppercase}
.divider{height:1px;background:var(--border);margin:10px 0}
.pref-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.pref-row:last-child{border-bottom:none}
.bwb-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.bwb-row:last-child{border-bottom:none}

</style>
</head>
<body>
<div id="app">
  <!-- HEADER (shared) -->
  <div class="hdr">
    <div>
      <div class="logo">Options<span>Plus</span></div>
      <div class="logo-sub" id="hdr-date"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sig-badge" id="hdr-sig" style="display:none"></div>
      <button onclick="showPage('prefs')" style="background:transparent;border:1px solid var(--border);color:var(--text3);font-family:var(--sans);font-size:10px;padding:5px 9px;border-radius:6px;cursor:pointer;font-weight:500">&#9881;</button>
    </div>
  </div>

  <!-- PAGES -->
  <div class="page active" id="page-overview"></div>
  <div class="page" id="page-analyze"></div>
  <div class="page" id="page-calendar"></div>
  <div class="page" id="page-trades"></div>
  <div class="page" id="page-stats"></div>
  <div class="page" id="page-sectors"></div>
  <div class="page" id="page-prefs"></div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-btn active" id="nb-overview" onclick="showPage('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Overview</span>
      <div class="nav-pip"></div>
    </button>
    <button class="nav-btn" id="nb-analyze" onclick="showPage('analyze')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>
      <span>Analyze</span>
      <div class="nav-pip"></div>
    </button>
    <button class="nav-btn" id="nb-trades" onclick="showPage('trades')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>Trades</span>
      <div class="nav-pip"></div>
    </button>
    <button class="nav-btn" id="nb-calendar" onclick="showPage('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Calendar</span>
      <div class="nav-pip"></div>
    </button>
    <button class="nav-btn" id="nb-stats" onclick="showPage('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      <span>Stats</span>
      <div class="nav-pip"></div>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>

// =============================================================================
// CONFIG -- TODO: move API keys to Vercel backend before public launch
// Backend endpoint placeholder: const API_BASE = '/api'; (replace AV calls with fetch(API_BASE+'/market'))
// =============================================================================
const AV = 'J0BM2LMG9Z7SFZFV';
const TRADIER_KEY = ''; // TODO: insert Tradier production key when account funded
const PROXY = 'https://api.allorigins.win/get?url=';
const USE_TRADIER = TRADIER_KEY !== '';

// Cache keys and TTLs
const CK = {mkt:'oe9_mkt',sec:'oe9_sec',earn:'oe9_earn_',lp:'oe9_lp_',prefs:'oe9_prefs'};
const TTL = {mkt:4*3600000,sec:4*3600000,earn:12*3600000,lp:15*60000};
const TK = 'oe9_trades', HK = 'oe9_hist';

// Default user preferences -- userId field ready for Supabase
const DEFAULT_PREFS = {
  userId: null, // populated when auth is added
  displayName: 'Trader',
  primaryStrategy: 'credit',
  dteLow: 14, dteHigh: 21,
  deltaLow: 0.18, deltaHigh: 0.28,
  cushionMin: 5,
  creditWidthMin: 8, // credit as % of spread width -- below this = red flag
  maxRiskPerTrade: 500,
  accountSize: 10000,
  marketNote: '' // manual major world events field
};

// =============================================================================
// STATE
// =============================================================================
let trades = JSON.parse(localStorage.getItem(TK) || '[]');
let hist = JSON.parse(localStorage.getItem(HK) || JSON.stringify({
  totalTrades:56,wins:42,losses:13,breakeven:1,
  realizedPnl:736,winPct:76.36,avgWinPct:51.71,avgLossPct:-47.56,profitFactor:2.84
}));
let prefs = JSON.parse(localStorage.getItem(CK.prefs) || JSON.stringify(DEFAULT_PREFS));
let curTab = 'signal';
let azLegData = [], azStrat = 'PUT CREDIT SPREAD', azResult = null;
let formLegData = [], formStrat = 'PUT CREDIT SPREAD', showHistory = false;
let livePrices = {};

// =============================================================================
// STRATEGIES & DEFAULT LEGS
// =============================================================================
const STRAT_GROUPS = {
  'CREDIT': ['PUT CREDIT SPREAD','CALL CREDIT SPREAD','CASH SECURED PUT','COVERED CALL','IRON CONDOR','PUT RATIO SPREAD','CALL RATIO SPREAD'],
  'DEBIT':  ['PUT DEBIT SPREAD','CALL DEBIT SPREAD','LONG PUT','LONG CALL','PUT BUTTERFLY','CALL BUTTERFLY','IRON BUTTERFLY'],
  'CUSTOM': ['CUSTOM']
};
const ALL_STRATS = [...STRAT_GROUPS.CREDIT, ...STRAT_GROUPS.DEBIT, ...STRAT_GROUPS.CUSTOM];

const DEF = {
  'PUT CREDIT SPREAD':  [{a:'SELL',t:'PUT',n:1,s:''},{a:'BUY',t:'PUT',n:1,s:''}],
  'CALL CREDIT SPREAD': [{a:'SELL',t:'CALL',n:1,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'CASH SECURED PUT':   [{a:'SELL',t:'PUT',n:1,s:''}],
  'COVERED CALL':       [{a:'SELL',t:'CALL',n:1,s:''}],
  'IRON CONDOR':        [{a:'SELL',t:'PUT',n:1,s:''},{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'CALL',n:1,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'PUT RATIO SPREAD':   [{a:'SELL',t:'PUT',n:2,s:''},{a:'BUY',t:'PUT',n:1,s:''}],
  'CALL RATIO SPREAD':  [{a:'SELL',t:'CALL',n:2,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'PUT DEBIT SPREAD':   [{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'PUT',n:1,s:''}],
  'CALL DEBIT SPREAD':  [{a:'BUY',t:'CALL',n:1,s:''},{a:'SELL',t:'CALL',n:1,s:''}],
  'LONG PUT':           [{a:'BUY',t:'PUT',n:1,s:''}],

// Smart date parser: accepts 5/10/26, 6/1/2026, 05/10/2026
function parseExp(str) {
  if (!str) return null;
  const s = str.trim().replace(/-/g, '/');
  const p = s.split('/');
  if (p.length !== 3) return null;
  let [m, d, y] = p;
  if (y.length === 2) y = '20' + y;
  if (m.length < 2) m = m.padStart(2, '0');
  if (d.length < 2) d = d.padStart(2, '0');
  const dt = new Date(`${y}-${m}-${d}T16:00:00`);
  return isNaN(dt.getTime()) ? null : dt;
}
function calcDTE(expStr) {
  const d = parseExp(expStr);
  if (!d) return null;
  return Math.ceil((d - new Date()) / 86400000);
}

function ncdf(x) {
  const a=[.254829592,-.284496736,1.421413741,-1.453152027,1.061405429],p=.3275911;
  const sgn=x<0?-1:1; x=Math.abs(x)/Math.sqrt(2);
  const t2=1/(1+p*x);
  let y=1-(((((a[4]*t2+a[3])*t2+a[2])*t2+a[1])*t2+a[0])*t2*Math.exp(-x*x));
  return .5*(1+sgn*y);
}
function bsDelta(S, K, T, sig, type='put') {
  if (!S||!K||!T||!sig||T<=0||sig<=0) return null;
  const d1 = (Math.log(S/K) + .5*sig*sig*T) / (sig*Math.sqrt(T));
  return type==='call' ? ncdf(d1) : ncdf(d1)-1;
}
function calcHV(cl, days=30) {
  if (cl.length < days+1) return .3;
  const sl = cl.slice(0, days+1);
  const ret = sl.slice(0,-1).map((c,i) => Math.log(c/sl[i+1]));
  const m = ret.reduce((a,b)=>a+b,0)/ret.length;
  const v = ret.reduce((a,r)=>a+Math.pow(r-m,2),0)/(ret.length-1);
  return Math.sqrt(v*252);
}
function safeNum(v, fallback=0) {
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : fallback;
}

// BWB / Spread calculations
function calcBWBMaxLoss(legs, cr) {
  const buys = legs.filter(l=>l.a==='BUY').map(l=>safeNum(l.s)).filter(s=>s>0).sort((a,b)=>b-a);
  const sells = legs.filter(l=>l.a==='SELL').map(l=>safeNum(l.s)).filter(s=>s>0);
  if (buys.length<2||sells.length<1) return null;
  const topLong=buys[0], bottomLong=buys[buys.length-1], short=sells[0];
  if (!(topLong>short && short>bottomLong)) return null;
  const contracts = legs.find(l=>l.a==='SELL')?.n || 1;
  const credit = safeNum(cr);
  const upper = topLong-short, lower = short-bottomLong;
  if (upper<=0||lower<=0) return null;
  const rawLoss = (lower-upper)*100*contracts - (credit*100*contracts);
  return {maxLoss:Math.max(0,rawLoss), upper, lower, topLong, short, bottomLong, contracts};
}
function calcBWBBreakeven(legs, cr) {
  const sells = legs.filter(l=>l.a==='SELL');
  if (!sells.length) return null;
  const s = safeNum(sells[0].s), c = safeNum(cr);
  return s&&c ? parseFloat((s-c).toFixed(2)) : null;
}
function calcCollateral(strat, legs, cr) {
  const sells = legs.filter(l=>l.a==='SELL'), buys = legs.filter(l=>l.a==='BUY');
  const contracts = Math.max(...[...sells,...buys].map(l=>l.n||1), 1);
  const credit = safeNum(cr);
  const allStrikes = [...sells,...buys].map(l=>safeNum(l.s));
  if (allStrikes.some(s=>s<=0)) return 0;
  if (strat==='CASH SECURED PUT') return safeNum(sells[0]?.s)*100;
  if (strat==='COVERED CALL') return 0;
  if (['PUT BUTTERFLY','CALL BUTTERFLY','PUT RATIO SPREAD','CALL RATIO SPREAD'].includes(strat)) {
    const b = calcBWBMaxLoss(legs, cr);
    return (b&&b.maxLoss>0) ? b.maxLoss : 0;
  }
  if (strat==='IRON CONDOR'||strat==='IRON BUTTERFLY') {
    const puts = legs.filter(l=>l.t==='PUT'), calls = legs.filter(l=>l.t==='CALL');
    const putSell = puts.find(l=>l.a==='SELL'), putBuy = puts.find(l=>l.a==='BUY');
    const callSell = calls.find(l=>l.a==='SELL'), callBuy = calls.find(l=>l.a==='BUY');
    const putW = (putSell&&putBuy) ? Math.abs(safeNum(putSell.s)-safeNum(putBuy.s)) : 0;
    const callW = (callSell&&callBuy) ? Math.abs(safeNum(callSell.s)-safeNum(callBuy.s)) : 0;
    const maxW = Math.max(putW, callW);
    return maxW>0 ? Math.max(0,(maxW-credit)*100*contracts) : 0;
  }
  // Long debit trades -- cost to open
  if (['LONG PUT','LONG CALL'].includes(strat)) {
    return credit*100*contracts; // credit here is actually the debit paid
  }
  if (sells.length>0&&buys.length>0) {
    const w = Math.abs(safeNum(sells[0]?.s)-safeNum(buys[0]?.s));
    if (w<=0) return 0;
    return Math.max(0,(w-credit)*100*contracts);
  }
  return 0;
}
function isDebitStrat(strat) {
  return STRAT_GROUPS.DEBIT.includes(strat);
}

// BWB quality scorer -- uses user prefs for thresholds
function scoreBWB(legs, credit, price, dte, earningsRisk) {
  const cr = safeNum(credit);
  const bwb = calcBWBMaxLoss(legs, cr);
  const be = calcBWBBreakeven(legs, cr);
  if (!bwb||!be) return null;
  const crDollar = cr*100*bwb.contracts;
  const crRatio = bwb.maxLoss>0 ? parseFloat((crDollar/bwb.maxLoss*100).toFixed(1)) : 0;
  const beCushion = price>0 ? parseFloat(((price-be)/price*100).toFixed(1)) : 0;
  const dteOk = dte>=prefs.dteLow-2 && dte<=prefs.dteHigh+2;
  const wingRatio = bwb.upper>0 ? parseFloat((bwb.lower/bwb.upper).toFixed(2)) : 0;
  let score=0; const notes=[];
  if (crRatio>=20){score+=35;notes.push('\u2713 Strong credit/risk ratio '+crRatio+'%');}
  else if (crRatio>=12){score+=20;notes.push('\u25b3 Moderate credit ratio '+crRatio+'%');}
  else{score+=5;notes.push('\u2717 Low credit ratio '+crRatio+'%');}
  if (beCushion>=prefs.cushionMin+3){score+=30;notes.push('\u2713 '+beCushion+'% cushion to breakeven');}
  else if (beCushion>=prefs.cushionMin){score+=18;notes.push('\u25b3 '+beCushion+'% cushion to BE -- acceptable');}
  else if (beCushion>=3){score+=8;notes.push('\u26a0 '+beCushion+'% cushion to BE -- tight');}
  else{notes.push('\u2717 '+beCushion+'% cushion -- too tight');}
  if (!earningsRisk){score+=20;notes.push('\u2713 Earnings clear');}
  else{notes.push('\u2717 Earnings within expiration');}
  if (dteOk){score+=10;notes.push('\u2713 DTE '+dte+' in range');}
  else{notes.push('\u25b3 DTE '+dte+' outside '+prefs.dteLow+'-'+prefs.dteHigh);}
  if (wingRatio>=1.5&&wingRatio<=3){score+=5;notes.push('\u2713 Wing ratio '+wingRatio+':1');}
  else{notes.push('\u25b3 Wing ratio '+wingRatio+':1');}
  let grade,gc2,gl;
  if (score>=75){grade='A';gc2='#00e676';gl='Strong setup';}
  else if (score>=50){grade='B';gc2='#ffd600';gl='Acceptable -- monitor';}
  else{grade='SKIP';gc2='#ff1744';gl='Below your criteria';}
  return {grade,gc2,gl,score,notes,crRatio,beCushion,maxLoss:bwb.maxLoss,crDollar,be,wingRatio};
}

async function fetchAVDaily(sym) {
  try {
    const r = await fetch('https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol='+sym+'&outputsize=compact&apikey='+AV, {signal:AbortSignal.timeout(12000)});
    const d = await r.json();
    const ts = d['Time Series (Daily)'];
    if (!ts) return null;
    const dates = Object.keys(ts).sort().reverse();
    const closes = dates.map(dt => parseFloat(ts[dt]['4. close']));
    const highs = dates.map(dt => parseFloat(ts[dt]['2. high']));
    const lows = dates.map(dt => parseFloat(ts[dt]['3. low']));
    const price = closes[0];
    const lastDate = dates[0];
    const n50=Math.min(50,closes.length),n200=Math.min(200,closes.length),n20=Math.min(20,closes.length);
    const sma50=closes.slice(0,n50).reduce((a,b)=>a+b,0)/n50;
    const sma200=closes.slice(0,n200).reduce((a,b)=>a+b,0)/n200;
    const sma20=closes.slice(0,n20).reduce((a,b)=>a+b,0)/n20;
    const perf5 = closes.length>5 ? parseFloat(((price-closes[5])/closes[5]*100).toFixed(2)) : 0;
    const hv30 = calcHV(closes, 30);
    const supports = new Set([Math.round(sma20*4)/4, Math.round(sma50*4)/4]);
    const resistances = new Set();
    for (let i=2;i<Math.min(25,lows.length-2);i++) {
      if (lows[i]<lows[i-1]&&lows[i]<lows[i+1]&&lows[i]<lows[i-2]) supports.add(Math.round(lows[i]*4)/4);
      if (highs[i]>highs[i-1]&&highs[i]>highs[i+1]) resistances.add(Math.round(highs[i]*4)/4);
    }
    return {
      price:parseFloat(price.toFixed(2)), closes, sma20:parseFloat(sma20.toFixed(2)),
      sma50:parseFloat(sma50.toFixed(2)), sma200:parseFloat(sma200.toFixed(2)),
      above50:price>sma50, above200:price>sma200, perf5, hv30, lastDate,
      supports:[...supports].filter(s=>s<price).sort((a,b)=>b-a).slice(0,3),
      resistances:[...resistances].filter(r=>r>price).sort((a,b)=>a-b).slice(0,2)
    };
  } catch(e) { return null; }
}
async function fetchAVBatch(symbols) {
  const results = {};
  for (const sym of symbols) {
    results[sym] = await fetchAVDaily(sym);
    await new Promise(r=>setTimeout(r,1500));
  }
  return results;
}

function sVIX(lv, chg) {
  let s=62; if (lv===null) return s;
  if (lv<16)s+=18; else if (lv<20)s+=10; else if (lv<24)s+=2; else if (lv<28)s-=10; else if (lv<33)s-=22; else s-=38;
  if (chg>35)s-=28; else if (chg>20)s-=16; else if (chg>12)s-=7; else if (chg<-15)s+=8; else if (chg<-8)s+=4;
  return Math.max(0,Math.min(100,s));
}
function sStruct(s50, s200, q50, rspDiff) {
  let s=55;
  if (s50)s+=15; else s-=18; if (s200)s+=10; else s-=10; if (q50)s+=10; else s-=8;
  if (rspDiff>0.5)s+=10; else if (rspDiff<-1.5)s-=15; else if (rspDiff<-0.5)s-=5;
  return Math.max(0,Math.min(100,s));
}
function sSent(fg, creditChg) {
  let s=65;
  if (fg){if (fg.score>75)s-=5; else if (fg.score<30)s-=20; else if (fg.score<45)s-=10;}
  if (creditChg>20)s-=28; else if (creditChg>10)s-=15; else if (creditChg>4)s-=7; else if (creditChg<-5)s+=10;
  return Math.max(0,Math.min(100,s));
}
function getSig(vs, ss, sent) {
  const w = vs*.40+ss*.35+sent*.15+10;
  if (Math.min(vs,ss)<25||w<36) return 'RED';
  if (Math.min(vs,ss)<42||w<56) return 'YELLOW';
  return 'GREEN';
}
function assessTrade(cushion, dte) {
  const c = parseFloat(cushion)||0, d = parseInt(dte)||999;
  if (c>=prefs.cushionMin+2&&d>7)  return {label:'SAFE',color:'#00e676',cls:'safe'};
  if (c>=prefs.cushionMin+2&&d<=7) return {label:'EXPIRING',color:'#ffd600',cls:'warn'};
  if (c>=prefs.cushionMin&&d>5)    return {label:'MONITOR',color:'#ffd600',cls:'warn'};
  if (c>=prefs.cushionMin&&d<=5)   return {label:'AT RISK',color:'#ff1744',cls:'risk'};
  return {label:'CRITICAL',color:'#ff1744',cls:'risk'};
}

function buildCalendarEvents() {
  const today = new Date();
  const y = today.getFullYear();
  const events = [];
  // FOMC meetings -- 8 per year, roughly every 6-7 weeks
  const fomcDates = [
    new Date(y,0,28), new Date(y,2,18), new Date(y,4,6), new Date(y,5,17),
    new Date(y,6,29), new Date(y,8,16), new Date(y,10,4), new Date(y,11,16)
  ];
  fomcDates.forEach(d => {
    if (d >= new Date(today.getFullYear(), today.getMonth()-1, 1))
      events.push({d, name:'FOMC Meeting', sector:'ALL', impact:'HIGH',
        note:'Fed rate decision. Even if unchanged, press conference tone moves markets. VIX typically spikes. Avoid opening new positions within 48hrs.'});
  });
  // OPEX -- 3rd Friday of every month
  for (let m=0; m<12; m++) {
    const d = new Date(y,m,1);
    let fridays=0;
    while (fridays<3) { if (d.getDay()===5) fridays++; if (fridays<3) d.setDate(d.getDate()+1); }
    if (d >= today) events.push({d:new Date(d), name:'Monthly OPEX', sector:'ALL', impact:'MED',
      note:'Options expiration. Unusual price action near popular strikes is common. Pin risk on short strikes close to the money.'});
  }
  // CPI -- 2nd Wednesday of each month approx
  for (let m=0; m<12; m++) {
    const d = new Date(y,m,1);
    let weds=0;
    while (weds<2) { if (d.getDay()===3) weds++; if (weds<2) d.setDate(d.getDate()+1); }
    d.setDate(d.getDate()+1); // usually day after
    if (d >= today) events.push({d:new Date(d), name:'CPI Report', sector:'ALL', impact:'HIGH',
      note:'Inflation data. Hot CPI = Fed stays hawkish = rate pressure = market selloff. Your biggest macro risk for open spreads on tech names.'});
  }
  // NFP -- 1st Friday of each month
  for (let m=0; m<12; m++) {
    const d = new Date(y,m,1);
    while (d.getDay()!==5) d.setDate(d.getDate()+1);
    if (d >= today) events.push({d:new Date(d), name:'Jobs Report (NFP)', sector:'ALL', impact:'HIGH',
      note:'Non-farm payrolls. Strong jobs = Fed stays hawkish = potential market pressure. Watch the day before for positioning.'});
  }
  return events;
}

          (fg?'':'<div style="font-size:9px;color:var(--muted);margin-top:4px">CNN endpoint unavailable -- using default score</div>')+
        '</div>'+

          (sig==='GREEN'?'\u2713 CONDITIONS FAVORABLE -- trade your '+prefs.dteLow+'-'+prefs.dteHigh+' DTE structures at normal size':
           sig==='YELLOW'?'\u26a0 MIXED -- size down, close weak positions, check calendar before new opens':

      '</div>'+

      '<div class="g3">'+
        mc2('VIX', vix?.ok&&vix?.level?vix.level.toFixed(1):'unavail', vix?.ok&&vix?.level?(vix.level<18?'#00e676':vix.level<26?'#ffd600':'#ff1744'):'var(--muted)')+
        mc2('VIX 5D', vix?.ok?(vix.chg>0?'+':'')+vix.chg+'%':'unavail', vix?.ok?(vix.chg>15?'#ff1744':vix.chg>7?'#ffd600':'#00e676'):'var(--muted)')+

        mc2('SPREAD CHG', (creditChg>0?'+':'')+creditChg.toFixed(1)+'bp', creditChg>10?'#ff1744':creditChg>3?'#ffd600':'#00e676')+

  } catch(e) {
    $('t-signal').innerHTML = '<div class="lc"><p style="color:var(--red);text-align:center">Fetch failed. Check connection.</p><button class="btn btn-ghost" onclick="loadSignal(true)" style="margin-top:16px">\u21bb RETRY</button></div>';
  }
}



function buildGuidance(sig, vix, spy, creditChg, fg, rspDiff) {
  const s = prefs.cushionMin+'%';
  if (sig==='GREEN') return (vix?.ok&&vix?.level?'VIX at '+vix.level+' is '+(vix.level<18?'low -- ideal for premium collection.':'moderate and stable.'):'Market structure constructive.')+' '+(fg?'Fear/Greed at '+fg.score+' ('+fg.rating+').':'')+' '+(spy?.above50&&spy?.above200?'SPY holding above both key moving averages.':spy?.above50?'SPY above 50MA.':'SPY below 50MA -- watch.')+' '+(rspDiff>0.5?'Equal-weight outperforming -- broad participation.':rspDiff<-1?'Narrow market -- only large caps leading. Be selective.':'')+' Your '+prefs.dteLow+'-'+prefs.dteHigh+' DTE credit structures are well-positioned. Stick to '+s+' cushion minimum.';
  if (sig==='YELLOW') return 'Mixed environment. '+(vix?.ok&&vix?.chg>10?'VIX spiked '+vix.chg+'% in 5 days -- elevated fear. ':'')+( fg&&fg.score<35?'Market showing fear -- be selective. ':'')+( rspDiff<-1?'Breadth narrowing. ':'')+' Size down, close positions below '+s+' cushion, check calendar before any new opens.';
  return 'Elevated risk. '+(vix?.ok&&vix?.level>30?'VIX at '+vix.level+' is high fear. ':'')+( fg&&fg.score<25?'Extreme fear in market. ':'')+( creditChg>10?'Credit spreads widening. ':'')+' Avoid new positions until conditions normalize.';
}

function azChangeStrat(s) {
  azStrat = s;
  azLegData = DEF[s] ? DEF[s].map(l=>({...l})) : [{a:'BUY',t:'PUT',n:1,s:''}];
  buildAzLegs(); azUpdateCol();
}
function addAzLeg() { azLegData.push({a:'BUY',t:'PUT',n:1,s:''}); buildAzLegs(); }

function buildAzLegs() {
  const c = $('az-lc'); if (!c) return;
  c.innerHTML = azLegData.map((leg,i) =>
    '<div class="leg-row '+(leg.a==='SELL'?'sell':'buy-l')+'">'+
      '<select class="leg-action" style="color:'+(leg.a==='SELL'?'#ff1744':'#00e676')+'" onchange="azLegData['+i+'].a=this.value;buildAzLegs();azUpdateCol()">'+
        '<option '+(leg.a==='SELL'?'selected':'')+'>SELL</option>'+

      '</select>'+
      '<input type="number" value="'+(leg.n||1)+'" min="1" max="20" class="leg-ct" onblur="azLegData['+i+'].n=parseInt(this.value)||1;azUpdateCol()">'+
      '<span style="color:var(--muted);font-size:10px">\u00d7</span>'+
      '<select class="leg-type" onchange="azLegData['+i+'].t=this.value">'+
        '<option '+(leg.t==='PUT'?'selected':'')+'>PUT</option>'+
        '<option '+(leg.t==='CALL'?'selected':'')+'>CALL</option>'+
      '</select>'+
      '<input type="number" value="'+(leg.s||'')+'" placeholder="Strike" class="strike-input" style="flex:1" oninput="azLegData['+i+'].s=this.value" onblur="azLegData['+i+'].s=this.value;azUpdateCol()">'+
      (azLegData.length>1?'<button class="leg-x" onclick="azLegData.splice('+i+',1);buildAzLegs();azUpdateCol()">\u00d7</button>':'')+

  ).join('');
}
function azUpdateCol() {
  const cr = safeNum($('az-cr')?.value);
  const col = calcCollateral(azStrat, azLegData, cr);
  const el = $('az-col');
  if (el) { el.value = col>0 ? col.toFixed(0) : ''; }
}

async function runAnalysis() {
  const ticker = $('az-tk')?.value?.trim()?.toUpperCase();
  const expRaw = $('az-exp')?.value?.trim();
  const credit = safeNum($('az-cr')?.value);
  const collateral = safeNum($('az-col')?.value);
  if (!ticker) { alert('Enter a ticker symbol'); return; }
  $('az-btn').disabled=true; $('az-btn').textContent='FETCHING DATA...';
  $('az-result').innerHTML='<div class="lc" style="height:100px"><div class="spin"></div><p style="color:var(--dim);font-size:10px;letter-spacing:2px;margin-left:12px">PULLING '+ticker+'...</p></div>';
  try {
    const shortLeg = azLegData.find(l=>l.a==='SELL');
    const shortStrike = safeNum(shortLeg?.s);
    const optType = (shortLeg?.t||'PUT').toLowerCase();
    const expDate = parseExp(expRaw);
    const dte = expDate ? Math.ceil((expDate-new Date())/86400000) : null;
    const isDebit = isDebitStrat(azStrat);
    const [dataMap, earnings, yahooChain] = await Promise.all([
      fetchAVBatch([ticker]),
      fetchEarnings(ticker),
      expRaw ? fetchYahooOptions(ticker, expRaw) : Promise.resolve(null)
    ]);
    const data = dataMap[ticker];
    const price = data?.price||0;
    const hv30 = data?.hv30||.3;
    const lastDate = data?.lastDate||'';
    // Delta
    let absDelta=null, deltaSource='BS';
    if (yahooChain&&shortStrike>0) {
      const chain = optType==='put'?yahooChain.puts:yahooChain.calls;
      const match = chain?.find(o=>Math.abs(safeNum(o.strike)-shortStrike)<0.26);
      if (match&&match.delta) { absDelta=Math.abs(match.delta); deltaSource='Yahoo'; }
    }
    if (absDelta===null && shortStrike>0 && price>0 && dte) {
      const bd = bsDelta(price, shortStrike, dte/365, hv30, optType);
      if (bd!==null) { absDelta=Math.abs(bd); deltaSource='BS'; }
    }
    // Credit/Width ratio
    const sells = azLegData.filter(l=>l.a==='SELL'), buys = azLegData.filter(l=>l.a==='BUY');
    const spreadWidth = (sells.length>0&&buys.length>0) ? Math.abs(safeNum(sells[0].s)-safeNum(buys[0].s)) : 0;
    const crWidthPct = (spreadWidth>0&&credit>0) ? parseFloat((credit/spreadWidth*100).toFixed(1)) : null;
    // Cushion
    const cushionPct = price>0&&shortStrike>0 ? parseFloat(((price-shortStrike)/price*100).toFixed(1)) : null;
    // Earnings
    let earningsRisk=false, earningsDate=null;
    if (earnings) {
      earningsDate = earnings.date;
      if (expDate) { const ed=new Date(earnings.date+'T12:00:00'); if (ed<=expDate) earningsRisk=true; }
      else earningsRisk=true;
    }
    const supBelow = data?.supports||[];
    const aboveSupport = shortStrike>0&&supBelow.length>0&&shortStrike>supBelow[0];
    const exitSignal = supBelow.length>0?supBelow[0]:null;
    // Signal
    let signal='GO'; const reasons=[];
    if (earningsRisk) { signal='NO-GO'; reasons.push('Earnings '+earningsDate+' within expiration window'); }
    if (!isDebit&&cushionPct!==null&&cushionPct<prefs.cushionMin) { signal='NO-GO'; reasons.push(cushionPct+'% cushion below your '+prefs.cushionMin+'% minimum'); }
    if (absDelta&&absDelta>prefs.deltaHigh) { signal=signal==='GO'?'CAUTION':signal; reasons.push('Delta ~'+absDelta.toFixed(3)+' above your '+prefs.deltaHigh+' target'); }
    if (aboveSupport&&supBelow[0]) { signal=signal==='GO'?'CAUTION':signal; reasons.push('Short strike $'+shortStrike+' above support $'+supBelow[0]); }
    if (!isDebit&&crWidthPct!==null&&crWidthPct<prefs.creditWidthMin) { signal=signal==='GO'?'CAUTION':signal; reasons.push('Credit is only '+crWidthPct+'% of spread width -- low return on risk'); }
    if (reasons.length===0) reasons.push('All checks passed -- structure looks solid');
    // BWB score
    const isBWBlike = ['PUT BUTTERFLY','CALL BUTTERFLY','PUT RATIO SPREAD','CALL RATIO SPREAD'].includes(azStrat);
    const bwbScore = isBWBlike ? scoreBWB(azLegData, credit, price, dte, earningsRisk) : null;
    const bwbInfo = isBWBlike ? calcBWBMaxLoss(azLegData, credit) : null;
    const be = isBWBlike ? calcBWBBreakeven(azLegData, credit) : (shortStrike>0&&credit>0?parseFloat((shortStrike-credit).toFixed(2)):null);
    const beCushion = price>0&&be ? parseFloat(((price-be)/price*100).toFixed(1)) : null;
    // Expected move
    const em = (price&&hv30&&dte) ? parseFloat((price*hv30*Math.sqrt(dte/365)).toFixed(2)) : null;
    const strikeOutsideEM = em&&shortStrike>0&&price>0 ? (price-shortStrike)>em : null;
    azResult = {ticker,strategy:azStrat,legs:azLegData.map(l=>({...l})),shortStrike,exp:expRaw,price,lastDate,credit,collateral,cushionPct,beCushion,breakeven:be,absDelta,deltaSource,hv30,dte,supports:supBelow,resistances:data?.resistances||[],exitSignal,earningsRisk,earningsDate,signal,bwbScore,bwbInfo,crWidthPct,isDebit,em};
    const sc3 = signal==='GO'?'#00e676':signal==='CAUTION'?'#ffd600':'#ff1744';
    let html = '<div class="res-hero fadein" style="border-color:'+sc3+'25;background:'+sc3+'08">'+
      '<div style="width:50px;height:50px;border-radius:50%;background:'+sc3+';color:#080c18;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:9px;letter-spacing:1px;flex-shrink:0">'+signal+'</div>'+
      '<div><div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:15px;color:'+sc3+'">'+ticker+' -- '+azStrat+'</div>'+
      '<div style="font-size:11px;color:var(--dim);margin-top:4px;line-height:1.6">'+reasons.join('. ')+'.</div>'+
      (lastDate?'<div style="font-size:9px;color:var(--muted);margin-top:3px">Price as of '+lastDate+'</div>':'')+
      '</div></div>';
    // BWB score block
    if (bwbScore) {
      html += '<div class="bwb-score" style="border-color:'+bwbScore.gc2+'25;background:'+bwbScore.gc2+'08">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
          '<div><div class="lbl" style="margin-bottom:4px">STRUCTURE QUALITY SCORE</div>'+
            '<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:32px;color:'+bwbScore.gc2+';line-height:1">'+bwbScore.grade+'</div>'+
            '<div style="font-size:11px;color:'+bwbScore.gc2+';margin-top:2px">'+bwbScore.gl+'</div>'+
          '</div>'+
          '<div style="text-align:right"><div style="font-size:28px;font-weight:800;font-family:\'Syne\',sans-serif;color:'+bwbScore.gc2+'">'+bwbScore.score+'</div><div style="font-size:8px;color:var(--muted)">/ 100</div></div>'+
        '</div>'+
        bwbScore.notes.map(n=>'<div class="bwb-row"><span style="color:var(--dim)">'+n+'</span></div>').join('')+
        '<div class="g3" style="margin-top:10px">'+
          mc2('CREDIT/MAX LOSS', bwbScore.crRatio+'%', bwbScore.crRatio>=20?'#00e676':bwbScore.crRatio>=12?'#ffd600':'#ff1744')+
          mc2('BE CUSHION', beCushion!==null?beCushion+'%':'N/A', beCushion!==null?cushC(beCushion):'var(--muted)')+
          mc2('MAX LOSS', bwbInfo?'$'+bwbInfo.maxLoss.toFixed(0):'N/A', 'var(--text)')+
        '</div>'+
        (bwbInfo?'<div style="font-size:10px;color:var(--dim);margin-top:8px;line-height:1.6">Upper: $'+bwbInfo.upper+' \u00b7 Lower: $'+bwbInfo.lower+' \u00b7 BE: $'+be+'</div>':'')+
      '</div>';
    }
    html += '<div class="g2">';
    html += mc2('DELTA', absDelta!==null?absDelta.toFixed(3):'N/A', absDelta?(absDelta<=prefs.deltaHigh?'#00e676':absDelta<=prefs.deltaHigh+.05?'#ffd600':'#ff1744'):'var(--muted)');
    html += mc2(isDebit?'BREAKEVEN':'CUSHION TO SHORT', isDebit?(be?'$'+be:'N/A'):(cushionPct!==null?cushionPct+'%':'N/A'), cushionPct!==null?cushC(cushionPct):'var(--muted)');
    html += mc2('LIVE PRICE', price?'$'+price:'N/A', 'var(--text)');
    html += mc2('DTE', dte!==null?dte+'d':'N/A', dte&&dte>=prefs.dteLow&&dte<=prefs.dteHigh?'#00e676':dte&&dte<prefs.dteLow?'#ffd600':'var(--dim)');
    html += mc2('HV30', (hv30*100).toFixed(1)+'%', 'var(--dim)');
    html += mc2('EXP MOVE (HV)', em?'$'+em:'N/A', em?'#ffd600':'var(--muted)');
    html += mc2('STRIKE vs EM', strikeOutsideEM===null?'N/A':strikeOutsideEM?'OUTSIDE \u2713':'INSIDE \u26a0', strikeOutsideEM===null?'var(--muted)':strikeOutsideEM?'#00e676':'#ffd600');
    if (crWidthPct!==null) html += mc2('CREDIT/WIDTH', crWidthPct+'%', crWidthPct>=prefs.creditWidthMin?'#00e676':crWidthPct>=prefs.creditWidthMin/2?'#ffd600':'#ff1744');
    html += mc2('EARNINGS', earningsRisk?'\u26a0 '+earningsDate:(earningsDate?'\u2713 '+earningsDate:'\u2713 CLEAR'), earningsRisk?'#ff1744':'#00e676');
    html += '</div>';
    html += '<div style="padding:7px 11px;margin-bottom:12px;border-radius:6px;font-size:9px;border:1px solid;'+(deltaSource==='Yahoo'?'background:rgba(0,230,118,.06);color:#00e676;border-color:rgba(0,230,118,.2)':'background:rgba(255,214,0,.06);color:#ffd600;border-color:rgba(255,214,0,.2)')+'">'+
      '<span class="'+(deltaSource==='Yahoo'?'real-tag':'est-tag')+'" style="margin-right:6px">'+(deltaSource==='Yahoo'?'REAL':'EST')+'</span>'+
      (deltaSource==='Yahoo'?'Delta from Yahoo Finance options chain.':'Delta estimated via HV30. Broker delta may differ on high-IV names.')+
    '</div>';
    if (supBelow.length>0) {
      html += '<div class="card"><span class="lbl">KEY LEVELS</span>'+
        '<div style="display:flex;gap:24px;margin-bottom:10px">'+
          '<div><div style="font-size:9px;color:#00e676;letter-spacing:1px;margin-bottom:6px">SUPPORT</div>'+supBelow.map(p=>'<div style="font-size:16px;font-weight:700;color:#00e676;font-family:\'DM Mono\',monospace">$'+p+'</div>').join('')+'</div>'+
          '<div><div style="font-size:9px;color:#ff1744;letter-spacing:1px;margin-bottom:6px">RESISTANCE</div>'+(data?.resistances||[]).map(p=>'<div style="font-size:16px;font-weight:700;color:#ff1744;font-family:\'DM Mono\',monospace">$'+p+'</div>').join('')+'</div>'+
        '</div>'+
        (exitSignal?'<div style="padding:8px 11px;background:rgba(255,23,68,.06);border-radius:7px;font-size:10px;color:#ff8a80;border:1px solid rgba(255,23,68,.15)">\u26a1 Exit signal -- Close if '+ticker+' breaks $'+exitSignal+'</div>':'')+
        '<div style="font-size:10px;color:var(--dim);margin-top:8px">SMA20: $'+(data?.sma20||'N/A')+' \u00b7 SMA50: $'+(data?.sma50||'N/A')+'</div>'+
      '</div>';
    }
    html += '<button class="btn btn-og btn-w" onclick="logFromAnalysis()">\u2713 I TOOK THIS TRADE -- LOG IT</button>';
    $('az-result').innerHTML = html;
  } catch(e) {
    $('az-result').innerHTML = '<p style="color:var(--red);font-size:11px;padding:12px">Fetch failed: '+e.message+'</p>';
  } finally {
    $('az-btn').disabled=false; $('az-btn').textContent='\u2192 ANALYZE';
  }
}

function logFromAnalysis() {
  if (!azResult) return;
  formStrat = azResult.strategy||'PUT CREDIT SPREAD';
  formLegData = azResult.legs||DEF[formStrat].map(l=>({...l}));
  nav('trades');
  setTimeout(() => {
    const tog = $('tfm-tog');
    if (tog && $('tfm')?.style.display==='none') tog.click();
    setTimeout(() => {
      if ($('tf-tk'))    $('tf-tk').value = azResult.ticker||'';
      if ($('tf-px'))    $('tf-px').value = azResult.price?.toFixed(2)||'';
      if ($('tf-exp'))   $('tf-exp').value = azResult.exp||'';
      if ($('tf-cr'))    $('tf-cr').value = azResult.credit?.toString()||'';
      if ($('tf-col'))   $('tf-col').value = azResult.collateral?.toFixed(0)||'';
      if ($('tf-exit'))  $('tf-exit').value = azResult.exitSignal?.toString()||'';

function buildEquityCurve() {
  const closed = trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const points = [];
  // Baseline as straight line
  const baselineEnd = hist.realizedPnl;
  const baselinePts = 20;
  for (let i=0;i<=baselinePts;i++) {
    points.push({x:i/baselinePts, y:baselineEnd*(i/baselinePts), baseline:true});
  }
  // Real trades
  let running = baselineEnd;
  closed.forEach((t,i) => {
    const cr = safeNum(t.creditReceived);
    const pnl = safeNum(t.currentPnlPct);
    running += cr*100*pnl/100;
    points.push({x:1+(i+1)/(Math.max(closed.length,1)+1), y:running, baseline:false});
  });
  return points;
}

function renderEquityChart(containerId) {
  const points = buildEquityCurve();
  if (!points.length) return '';
  const W=380, H=90;
  const ys = points.map(p=>p.y);
  const minY = Math.min(0,...ys), maxY = Math.max(...ys);
  const rangeY = maxY-minY || 1;
  const xs = points.map(p=>p.x);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const rangeX = maxX-minX || 1;
  const toSvgX = x => ((x-minX)/rangeX)*W;
  const toSvgY = y => H-((y-minY)/rangeY)*(H-10)-5;
  const baseEnd = points.filter(p=>p.baseline);
  const realPts = points.filter(p=>!p.baseline);
  const zeroY = toSvgY(0);
  let basePath='', realPath='';
  if (baseEnd.length) {
    basePath = baseEnd.map((p,i)=>(i===0?'M':'L')+toSvgX(p.x).toFixed(1)+' '+toSvgY(p.y).toFixed(1)).join(' ');
  }
  if (realPts.length) {
    const allPts = baseEnd.length ? [baseEnd[baseEnd.length-1],...realPts] : realPts;
    realPath = allPts.map((p,i)=>(i===0?'M':'L')+toSvgX(p.x).toFixed(1)+' '+toSvgY(p.y).toFixed(1)).join(' ');
  }
  const lastY = points[points.length-1]?.y || 0;
  const col = lastY >= 0 ? '#22c55e' : '#ef4444';
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block">
    <line x1="0" y1="${zeroY.toFixed(1)}" x2="${W}" y2="${zeroY.toFixed(1)}" stroke="#252d3d" stroke-width="1"/>
    ${basePath ? `<path d="${basePath}" stroke="#6366f140" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>` : ''}
    ${realPath ? `<path d="${realPath}" stroke="${col}" stroke-width="2" fill="none"/>` : ''}
    ${realPts.length ? `<circle cx="${toSvgX(realPts[realPts.length-1].x).toFixed(1)}" cy="${toSvgY(realPts[realPts.length-1].y).toFixed(1)}" r="3" fill="${col}"/>` : ''}
  </svg>`;
}

// =============================================================================
function renderGauge(score, sig) {
  const col = sig==='GREEN'?'#22c55e':sig==='YELLOW'?'#f59e0b':'#ef4444';
  const toRad = d => d * Math.PI / 180;
  const cx = 80, cy = 75, r = 58;
  const startDeg = -210, endDeg = 30; // 240 degree sweep, bottom-left to bottom-right
  const scoreDeg = startDeg + (score / 100) * (endDeg - startDeg);
  const arcX = d => cx + r * Math.cos(toRad(d));
  const arcY = d => cy + r * Math.sin(toRad(d));
  // Background track
  const bgLarge = (endDeg - startDeg) > 180 ? 1 : 0;
  const bgD = `M${arcX(startDeg).toFixed(1)} ${arcY(startDeg).toFixed(1)} A${r} ${r} 0 ${bgLarge} 1 ${arcX(endDeg).toFixed(1)} ${arcY(endDeg).toFixed(1)}`;
  // Score arc
  const scoreLarge = (scoreDeg - startDeg) > 180 ? 1 : 0;
  const scoreD = score > 0 ? `M${arcX(startDeg).toFixed(1)} ${arcY(startDeg).toFixed(1)} A${r} ${r} 0 ${scoreLarge} 1 ${arcX(scoreDeg).toFixed(1)} ${arcY(scoreDeg).toFixed(1)}` : '';
  // Needle
  const nx = (cx + (r - 10) * Math.cos(toRad(scoreDeg))).toFixed(1);
  const ny = (cy + (r - 10) * Math.sin(toRad(scoreDeg))).toFixed(1);
  return `<svg width="160" height="100" viewBox="0 0 160 100" style="display:block;margin:0 auto">
    <path d="${bgD}" stroke="#252d3d" stroke-width="9" fill="none" stroke-linecap="round"/>
    ${scoreD ? `<path d="${scoreD}" stroke="${col}" stroke-width="9" fill="none" stroke-linecap="round" opacity=".85"/>` : ''}
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="${col}"/>

  </svg>`;
}

// loadSignalData wrapper (uses existing loadSignal logic but returns data)
async function loadSignalData(force=false) {
  try {
    let mkt = !force ? gc(CK.mkt, TTL.mkt) : null;
    if (!mkt) {
      const [vix, fg] = await Promise.all([fetchVIX(), fetchFearGreed()]);
      await new Promise(r=>setTimeout(r,800));
      const batch = await fetchAVBatch(['SPY','QQQ','HYG','RSP']);
      mkt = {vix, fg, spy:batch.SPY, qqq:batch.QQQ, hyg:batch.HYG, rsp:batch.RSP};
      sc2(CK.mkt, mkt);
    }
    return mkt;
  } catch(e) { return null; }
}

async function renderCalendar() {
  const el = document.getElementById('page-calendar');
  if (!el) return;
  el.innerHTML = '<div class="lc"><div class="spin"></div><p>LOADING...</p></div>';
  const openTickers = [...new Set(trades.filter(t=>t.status==='OPEN').map(t=>t.ticker))];
  const earnMap = {};
  for (const tk of openTickers) {
    const e = await fetchEarnings(tk);
    if (e) earnMap[tk] = e;
    await new Promise(r=>setTimeout(r,600));
  }
  const today = new Date();
  let events = buildCalendarEvents();
  Object.entries(earnMap).forEach(([tk,e]) => {
    if (e && !events.find(ev=>ev.name.includes(tk)))
      events.push({d:new Date(e.date+'T12:00:00'),name:tk+' Earnings',sector:'Open Position',impact:'HIGH',note:'Active '+tk+' position \u2014 earnings within expiration = binary risk.',isPos:true});
  });
  events.sort((a,b)=>a.d-b.d);
  const upcoming = events.filter(ev=>Math.ceil((ev.d-today)/86400000)>=-1);
  const past = events.filter(ev=>Math.ceil((ev.d-today)/86400000)<-1);
  const ic = {HIGH:'var(--red)',MED:'var(--yellow)',LOW:'var(--green)'};

  function renderEvList(evs) {
    if (!evs.length) return '<div style="text-align:center;color:var(--text3);padding:30px;font-size:12px">No events</div>';
    const byM = {};
    evs.forEach(ev => {
      const away = Math.ceil((ev.d-today)/86400000);
      const mk = ev.d.toLocaleString('default',{month:'long',year:'numeric'});
      if (!byM[mk]) byM[mk]=[];
      byM[mk].push({...ev,away});
    });
    let html = '';
    Object.entries(byM).forEach(([month,evList]) => {
      html += '<div class="mhdr">'+month+'</div>';
      evList.forEach(ev => {
        const inDTE=ev.away>=0&&ev.away<=prefs.dteHigh;
        const imm=ev.away>=0&&ev.away<=5&&ev.impact==='HIGH';
        const dc=imm?'var(--red)':inDTE?'var(--yellow)':'var(--text)';
        const away=ev.away<=0?'Today':ev.away===1?'Tmr':ev.away<0?Math.abs(ev.away)+'d ago':ev.away+'D';
        html += '<div class="cal-ev '+(imm?'imm':inDTE?'dte':'')+'">'+
          '<div class="cal-date-box">'+
            '<div class="cal-day" style="color:'+dc+'">'+ev.d.getDate()+'</div>'+
            '<div class="cal-mon">'+ev.d.toLocaleString('default',{month:'short'})+'</div>'+
          '</div>'+
          '<div style="flex:1">'+
            '<div style="font-size:13px;font-weight:600;margin-bottom:3px">'+ev.name+(ev.isPos?' <span style="font-size:9px;color:var(--blue2)">[OPEN]</span>':'')+'</div>'+
            (ev.note?'<div style="font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:4px">'+ev.note+'</div>':'')+
            '<div style="display:flex;gap:4px;flex-wrap:wrap">'+
              '<span class="chip" style="background:var(--surface2);color:var(--text3);font-size:9px">'+ev.sector+'</span>'+
              '<span class="chip" style="background:'+ic[ev.impact]+'18;color:'+ic[ev.impact]+';font-size:9px">'+ev.impact+'</span>'+
              (inDTE?'<span class="chip" style="background:var(--yellow-dim);color:var(--yellow);font-size:9px">IN DTE</span>':'')+
              (imm?'<span class="chip" style="background:var(--red-dim);color:var(--red);font-size:9px">IMMINENT</span>':'')+
            '</div>'+
          '</div>'+
          '<div style="text-align:right;flex-shrink:0;min-width:34px">'+
            '<div style="font-family:var(--mono);font-size:11px;font-weight:600;color:'+dc+'">'+away+'</div>'+
          '</div>'+
        '</div>';
      });
    });
    return html;
  }

  let activeTab = 'upcoming';
  function render() {
    const tabs = el.querySelector('.cal-tabs');
    if (tabs) tabs.querySelectorAll('.cal-tab').forEach((t,i)=>t.classList.toggle('active',i===(activeTab==='upcoming'?0:1)));
    const cc = document.getElementById('cal-content');
    if (cc) cc.innerHTML = activeTab==='upcoming'?renderEvList(upcoming):renderEvList(past);
  }

  el.innerHTML = '<div style="text-align:right;padding:0 16px 6px"><button class="btn btn-ghost btn-sm" onclick="showPage(\'sectors\')" style="font-size:10px">View Sectors &#8594;</button></div>'+
    '<div class="cal-tabs">'+
    '<div class="cal-tab active" id="cal-tab-up">Upcoming</div>'+
    '<div class="cal-tab" id="cal-tab-past">Past Events</div>'+
    '</div>'+
    '<div id="cal-content"></div>';

  el.querySelector('#cal-tab-up').onclick = () => { activeTab='upcoming'; render(); el.querySelector('#cal-tab-up').classList.add('active'); el.querySelector('#cal-tab-past').classList.remove('active'); };
  el.querySelector('#cal-tab-past').onclick = () => { activeTab='past'; render(); el.querySelector('#cal-tab-past').classList.add('active'); el.querySelector('#cal-tab-up').classList.remove('active'); };
  render();
}

      ${tags.length>0?`<div style="margin-bottom:8px">${tags.map(tg=>`<span style="display:inline-flex;padding:2px 7px;border-radius:5px;font-size:9px;background:var(--blue-dim);border:1px solid rgba(99,102,241,.2);color:var(--blue2);font-family:var(--mono);margin:0 3px 3px 0">${tg}</span>`).join('')}</div>`:''}
      ${t.notes?`<div style="font-size:11px;color:var(--text2);margin-bottom:8px;padding:7px 10px;background:var(--surface2);border-radius:7px;border:1px solid var(--border)">${t.notes}</div>`:''}
      ${t.exitSignal?`<div style="padding:7px 10px;background:var(--red-dim);border-radius:7px;font-size:11px;color:var(--red);margin-bottom:8px;border:1px solid rgba(239,68,68,.2)">&#9889; Exit if ${t.ticker} breaks $${t.exitSignal}</div>`:''}
      <div style="display:flex;gap:5px">
        <input type="number" placeholder="P&L %" value="${t.currentPnlPct||''}" onblur="updPnl(${t.id},this.value)" style="flex:1;font-family:var(--mono);font-size:13px;color:${pnl>=40?'var(--green)':pnl<-15?'var(--red)':'var(--text)'}">
        <button onclick="closeT(${t.id},'PROFIT')" class="btn btn-success btn-sm">&#10003; Win</button>
        <button onclick="closeT(${t.id},'STOP')" class="btn btn-danger btn-sm">&#10007; Loss</button>
        <button onclick="showAssignedModal(${t.id})" class="btn btn-yellow btn-sm" style="font-size:9px">Assign</button>
        <button onclick="delT(${t.id})" class="btn btn-ghost btn-sm">&#128465;</button>
      </div>
    </div>`;
  });
  if (recent.length>0) {
    html += `<div class="mhdr">Recently Closed</div>`;
    recent.forEach(t=>html+=closedRow(t));
  }
  if (old.length>0) {
    html += `<button class="btn btn-ghost btn-w" style="margin:6px 12px 6px;width:calc(100% - 24px)" onclick="showHistory=!showHistory;renderTrades()">${showHistory?'&#9650; Hide':'&#9660; Show'} Older Trades (${old.length})</button>`;
    if (showHistory) old.forEach(t=>html+=closedRow(t));
  }
  html += '</div>';
  el.innerHTML = html;
  formLegData = DEF[formStrat]?DEF[formStrat].map(l=>({...l})):[{a:'BUY',t:'PUT',n:1,s:''}];
  buildLegs();
}

function toggleTradeForm() {
  const f=document.getElementById('tfm');
  const show=f.style.display==='none';
  f.style.display=show?'block':'none';
  if (show){selectedTags=[];buildLegs();}
}

function closedRow(t) {
  const pnl=safeNum(t.currentPnlPct);
  const isAssigned=t.closeReason==='ASSIGNED';
  const crCol=isAssigned?'var(--yellow)':pnl>0?'var(--green)':'var(--red)';
  return `<div style="display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px;margin:0 12px 6px;opacity:.8">
    <div style="flex:1">
      <span style="font-family:var(--mono);font-weight:600;color:var(--text2);margin-right:7px">${t.ticker}</span>
      <span style="font-size:10px;color:var(--text3)">${t.strategy}</span>
      ${t.expDate?`<div style="font-size:10px;color:var(--text3);margin-top:1px">${t.expDate}</div>`:''}
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${crCol}">${pnl>0?'+':''}${pnl}%</span>
      <span class="chip" style="background:${crCol}15;color:${crCol};font-size:9px">${t.closeReason||'CLOSED'}</span>
      <button onclick="delT(${t.id})" style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px">&#10005;</button>
    </div>
  </div>`;
}

// =============================================================================
// STATS PAGE
// =============================================================================
function renderStats() {
  const el = document.getElementById('page-stats');
  if (!el) return;
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const open=trades.filter(t=>t.status==='OPEN');
  const nw=closed.filter(t=>safeNum(t.currentPnlPct)>0).length;
  const nTotal=hist.totalTrades+closed.length,nWins=hist.wins+nw;
  const totalPnl=hist.realizedPnl+closed.reduce((acc,t)=>{const cr=safeNum(t.creditReceived);return acc+(cr*100*(safeNum(t.currentPnlPct))/100);},0);
  const wr=nTotal>0?((nWins/nTotal)*100).toFixed(1):hist.winPct.toFixed(1);
  const wrc=parseFloat(wr)>70?'var(--green)':parseFloat(wr)>55?'var(--yellow)':'var(--red)';
  const colInUse=open.reduce((a,t)=>a+safeNum(t.maxRisk),0);
  let html = `<div class="fadeup">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 12px;margin-bottom:10px">
      <div class="tile"><div class="tile-label">Win Rate</div><div class="tile-value" style="color:${wrc}">${wr}%</div></div>
      <div class="tile"><div class="tile-label">Trades</div><div class="tile-value">${nTotal}</div></div>
      <div class="tile"><div class="tile-label">P&amp;L</div><div class="tile-value" style="color:var(--green);font-size:14px">$${totalPnl.toFixed(0)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px;margin-bottom:10px">
      ${mc2('Wins / Losses',nWins+' / '+(nTotal-nWins),nWins>nTotal-nWins?'var(--green)':'var(--yellow)')}
      ${mc2('Profit Factor',hist.profitFactor.toFixed(2),'var(--green)')}
      ${mc2('Avg Win','+'+hist.avgWinPct+'%','var(--green)')}
      ${mc2('Avg Loss',hist.avgLossPct+'%','var(--red)')}
      ${mc2('Open Now',open.length,'var(--blue2)')}
      ${mc2('Collateral Used','$'+colInUse.toFixed(0),'var(--yellow)')}
    </div>`;

  // Equity Curve
  html += `<div class="chart-wrap">
    <div class="chart-container">
      <div class="chart-header">
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">Equity Curve</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px">Dashed = baseline (self-reported)</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:${totalPnl>=0?'var(--green)':'var(--red)'}">$${totalPnl.toFixed(0)}</div>
          <div style="font-size:10px;color:var(--text3)">All time</div>
        </div>
      </div>
      ${renderEquityChart('equity-chart')}
    </div>
  </div>`;

  // Trade log
  html += `<div class="card">
    <div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Trade Log</div>
    <div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <span style="font-family:var(--mono);font-weight:700;color:var(--blue2);margin-right:7px">BASELINE</span>
        <span style="font-size:10px;color:var(--text3)">${hist.totalTrades} trades &bull; 5 weeks pre-OptionsPlus</span>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${hist.winPct}% win rate &bull; 2.84 profit factor</div>
      </div>
      <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)">+$${hist.realizedPnl}</span>
    </div>`;
  [...closed,...open].sort((a,b)=>b.id-a.id).forEach(t=>{
    const pnl=safeNum(t.currentPnlPct),isOpen=t.status==='OPEN';
    const cr=safeNum(t.creditReceived),dp=isOpen?null:(cr*100*pnl/100);
    const isAssigned=t.closeReason==='ASSIGNED';
    const crCol=isAssigned?'var(--yellow)':pnl>0?'var(--green)':'var(--red)';
    html += `<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <span style="font-family:var(--mono);font-weight:600;${isOpen?'color:var(--text)':'color:var(--text2)'};margin-right:7px">${t.ticker}</span>
        <span style="font-size:10px;color:var(--text3)">${t.strategy}</span>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${t.expDate||''} ${isOpen?'&bull; <span style="color:var(--blue2)">OPEN</span>':'&bull; '+(t.closeReason||'CLOSED')}</div>
        ${t.tags?.length?`<div style="margin-top:3px">${t.tags.map(tg=>`<span style="font-size:8px;padding:1px 5px;border-radius:4px;background:var(--blue-dim);color:var(--blue2);margin-right:3px">${tg}</span>`).join('')}</div>`:''}
      </div>
      <div style="text-align:right">
        ${isOpen?`<span class="badge" style="background:var(--blue-dim);border:1px solid rgba(99,102,241,.25);color:var(--blue2);font-size:9px">OPEN</span>`:
          `<div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${crCol}">${pnl>0?'+':''}${pnl}%</div>${dp!==null?`<div style="font-size:10px;color:var(--text3)">$${dp.toFixed(0)}</div>`:''}`}
      </div>
    </div>`;
  });
  html += `</div>`;

  // By strategy
  if (closed.length>0) {
    const byS={};
    closed.forEach(t=>{
      const k=t.strategy||'UNKNOWN',cr=safeNum(t.creditReceived),col2=safeNum(t.maxRisk)||100;
      const pnl=safeNum(t.currentPnlPct),roc=(cr*100*pnl/100)/col2*100;
      const legs=t.legs||[],sell=legs.find(l=>l.a==='SELL'),buy=legs.find(l=>l.a==='BUY');
      const w=sell&&buy?Math.abs(safeNum(sell.s)-safeNum(buy.s)):0;
      if(!byS[k])byS[k]={wins:0,losses:0,roc:0,count:0,widths:[],cols:[]};
      if(pnl>0)byS[k].wins++;else byS[k].losses++;
      byS[k].roc+=roc;byS[k].count++;if(w>0)byS[k].widths.push(w);if(col2>0)byS[k].cols.push(col2);
    });
    html += `<div class="card"><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">By Strategy</div>`;
    Object.entries(byS).forEach(([s,d])=>{
      const wr2=((d.wins/d.count)*100).toFixed(0),ar=(d.roc/d.count).toFixed(1);
      const aw=d.widths.length?(d.widths.reduce((a,b)=>a+b,0)/d.widths.length).toFixed(1):'N/A';
      const ac=d.cols.length?(d.cols.reduce((a,b)=>a+b,0)/d.cols.length).toFixed(0):'N/A';
      const wc=parseInt(wr2)>=65?'var(--green)':'var(--yellow)';
      html += `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;font-weight:600">${s}</span>
          <div style="display:flex;gap:5px">
            <span class="chip" style="background:${wc}15;color:${wc};font-size:9px">${wr2}% Win</span>
            <span class="chip" style="background:var(--surface3);color:var(--text3);font-size:9px">${d.count}&times;</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          ${mc2('Avg Width',aw!=='N/A'?'$'+aw:'N/A','var(--text)')}
          ${mc2('Avg Collateral',ac!=='N/A'?'$'+ac:'N/A','var(--text)')}
          ${mc2('Avg ROC',(parseFloat(ar)>0?'+':'')+ar+'%',parseFloat(ar)>0?'var(--green)':'var(--red)')}
        </div>
        <div style="height:3px;background:var(--surface3);border-radius:2px;margin-top:7px"><div style="height:100%;width:${wr2}%;background:${wc};border-radius:2px"></div></div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<div class="card">
    <div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Historical Baseline</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:10px">${hist.totalTrades} trades &bull; ${hist.winPct}% win rate &bull; $${hist.realizedPnl} P&amp;L &bull; ${hist.profitFactor} profit factor<br>Avg winner: +${hist.avgWinPct}% &bull; Avg loser: ${hist.avgLossPct}%</div>
    <button class="btn btn-ghost btn-sm" onclick="editHist()">Edit Numbers</button>
  </div>
  <div class="card" id="cc">
    <div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">AI Coaching</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px">Works in Claude.ai. Needs backend for GitHub Pages.</div>
    <button class="btn btn-purple btn-w" onclick="getCoaching()">&#10022; Generate Coaching Insight</button>
    <div id="co" style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.7"></div>
  </div></div>`;
  el.innerHTML = html;
}
