<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TRADEWATCH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500;700&display=swap');
:root{--bg:#0a0e1a;--card:#111827;--deep:#060a12;--border:#1e2535;--green:#00e676;--yellow:#ffd600;--red:#ff1744;--muted:#5a6a7e;--dim:#8892a4;--text:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spinner{width:28px;height:28px;border:3px solid var(--green);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2535;border-radius:2px}
#app{max-width:700px;margin:0 auto;padding-bottom:60px}
/* Header */
.hdr{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px}
.logo span{color:var(--green)}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.sig-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;transition:all .3s}
/* Tabs */
.tabs{display:flex;padding:14px 16px 0;border-bottom:1px solid var(--border);overflow-x:auto;gap:0}
.tab{flex:1 0 auto;padding:9px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;letter-spacing:1px;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab.active{border-bottom-color:var(--green);color:var(--text)}
.content{padding:16px}
/* Cards */
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px}
.lbl{font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:12px;display:block}
/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.mc{background:var(--deep);border-radius:8px;padding:10px 12px}
.mc-l{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.mc-v{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
/* Score bar */
.sb{margin-bottom:14px}
.sb-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px}
.sb-track{height:5px;background:#1e2535;border-radius:3px}
.sb-fill{height:100%;border-radius:3px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
/* Buttons */
.btn{padding:11px 16px;border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s;display:inline-block}
.btn-w{width:100%}
.btn-g{background:var(--green);color:var(--bg)}
.btn-g:disabled{background:#1e2535;color:var(--muted);cursor:default}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-og{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.btn-purple{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);color:#a78bfa}
/* Inputs */
input,select,textarea{width:100%;background:#1e2535;border:1px solid #2d3748;border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:9px 11px;outline:none;box-sizing:border-box}
textarea{resize:vertical;line-height:1.6}
select{appearance:none;cursor:pointer}
.fld{margin-bottom:10px}
.fld label{font-size:9px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:5px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
/* Calendar */
.cal-ev{display:flex;gap:12px;padding:12px 14px;border-radius:10px;margin-bottom:8px;align-items:flex-start;border:1px solid var(--border);background:var(--card);transition:all .2s}
.cal-ev.dte{background:rgba(255,214,0,.03);border-color:rgba(255,214,0,.3)}
.cal-ev.imminent{background:rgba(255,23,68,.03);border-color:rgba(255,23,68,.25)}
.cal-date{min-width:38px;text-align:center;padding-top:2px}
.cal-day{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;line-height:1;color:var(--text)}
.cal-mon{font-size:8px;color:var(--muted);letter-spacing:1px}
.cal-body{flex:1}
.cal-name{font-size:12px;color:var(--text);margin-bottom:4px;font-weight:500}
.cal-note{font-size:10px;color:var(--dim);line-height:1.5;margin-bottom:5px}
.cal-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:8px;letter-spacing:.5px;font-family:'DM Mono',monospace}
.cal-right{text-align:right;flex-shrink:0;padding-top:2px}
.cal-away{font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.impact-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-bottom:4px}
/* Sectors */
.sec-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:14px;border-left:4px solid transparent}
.sec-info{flex:1}
.sec-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:3px}
.sec-note{font-size:10px;color:var(--dim);line-height:1.4}
.sec-perf{text-align:right;flex-shrink:0}
.sec-pct{font-size:16px;font-weight:700;font-family:'DM Mono',monospace}
.sec-rel{font-size:9px;color:var(--muted);margin-top:2px}
/* Analyze */
.res-hero{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;margin-bottom:14px}
.res-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-size:9px;letter-spacing:1px}
.leg-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;padding:10px 12px;background:var(--deep);border-radius:8px}
.leg-row.sell{border:1px solid rgba(255,23,68,.25)}
.leg-row.buy-l{border:1px solid rgba(0,230,118,.25)}
/* Trades */
.tc{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.tc.low{border-color:rgba(255,23,68,.35)}
.tc.warn{border-color:rgba(255,214,0,.35)}
.leg-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:9px;margin:0 4px 4px 0;font-family:'DM Mono',monospace}
.lb-sell{background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.2);color:var(--red)}
.lb-buy{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:var(--green)}
.strat-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.sp{padding:5px 10px;border-radius:6px;font-size:9px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;font-family:'DM Mono',monospace;transition:all .15s}
.sp.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}
/* Stats */
.stat-hero{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.sh{background:var(--deep);border-radius:10px;padding:14px;text-align:center}
.sh-v{font-size:24px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.sh-l{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:4px}
.wbar{height:4px;background:#1e2535;border-radius:2px;margin-top:8px}
.wbar-f{height:100%;border-radius:2px}
/* Badges */
.data-live{display:inline-flex;align-items:center;gap:5px;font-size:9px;color:var(--muted);margin-top:6px}
.dl-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.est-badge{font-size:8px;padding:1px 5px;border-radius:4px;background:rgba(255,214,0,.15);color:var(--yellow);border:1px solid rgba(255,214,0,.3);margin-left:4px}
.real-badge{font-size:8px;padding:1px 5px;border-radius:4px;background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3);margin-left:4px}
/* Alert */
.alert{padding:7px 11px;border-radius:7px;font-size:10px;margin-bottom:9px}
.alert-r{background:rgba(255,23,68,.08);color:var(--red);border:1px solid rgba(255,23,68,.2)}
.alert-y{background:rgba(255,214,0,.08);color:var(--yellow);border:1px solid rgba(255,214,0,.2)}
/* Loading */
.lc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:260px;gap:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:8px;font-size:11px;letter-spacing:1px;z-index:999;display:none;white-space:nowrap}
.month-hdr{font-size:10px;color:var(--green);letter-spacing:2px;margin:18px 0 8px;font-weight:700;font-family:'Syne',sans-serif}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="logo">TRADE<span>WATCH</span></div>
      <div class="logo-sub" id="hdr-date"></div>
    </div>
    <div class="sig-pill" id="hdr-sig" style="display:none"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="nav('signal')">SIGNAL</button>

    <button class="tab" onclick="nav('sectors')">SECTORS</button>
    <button class="tab" onclick="nav('analyze')">ANALYZE</button>
    <button class="tab" onclick="nav('trades')">TRADES</button>

    <div id="t-signal"></div>

    <div id="t-sectors" style="display:none"></div>
    <div id="t-analyze" style="display:none"></div>

</div>
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────────
const AV = 'J0BM2LMG9Z7SFZFV';
const PROXY = 'https://api.allorigins.win/get?url=';
const CACHE_MKT = 'tw5_mkt';   // 4hr cache
const CACHE_SEC = 'tw5_sec';   // 4hr cache
const TRADES_K  = 'tw5_trades';
const HIST_K    = 'tw5_hist';
const EARN_K    = 'tw5_earn';  // earnings cache per ticker 12hr
const TTL_MKT   = 4 * 60 * 60 * 1000;
const TTL_EARN  = 12 * 60 * 60 * 1000;

// ─── STATE ─────────────────────────────────────────────────────────────────────
let trades  = JSON.parse(localStorage.getItem(TRADES_K) || '[]');
let hist    = JSON.parse(localStorage.getItem(HIST_K) || JSON.stringify({
  totalTrades:56, wins:42, losses:13, breakeven:1,
  realizedPnl:736, winPct:76.36, avgWinPct:51.71,
  avgLossPct:-47.56, profitFactor:2.84
}));
let curTab  = 'signal';
let formLegs = [];
let formStrat = 'PUT CREDIT SPREAD';
let azLegs  = [];
let azResult = null;

const STRATS = ['PUT CREDIT SPREAD','BWB / PUT RATIO','CASH SECURED PUT','COVERED CALL','CALL CREDIT SPREAD','IRON CONDOR','PUT DEBIT SPREAD','CALL DEBIT SPREAD','OTHER'];
const DEF_LEGS = {
  'PUT CREDIT SPREAD':  [{a:'SELL',t:'PUT',n:1,s:''},{a:'BUY',t:'PUT',n:1,s:''}],
  'BWB / PUT RATIO':    [{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'PUT',n:2,s:''},{a:'BUY',t:'PUT',n:1,s:''}],
  'CASH SECURED PUT':   [{a:'SELL',t:'PUT',n:1,s:''}],
  'COVERED CALL':       [{a:'SELL',t:'CALL',n:1,s:''}],
  'CALL CREDIT SPREAD': [{a:'SELL',t:'CALL',n:1,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'IRON CONDOR':        [{a:'SELL',t:'PUT',n:1,s:''},{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'CALL',n:1,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'PUT DEBIT SPREAD':   [{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'PUT',n:1,s:''}],
  'CALL DEBIT SPREAD':  [{a:'BUY',t:'CALL',n:1,s:''},{a:'SELL',t:'CALL',n:1,s:''}],
  'OTHER':              [{a:'BUY',t:'PUT',n:1,s:''}]
};

// ─── UTILS ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const sc = s => s==='GREEN'?'#00e676':s==='YELLOW'?'#ffd600':'#ff1744';
const bc = s => s>=62?'#00e676':s>=42?'#ffd600':'#ff1744';
const cc = p => p>=7?'#00e676':p>=4?'#ffd600':'#ff1744';
const saveTrades = () => localStorage.setItem(TRADES_K, JSON.stringify(trades));
const saveHist   = () => localStorage.setItem(HIST_K, JSON.stringify(hist));

function toast(msg,dur=2800){
  const t=$('toast'); t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',dur);
}

function nav(name){
  curTab=name;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['signal','calendar','sectors','analyze','trades','stats'][i]===name);
  });
  ['signal','calendar','sectors','analyze','trades','stats'].forEach(n=>{
    $('t-'+n).style.display = n===name?'block':'none';
  });
  if(name==='trades')  renderTrades();
  if(name==='stats')   renderStats();
  if(name==='calendar')renderCalendar();
  if(name==='sectors') loadSectors();
}

// ─── CACHE HELPERS ─────────────────────────────────────────────────────────────
function getCache(key,ttl){
  try{
    const c = JSON.parse(localStorage.getItem(key)||'null');
    if(c && (Date.now()-c.ts)<ttl) return c.data;
  }catch(e){}
  return null;
}
function setCache(key,data){
  localStorage.setItem(key,JSON.stringify({data,ts:Date.now()}));
}

// ─── BLACK-SCHOLES DELTA ────────────────────────────────────────────────────────
function normCDF(x){
  const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911;
  const sign=x<0?-1:1; x=Math.abs(x)/Math.sqrt(2);
  const t=1/(1+p*x);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return .5*(1+sign*y);
}
function bsDelta(S,K,T,sigma,type='put'){
  if(T<=0||sigma<=0||S<=0||K<=0) return null;
  const d1=(Math.log(S/K)+(0.5*sigma*sigma)*T)/(sigma*Math.sqrt(T));
  if(type==='call') return normCDF(d1);
  return normCDF(d1)-1; // put delta (negative)
}
function calcHV(closes,days=30){
  if(closes.length<days+1) return 0.3;
  const slice=closes.slice(0,days+1);
  const returns=[];
  for(let i=0;i<slice.length-1;i++) returns.push(Math.log(slice[i]/slice[i+1]));
  const mean=returns.reduce((a,b)=>a+b,0)/returns.length;
  const variance=returns.reduce((a,r)=>a+Math.pow(r-mean,2),0)/(returns.length-1);
  return Math.sqrt(variance*252);
}

// ─── DATA FETCHERS ─────────────────────────────────────────────────────────────

// VIX via CORS proxy → Yahoo Finance
async function fetchVIX(){
  try{
    const url = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=15d');
    const r = await fetch(PROXY+url);
    const wrapper = await r.json();
    const d = JSON.parse(wrapper.contents);
    const prices = d.chart.result[0].indicators.quote[0].close.filter(Boolean);
    const timestamps = d.chart.result[0].timestamp;
    const current = prices[prices.length-1];
    const prev5   = prices[Math.max(0,prices.length-6)];
    const chg = ((current-prev5)/prev5*100);
    const date = new Date(timestamps[timestamps.length-1]*1000)
      .toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return {level:parseFloat(current.toFixed(2)),chg:parseFloat(chg.toFixed(1)),date,ok:true};
  }catch(e){
    console.warn('VIX proxy failed, trying query2');
    try{
      const url2=encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=15d');
      const r2=await fetch(PROXY+url2);
      const w2=await r2.json();
      const d2=JSON.parse(w2.contents);
      const prices=d2.chart.result[0].indicators.quote[0].close.filter(Boolean);
      const current=prices[prices.length-1];
      const prev5=prices[Math.max(0,prices.length-6)];
      return {level:parseFloat(current.toFixed(2)),chg:parseFloat(((current-prev5)/prev5*100).toFixed(1)),date:'recent',ok:true};
    }catch(e2){return {level:null,chg:0,date:'N/A',ok:false};}
  }
}

// SPY daily → price, SMA50, SMA200, historical vol
async function fetchSPY(){
  try{
    const r=await fetch(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=SPY&outputsize=compact&apikey=${AV}`);
    const d=await r.json();
    const ts=d['Time Series (Daily)']; if(!ts) throw new Error('no data');
    const dates=Object.keys(ts).sort().reverse();
    const closes=dates.map(dt=>parseFloat(ts[dt]['4. close']));
    const price=closes[0];
    const sma50=closes.slice(0,50).reduce((a,b)=>a+b,0)/Math.min(50,closes.length);
    const sma200=closes.slice(0,200).reduce((a,b)=>a+b,0)/Math.min(200,closes.length);
    const hv=calcHV(closes,20);
    return {price:parseFloat(price.toFixed(2)),sma50:parseFloat(sma50.toFixed(2)),sma200:parseFloat(sma200.toFixed(2)),above50:price>sma50,above200:price>sma200,hv,ok:true};
  }catch(e){return {price:0,above50:true,above200:true,sma50:0,sma200:0,hv:.2,ok:false};}
}

// QQQ 50MA check
async function fetchQQQ(){
  try{
    const r=await fetch(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=QQQ&outputsize=compact&apikey=${AV}`);
    const d=await r.json();
    const ts=d['Time Series (Daily)']; if(!ts) throw new Error();
    const dates=Object.keys(ts).sort().reverse();
    const closes=dates.map(dt=>parseFloat(ts[dt]['4. close']));
    const price=closes[0];
    const sma50=closes.slice(0,50).reduce((a,b)=>a+b,0)/Math.min(50,closes.length);
    return {above50:price>sma50,price:parseFloat(price.toFixed(2)),sma50:parseFloat(sma50.toFixed(2)),ok:true};
  }catch(e){return {above50:true,price:0,ok:false};}
}

// HYG for credit spread proxy
async function fetchCredit(){
  try{
    const r=await fetch(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=HYG&outputsize=compact&apikey=${AV}`);
    const d=await r.json();
    const ts=d['Time Series (Daily)']; if(!ts) throw new Error();
    const dates=Object.keys(ts).sort().reverse();
    const now=parseFloat(ts[dates[0]]['4. close']);
    const prev=parseFloat(ts[dates[Math.min(5,dates.length-1)]]['4. close']);
    const chg=parseFloat(((prev-now)/prev*100*10).toFixed(1)); // invert: HYG down = spreads widen
    return {chg,ok:true};
  }catch(e){return {chg:0,ok:false};}
}

// Live quote + daily closes for any ticker
async function fetchQuoteAndCloses(ticker){
  try{
    const r=await fetch(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&outputsize=compact&apikey=${AV}`);
    const d=await r.json();
    const ts=d['Time Series (Daily)']; if(!ts) throw new Error('no data for '+ticker);
    const dates=Object.keys(ts).sort().reverse();
    const closes=dates.map(dt=>parseFloat(ts[dt]['4. close']));
    const highs=dates.map(dt=>parseFloat(ts[dt]['2. high']));
    const lows=dates.map(dt=>parseFloat(ts[dt]['3. low']));
    const price=closes[0];
    const hv30=calcHV(closes,30);
    const hv20=calcHV(closes,20);
    // Support / resistance
    const sma20=closes.slice(0,20).reduce((a,b)=>a+b,0)/Math.min(20,closes.length);
    const sma50=closes.slice(0,50).reduce((a,b)=>a+b,0)/Math.min(50,closes.length);
    const supports=new Set([Math.round(sma20*4)/4,Math.round(sma50*4)/4]);
    const resistances=new Set();
    for(let i=2;i<Math.min(25,lows.length-2);i++){
      if(lows[i]<lows[i-1]&&lows[i]<lows[i+1]&&lows[i]<lows[i-2]) supports.add(Math.round(lows[i]*4)/4);
      if(highs[i]>highs[i-1]&&highs[i]>highs[i+1]) resistances.add(Math.round(highs[i]*4)/4);
    }
    const supArr=[...supports].filter(s=>s<price).sort((a,b)=>b-a).slice(0,3);
    const resArr=[...resistances].filter(r=>r>price).sort((a,b)=>a-b).slice(0,2);
    return {price:parseFloat(price.toFixed(2)),closes,highs,lows,hv30,hv20,sma20:parseFloat(sma20.toFixed(2)),sma50:parseFloat(sma50.toFixed(2)),supports:supArr,resistances:resArr,ok:true};
  }catch(e){return {price:0,closes:[],highs:[],lows:[],hv30:.3,hv20:.3,sma20:0,sma50:0,supports:[],resistances:[],ok:false};}
}

// Earnings calendar
async function fetchEarnings(ticker){
  const cacheKey=EARN_K+'_'+ticker;
  const cached=getCache(cacheKey,TTL_EARN);
  if(cached) return cached;
  try{
    const r=await fetch(`https://www.alphavantage.co/query?function=EARNINGS_CALENDAR&symbol=${ticker}&horizon=3month&apikey=${AV}`);
    const text=await r.text();
    const lines=text.trim().split('\n');
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',');
      if(cols[0]?.toUpperCase()===ticker.toUpperCase()){
        const result={ticker:cols[0],date:cols[2],estimate:cols[3]};
        setCache(cacheKey,result);
        return result;
      }
    }
    setCache(cacheKey,null);
    return null;
  }catch(e){return null;}
}

// Sector 5-day performance
async function fetchSectorPerf(){
  const syms=['XLK','XLE','XLF','XLV','XLY','XLI','XLC','SOXX','SPY'];
  const results={};
  for(const sym of syms){
    try{
      const r=await fetch(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${sym}&outputsize=compact&apikey=${AV}`);
      const d=await r.json();
      const ts=d['Time Series (Daily)'];
      if(ts){
        const dates=Object.keys(ts).sort().reverse();
        const now=parseFloat(ts[dates[0]]['4. close']);
        const prev=parseFloat(ts[dates[Math.min(5,dates.length-1)]]['4. close']);
        results[sym]=parseFloat(((now-prev)/prev*100).toFixed(2));
      } else results[sym]=null;
    }catch(e){results[sym]=null;}
    await new Promise(r=>setTimeout(r,400)); // rate limit buffer
  }
  return results;
}

// ─── SCORING ───────────────────────────────────────────────────────────────────
function scoreVIX(level,chg,inv){
  let s=62;
  if(!level) return s;
  if(level<16)s+=18;else if(level<20)s+=10;else if(level<24)s+=2;
  else if(level<28)s-=10;else if(level<33)s-=22;else s-=38;
  if(chg>35)s-=28;else if(chg>20)s-=16;else if(chg>12)s-=7;
  else if(chg<-15)s+=8;else if(chg<-8)s+=4;
  if(inv)s-=20;
  return Math.max(0,Math.min(100,s));
}
function scoreStruct(s50,s200,q50,breadth){
  let s=55;
  if(s50)s+=15;else s-=18;
  if(s200)s+=10;else s-=10;
  if(q50)s+=10;else s-=8;
  if(breadth>65)s+=12;else if(breadth>50)s+=4;else if(breadth>38)s-=4;else s-=18;
  return Math.max(0,Math.min(100,s));
}
function scoreSent(csc){
  let s=65;
  if(csc>20)s-=28;else if(csc>10)s-=15;else if(csc>4)s-=7;
  else if(csc<-5)s+=10;
  return Math.max(0,Math.min(100,s));
}
function getSignal(vs,ss,sent){
  const w=vs*.40+ss*.35+sent*.15+10;
  if(Math.min(vs,ss)<25||w<36) return 'RED';
  if(Math.min(vs,ss)<42||w<56) return 'YELLOW';
  return 'GREEN';
}

function sbar(label,score,weight){
  const c=bc(score);
  return`<div class="sb"><div class="sb-row"><span style="color:var(--dim)">${label}</span><span style="color:${c}">${Math.round(score)}/100 · ${weight}</span></div><div class="sb-track"><div class="sb-fill" style="width:${score}%;background:${c}"></div></div></div>`;
}
function mc(label,val,color){
  return`<div class="mc"><div class="mc-l">${label}</div><div class="mc-v" style="color:${color||'var(--text)'}">${val}</div></div>`;
}

function buildGuidance(sig,vix,spy,credit){
  if(sig==='GREEN'){
    return`${vix.ok&&vix.level?`VIX at ${vix.level} is ${vix.level<18?'low — ideal environment for premium collection.':'moderate and stable — solid for credit selling.'}`:''} ${spy.above50&&spy.above200?'SPY is holding above both key moving averages — broad market trend is healthy.':spy.above50?'SPY is above the 50MA but watch the 200MA.':'SPY is below the 50MA — monitor for further weakness.'} Your 14-21 DTE put credit spreads and BWBs are well-positioned. Trade normal size.`;
  }
  if(sig==='YELLOW'){
    return`Mixed environment. ${vix.ok&&vix.chg>10?`VIX has spiked ${vix.chg}% in 5 days — elevated fear. `:''} ${!spy.above50?'SPY is below its 50-day MA. ':''}Consider sizing down on new positions, prioritizing your widest-cushion setups, and closing anything under 5% cushion. Check the calendar before opening.`;
  }
  return`Risk environment is elevated. ${vix.ok&&vix.level>30?`VIX at ${vix.level} is in high-fear territory. `:''}${credit.chg>10?'Credit spreads are widening — institutional hedging activity. ':''}Avoid opening new credit structures until conditions normalize. Consider closing open positions with thin cushion.`;
}

function addAzLeg(){ azLegs.push({a:'BUY',t:'PUT',n:1,s:''}); renderAzLegs(); }

async function runAnalysis(){
  const ticker=$('az-tk')?.value?.trim()?.toUpperCase();
  const exp=$('az-exp')?.value?.trim();
  const credit=parseFloat($('az-cr')?.value)||0;
  const strat=$('az-strat')?.value||'PUT CREDIT SPREAD';
  if(!ticker){alert('Enter a ticker');return;}

  $('az-btn').disabled=true; $('az-btn').textContent='FETCHING DATA...';
  $('az-result').innerHTML=`<div class="lc" style="height:100px"><div class="spinner"></div><p style="color:var(--dim);font-size:10px;letter-spacing:2px">PULLING ${ticker}...</p></div>`;

  try{
    const [data,earnings]=await Promise.all([fetchQuoteAndCloses(ticker),fetchEarnings(ticker)]);
    const price=data.price;
    const shortLeg=azLegs.find(l=>l.a==='SELL');
    const shortStrike=parseFloat(shortLeg?.s)||0;
    const optType=(shortLeg?.t||'PUT').toLowerCase();

    // DTE
    let dte=null,expDate=null;
    if(exp){
      const parts=exp.split('/');
      if(parts.length===3) expDate=new Date(`${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}T16:00:00`);
      if(expDate) dte=Math.ceil((expDate-new Date())/86400000);
    }

    // Black-Scholes delta
    const T=dte?dte/365:21/365;
    const sigma=data.hv30||.3;
    const rawDelta=shortStrike>0?bsDelta(price,shortStrike,T,sigma,optType):null;
    const absDelta=rawDelta!==null?parseFloat(Math.abs(rawDelta).toFixed(3)):null;

    // Cushion
    const cushionPct=price>0&&shortStrike>0?parseFloat(((price-shortStrike)/price*100).toFixed(1)):null;
    const breakeven=shortStrike>0&&credit>0?parseFloat((shortStrike-credit).toFixed(2)):null;
    const beCushion=price>0&&breakeven?parseFloat(((price-breakeven)/price*100).toFixed(1)):null;

    // Earnings risk
    let earningsRisk=false,earningsDate=null;
    if(earnings){
      earningsDate=earnings.date;
      if(expDate){const ed=new Date(earnings.date+'T12:00:00');if(ed<=expDate)earningsRisk=true;}
      else earningsRisk=true;
    }

    // Support check
    const aboveSupport=shortStrike>0&&data.supports.length>0&&shortStrike>data.supports[0];
    const exitSignal=data.supports.length>0?data.supports[0]:null;

    // Signal
    let signal='GO'; const reasons=[];
    if(earningsRisk){signal='NO-GO';reasons.push(`Earnings on ${earningsDate} is within your expiration window — binary event risk`);}
    if(cushionPct!==null&&cushionPct<5){signal='NO-GO';reasons.push(`${cushionPct.toFixed(1)}% cushion to short strike is below your 5% minimum`);}
    if(absDelta&&absDelta>0.30){signal=signal==='GO'?'CAUTION':signal;reasons.push(`Est. delta ${absDelta} is above your .28 target — consider lower strike`);}
    if(aboveSupport){signal=signal==='GO'?'CAUTION':signal;reasons.push(`Short strike $${shortStrike} is above nearest support $${data.supports[0]} — consider placing below support`);}
    if(reasons.length===0) reasons.push('All checks passed — structure looks solid for your profile');

    azResult={ticker,strategy:strat,legs:azLegs.map(l=>({...l})),shortStrike,exp,price,credit,cushionPct,beCushion,breakeven,delta:rawDelta,absDelta,hv30:data.hv30,dte,supports:data.supports,resistances:data.resistances,exitSignal,earningsRisk,earningsDate,signal};

    const sigC=signal==='GO'?'#00e676':signal==='CAUTION'?'#ffd600':'#ff1744';
    $('az-result').innerHTML=`
      <div class="res-hero" style="background:${sigC}10;border:1px solid ${sigC}35">
        <div class="res-circle" style="background:${sigC};color:var(--bg)">${signal}</div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:${sigC}">${ticker} — ${strat}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:4px;line-height:1.6">${reasons.join('. ')}.</div>
        </div>
      </div>

      <div class="g2">
        ${mc('EST. DELTA',absDelta!==null?absDelta.toFixed(3):'N/A',absDelta?(absDelta<=0.28?'#00e676':'#ffd600'):'var(--muted)')}
        ${mc('CUSHION TO SHORT',cushionPct!==null?`${cushionPct}%`:'N/A',cushionPct!==null?cc(cushionPct):'var(--muted)')}
        ${mc('BE CUSHION',beCushion!==null?`${beCushion}%`:'N/A','var(--dim)')}
        ${mc('HV30 (realized)',data.hv30?`${(data.hv30*100).toFixed(1)}%`:'N/A','var(--text)')}
        ${mc('LIVE PRICE',price?`$${price}`:'N/A','var(--text)')}
        ${mc('DTE',dte!==null?`${dte}d`:'N/A',dte&&dte>=14&&dte<=21?'#00e676':dte&&dte<14?'#ffd600':'var(--dim)')}
        ${mc('SMA20/50',`$${data.sma20} / $${data.sma50}`,'var(--dim)')}
        ${mc('EARNINGS',earningsRisk?`⚠ ${earningsDate}`:(earningsDate?`✓ ${earningsDate}`:'✓ CLEAR'),earningsRisk?'#ff1744':'#00e676')}
      </div>

      <div style="font-size:9px;color:var(--yellow);margin-bottom:12px;padding:6px 10px;background:rgba(255,214,0,.06);border-radius:6px;border:1px solid rgba(255,214,0,.15)">
        <span class="est-badge">EST</span> Delta calculated via Black-Scholes using HV30=${((data.hv30||.3)*100).toFixed(1)}%. Typically within ±.03 of market delta. Upgrade to real options API for exact values.
      </div>

      ${data.supports.length>0?`
      <div class="card">
        <span class="lbl">KEY LEVELS — REAL PRICE DATA</span>
        <div style="display:flex;gap:24px;margin-bottom:10px">
          <div>
            <div style="font-size:9px;color:var(--green);letter-spacing:1px;margin-bottom:6px">SUPPORT</div>
            ${data.supports.map(p=>`<div style="font-size:16px;font-weight:700;color:var(--green);font-family:'DM Mono',monospace">$${p}</div>`).join('')}
          </div>
          <div>
            <div style="font-size:9px;color:var(--red);letter-spacing:1px;margin-bottom:6px">RESISTANCE</div>
            ${data.resistances.map(p=>`<div style="font-size:16px;font-weight:700;color:var(--red);font-family:'DM Mono',monospace">$${p}</div>`).join('')}
          </div>
        </div>
        ${exitSignal?`<div style="padding:8px 11px;background:rgba(255,23,68,.07);border-radius:7px;font-size:10px;color:#ff8a80;border:1px solid rgba(255,23,68,.15)">⚡ EXIT TRIGGER — Close if ${ticker} breaks $${exitSignal}</div>`:''}
      </div>`:''}

      <div class="data-live" style="margin-bottom:14px"><div class="dl-dot"></div> REAL: price, levels, earnings · EST: delta via Black-Scholes</div>
      <button class="btn btn-og btn-w" onclick="logFromAnalysis()">✓ I TOOK THIS TRADE — LOG IT</button>
    `;
  }catch(e){
    $('az-result').innerHTML=`<p style="color:var(--red);font-size:11px;padding:12px">Fetch failed: ${e.message}</p>`;
  }finally{
    $('az-btn').disabled=false; $('az-btn').textContent='→ ANALYZE';
  }
}

function logFromAnalysis(){
  if(!azResult)return;
  formStrat=azResult.strategy||'PUT CREDIT SPREAD';
  formLegs=azResult.legs||DEF_LEGS[formStrat].map(l=>({...l}));
  nav('trades');
  setTimeout(()=>{
    const tog=$('tfm-toggle');
    if(tog&&$('tfm')?.style.display==='none') tog.click();
    setTimeout(()=>{
      if($('tf-tk'))   $('tf-tk').value=azResult.ticker||'';
      if($('tf-px'))   $('tf-px').value=azResult.price?.toFixed(2)||'';
      if($('tf-exp'))  $('tf-exp').value=azResult.exp||'';
      if($('tf-cr'))   $('tf-cr').value=azResult.credit?.toString()||'';
      if($('tf-exit')) $('tf-exit').value=azResult.exitSignal?.toString()||'';
      if($('tf-notes'))$('tf-notes').value=`Analyzed. Est.delta:${azResult.absDelta?.toFixed(3)||'N/A'} HV30:${((azResult.hv30||0)*100).toFixed(1)}%${azResult.earningsRisk?' ⚠ Earnings:'+azResult.earningsDate:''}`;
      document.querySelectorAll('.sp').forEach(p=>p.classList.toggle('active',p.textContent===formStrat));
      renderLegs();
    },60);
  },120);
}

function updateLeg(i,field,val){ formLegs[i][field]=val; }
function addLeg(){ formLegs.push({a:'BUY',t:'PUT',n:1,s:''}); renderLegs(); }
function removeLeg(i){ formLegs.splice(i,1); renderLegs(); }

function submitTrade(){
  const ticker=$('tf-tk')?.value?.trim()?.toUpperCase();
  if(!ticker){alert('Enter a ticker');return;}
  const stock=parseFloat($('tf-px')?.value)||0;
  const credit=parseFloat($('tf-cr')?.value)||0;
  const collateral=parseFloat($('tf-col')?.value)||0;
  const expRaw=$('tf-exp')?.value||'';
  const shortLeg=formLegs.find(l=>l.a==='SELL');
  const strike=parseFloat(shortLeg?.s)||0;
  const be=strike>0&&credit>0?parseFloat((strike-credit).toFixed(2)):null;
  const cushion=stock>0&&be?parseFloat(((stock-be)/stock*100).toFixed(1)):null;
  const rr=collateral>0&&credit>0?parseFloat((credit/collateral*100).toFixed(1)):null;
  // Current DTE
  let currentDTE=null;
  if(expRaw){
    const parts=expRaw.split('/');
    if(parts.length===3){
      const ed=new Date(`${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}T16:00:00`);
      currentDTE=Math.max(0,Math.ceil((ed-new Date())/86400000));
    }
  }
  trades.unshift({
    id:Date.now(),ticker,strategy:formStrat,
    legs:formLegs.map(l=>({...l})),
    expDate:expRaw,dteOpen:$('tf-dte')?.value||currentDTE?.toString()||'',
    creditReceived:credit.toString(),maxRisk:collateral.toString(),
    stockAtOpen:stock.toString(),exitSignal:$('tf-exit')?.value||'',
    notes:$('tf-notes')?.value||'',
    openDate:new Date().toISOString().slice(0,10),
    breakeven:be,cushionPct:cushion,rrPct:rr,
    status:'OPEN',currentPnlPct:'',closeReason:''
  });
  saveTrades(); toast('Trade logged!'); renderTrades();
}

function updatePnl(id,val){const t=trades.find(t=>t.id===id);if(t){t.currentPnlPct=val;saveTrades();}}
function closeTrade(id,reason){const t=trades.find(t=>t.id===id);if(t){t.status='CLOSED';t.closeReason=reason;saveTrades();renderTrades();toast(`${t.ticker} closed as ${reason}`);}}
function delTrade(id){if(confirm('Delete this trade?')){trades=trades.filter(t=>t.id!==id);saveTrades();renderTrades();}}

function renderStats(){
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const open=trades.filter(t=>t.status==='OPEN');
  const newWins=closed.filter(t=>parseFloat(t.currentPnlPct)>0).length;
  const newLosses=closed.filter(t=>parseFloat(t.currentPnlPct)<0).length;
  const totalTrades=hist.totalTrades+closed.length;
  const totalWins=hist.wins+newWins;
  const totalPnl=hist.realizedPnl+closed.reduce((acc,t)=>{
    const cr=parseFloat(t.creditReceived)||0;
    return acc+(cr*100*(parseFloat(t.currentPnlPct)||0)/100);
  },0);
  const wr=totalTrades>0?((totalWins/totalTrades)*100).toFixed(1):hist.winPct.toFixed(1);
  const wrCol=parseFloat(wr)>70?'#00e676':parseFloat(wr)>55?'#ffd600':'#ff1744';

  let html=`
    <span class="lbl">PERFORMANCE — BASELINE + CURRENT</span>
    <div class="stat-hero">
      <div class="sh"><div class="sh-v" style="color:${wrCol}">${wr}%</div><div class="sh-l">WIN RATE</div>
        <div class="wbar"><div class="wbar-f" style="width:${wr}%;background:${wrCol}"></div></div>
      </div>
      <div class="sh"><div class="sh-v">${totalTrades}</div><div class="sh-l">TOTAL TRADES</div></div>
      <div class="sh"><div class="sh-v" style="color:#00e676">$${totalPnl.toFixed(0)}</div><div class="sh-l">REALIZED P&L</div></div>
    </div>
    <div class="g2">
      ${mc('WINS / LOSSES',`${totalWins} / ${totalTrades-totalWins}`,totalWins>totalTrades-totalWins?'#00e676':'#ffd600')}
      ${mc('PROFIT FACTOR',hist.profitFactor.toFixed(2),'#00e676')}
      ${mc('AVG WIN %',`+${hist.avgWinPct}%`,'#00e676')}
      ${mc('AVG LOSS %',`${hist.avgLossPct}%`,'#ff1744')}
      ${mc('OPEN NOW',open.length,'var(--text)')}
      ${mc('NEW CLOSED',closed.length,'var(--dim)')}
    </div>`;

  if(closed.length>0){
    const byStrat={};
    closed.forEach(t=>{
      const k=t.strategy||'UNKNOWN';
      const cr=parseFloat(t.creditReceived)||0;
      const col=parseFloat(t.maxRisk)||100;
      const pnl=parseFloat(t.currentPnlPct)||0;
      const roc=(cr*100*pnl/100)/col*100;
      const legs=t.legs||[];
      const sell=legs.find(l=>l.a==='SELL');const buy=legs.find(l=>l.a==='BUY');
      const width=sell&&buy?Math.abs((parseFloat(sell.s)||0)-(parseFloat(buy.s)||0)):0;
      if(!byStrat[k])byStrat[k]={wins:0,losses:0,roc:0,count:0,widths:[],collaterals:[]};
      if(pnl>0)byStrat[k].wins++;else byStrat[k].losses++;
      byStrat[k].roc+=roc;byStrat[k].count++;
      if(width>0)byStrat[k].widths.push(width);
      if(col>0)byStrat[k].collaterals.push(col);
    });
    html+=`<div class="card"><span class="lbl">NEW TRADES — BY STRATEGY</span>`;
    Object.entries(byStrat).forEach(([strat,d])=>{
      const wr2=((d.wins/d.count)*100).toFixed(0);
      const avgRoc=(d.roc/d.count).toFixed(1);
      const avgW=d.widths.length?(d.widths.reduce((a,b)=>a+b,0)/d.widths.length).toFixed(1):'N/A';
      const avgCol=d.collaterals.length?(d.collaterals.reduce((a,b)=>a+b,0)/d.collaterals.length).toFixed(0):'N/A';
      const wc=parseInt(wr2)>=65?'#00e676':'#ffd600';
      html+=`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:12px">${strat}</span>
          <div style="display:flex;gap:6px">
            <span class="chip" style="background:${wc}15;border:1px solid ${wc}35;color:${wc}">${wr2}% WIN</span>
            <span class="chip" style="background:rgba(136,146,164,.1);color:var(--muted)">${d.count}×</span>
          </div>
        </div>
        <div class="g3">
          ${mc('AVG WIDTH',avgW!=='N/A'?`$${avgW}`:'N/A','var(--text)')}
          ${mc('AVG COLLATERAL',avgCol!=='N/A'?`$${avgCol}`:'N/A','var(--text)')}
          ${mc('AVG ROC',`${parseFloat(avgRoc)>0?'+':''}${avgRoc}%`,parseFloat(avgRoc)>0?'#00e676':'#ff1744')}
        </div>
        <div class="wbar"><div class="wbar-f" style="width:${wr2}%;background:${wc}"></div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`
    <div class="card">
      <span class="lbl">HISTORICAL BASELINE (PRE-TRADEWATCH)</span>
      <div style="font-size:11px;color:var(--dim);line-height:1.9;margin-bottom:12px">
        5 weeks · ${hist.totalTrades} trades · ${hist.winPct}% win rate · $${hist.realizedPnl} P&L · ${hist.profitFactor} profit factor<br>
        Avg winner: +${hist.avgWinPct}% · Avg loser: ${hist.avgLossPct}%
      </div>
      <button class="btn btn-ghost" onclick="editHist()" style="width:auto;padding:7px 14px;font-size:10px">EDIT NUMBERS</button>
    </div>
    <div class="card" id="coach-card">
      <span class="lbl">AI COACHING</span>
      <button class="btn btn-purple btn-w" onclick="getCoaching()">✦ GENERATE COACHING INSIGHT</button>
      <div id="coach-out" style="margin-top:12px;font-size:12px;color:#c8d0dc;line-height:1.8"></div>
    </div>`;

  $('t-stats').innerHTML=html;
}

function editHist(){
  const input=prompt(`Edit historical baseline:\nFormat: totalTrades,wins,losses,realizedPnl,winPct,avgWinPct,avgLossPct,profitFactor\nCurrent: ${hist.totalTrades},${hist.wins},${hist.losses},${hist.realizedPnl},${hist.winPct},${hist.avgWinPct},${hist.avgLossPct},${hist.profitFactor}`);
  if(!input)return;
  const p=input.split(',');
  if(p.length>=8){
    hist={totalTrades:+p[0],wins:+p[1],losses:+p[2],realizedPnl:+p[3],winPct:+p[4],avgWinPct:+p[5],avgLossPct:+p[6],profitFactor:+p[7]};
    saveHist(); renderStats(); toast('Historical updated!');
  }
}

async function getCoaching(){
  const btn=document.querySelector('#coach-card .btn-purple');
  if(btn){btn.disabled=true;btn.textContent='ANALYZING...';}
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const summary=closed.length>0
    ?closed.map(t=>`${t.ticker} ${t.strategy} legs:${(t.legs||[]).map(l=>`${l.a}${l.n}x$${l.s}${l.t}`).join('/')} col:$${t.maxRisk} cr:$${t.creditReceived} pnl:${t.currentPnlPct}% ${t.closeReason}`).join('\n')
    :'No new trades logged yet — coaching based on historical baseline only.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        messages:[{role:'user',content:`Options trading coach. Trader baseline: ${hist.totalTrades} trades, ${hist.winPct}% win rate, $${hist.realizedPnl} P&L, ${hist.profitFactor} profit factor, avg win +${hist.avgWinPct}%, avg loss ${hist.avgLossPct}%. Uses put credit spreads and BWBs, 14-21 DTE, closes 40-60% profit, .18-.28 delta.\n\nNew trades:\n${summary}\n\nGive 3 specific, actionable insights about: what's working in their edge, what to protect or improve, and one concrete adjustment. Plain text paragraphs, no markdown, no bullet points.`}]})
    });
    const d=await resp.json();
    $('coach-out').textContent=d.content?.map(c=>c.text||'').join('')||'Could not generate.';
  }catch(e){$('coach-out').textContent='Coaching unavailable — network error.';}
  finally{if(btn){btn.disabled=false;btn.textContent='↺ REGENERATE';}}
}

// ─── INIT ───────────────────────────────────────────────────────────────────────
$('hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
if(!localStorage.getItem(HIST_K)) saveHist();
loadSignal();
renderAnalyze();
</script>
</body>
</html>
