<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TRADEWATCH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500;700&display=swap');
  :root {
    --bg: #0a0e1a; --card: #111827; --deep: #060a12;
    --border: #1e2535; --green: #00e676; --yellow: #ffd600;
    --red: #ff1744; --muted: #5a6a7e; --dim: #8892a4;
    --text: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .spinner { width:28px;height:28px;border:3px solid var(--green);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite; }
  ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background:#1e2535;border-radius:2px; }

  /* Layout */
  #app { max-width: 640px; margin: 0 auto; padding-bottom: 40px; }
  .header { padding: 18px 18px 0; display:flex; justify-content:space-between; align-items:center; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; letter-spacing:-0.5px; }
  .logo span { color: var(--green); }
  .logo-sub { font-size:9px; color:var(--muted); letter-spacing:2px; margin-top:2px; }
  .sig-pill { display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px; }
  .sig-dot { width:8px;height:8px;border-radius:50%; }

  /* Tabs */
  .tabs { display:flex; padding:14px 18px 0; border-bottom:1px solid var(--border); overflow-x:auto; }
  .tab { flex:1 0 auto; padding:8px 4px; background:transparent; border:none; border-bottom:2px solid transparent;
         color:var(--muted); font-family:'DM Mono',monospace; font-size:9px; cursor:pointer; letter-spacing:1px;
         margin-bottom:-1px; transition:all 0.15s; white-space:nowrap; }
  .tab.active { border-bottom-color:var(--green); color:var(--text); }
  .content { padding:18px; }

  /* Cards */
  .card { background:var(--card); border-radius:10px; padding:16px; margin-bottom:12px; }
  .card-border-green { border:1px solid rgba(0,230,118,0.15); }
  .section-label { font-size:9px; color:var(--muted); letter-spacing:2px; margin-bottom:14px; }
  .mini-grid { display:grid; gap:8px; margin-bottom:12px; }
  .g2 { grid-template-columns:1fr 1fr; }
  .g3 { grid-template-columns:1fr 1fr 1fr; }
  .mini-card { background:var(--deep); border-radius:7px; padding:9px 11px; }
  .mini-label { font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:3px; }
  .mini-value { font-size:13px; font-weight:700; }

  /* Score bars */
  .score-row { margin-bottom:12px; }
  .score-meta { display:flex; justify-content:space-between; margin-bottom:4px; font-size:10px; }
  .score-track { height:4px; background:#1e2535; border-radius:2px; }
  .score-fill { height:100%; border-radius:2px; transition:width 1.2s ease; }

  /* Sector */
  .sector-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .sector-bar { width:3px; height:34px; border-radius:2px; flex-shrink:0; }
  .sector-name { font-family:'Syne',sans-serif; font-weight:700; font-size:12px; color:var(--text); }
  .sector-reason { font-size:10px; color:var(--muted); margin-top:1px; }

  /* Buttons */
  .btn { padding:11px; border:none; border-radius:8px; font-family:'DM Mono',monospace; font-size:11px;
         font-weight:700; cursor:pointer; letter-spacing:2px; width:100%; transition:all 0.2s; }
  .btn-green { background:var(--green); color:var(--bg); }
  .btn-green:disabled { background:#1e2535; color:var(--muted); cursor:default; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-outline-green { background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.3); color:var(--green); }
  .btn-purple { background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.4); color:#a78bfa; }

  /* Forms */
  input, select, textarea {
    width:100%; background:#1e2535; border:1px solid #2d3748; border-radius:6px;
    color:var(--text); font-family:'DM Mono',monospace; font-size:12px;
    padding:8px 10px; outline:none; box-sizing:border-box;
  }
  textarea { resize:vertical; min-height:90px; line-height:1.6; }
  select { appearance:none; cursor:pointer; }
  .field { margin-bottom:10px; }
  .field label { font-size:9px; color:var(--muted); letter-spacing:1px; display:block; margin-bottom:4px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }

  /* Event calendar */
  .event-row { display:flex; gap:12px; padding:12px 14px; border-radius:9px; margin-bottom:7px; align-items:center; border:1px solid var(--border); background:var(--card); }
  .event-row.in-dte { background:rgba(255,214,0,0.03); border-color:rgba(255,214,0,0.2); }
  .event-date { min-width:36px; text-align:center; }
  .event-day { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; line-height:1; }
  .event-mon { font-size:9px; color:var(--muted); }
  .event-name { font-size:12px; color:var(--text); margin-bottom:3px; }
  .chip { display:inline-block; padding:2px 8px; border-radius:20px; font-size:9px; letter-spacing:1px; }

  /* Leg builder */
  .leg-row { display:flex; gap:6px; align-items:center; margin-bottom:7px; padding:10px; background:var(--deep); border-radius:8px; }
  .leg-row.sell { border:1px solid rgba(255,23,68,0.2); }
  .leg-row.buy { border:1px solid rgba(0,230,118,0.2); }
  .leg-action { background:#1e2535; border:none; font-family:'DM Mono',monospace; font-size:11px; font-weight:700; outline:none; padding:4px 6px; border-radius:4px; cursor:pointer; }
  .leg-contracts { width:40px; text-align:center; padding:5px 6px; }
  .leg-type { background:#1e2535; border:none; font-family:'DM Mono',monospace; font-size:11px; outline:none; padding:4px 6px; border-radius:4px; cursor:pointer; color:var(--dim); }
  .leg-strike { flex:1; padding:5px 8px; }
  .leg-remove { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:0 4px; }

  /* Trade cards */
  .trade-card { background:var(--card); border-radius:10px; padding:14px; margin-bottom:10px; border:1px solid var(--border); }
  .trade-card.low-cushion { border-color:rgba(255,23,68,0.3); }
  .trade-header { display:flex; justify-content:space-between; margin-bottom:8px; }
  .trade-ticker { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; color:var(--text); }
  .trade-strategy { font-size:9px; color:var(--muted); font-weight:400; margin-left:8px; font-family:'DM Mono',monospace; }
  .trade-meta { font-size:10px; color:var(--muted); margin-top:2px; }
  .leg-badge { display:inline-block; padding:4px 8px; border-radius:5px; font-size:10px; font-family:'DM Mono',monospace; margin:0 3px 4px 0; }
  .leg-badge.sell { background:rgba(255,23,68,0.1); border:1px solid rgba(255,23,68,0.2); color:var(--red); }
  .leg-badge.buy { background:rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.2); color:var(--green); }
  .alert-bar { padding:6px 10px; border-radius:6px; font-size:10px; margin-bottom:8px; }
  .alert-red { background:rgba(255,23,68,0.08); color:var(--red); }
  .alert-yellow { background:rgba(255,214,0,0.08); color:var(--yellow); }
  .trade-actions { display:flex; gap:6px; margin-top:8px; }
  .trade-actions input { flex:1; }
  .act-btn { padding:7px 10px; border-radius:6px; font-family:'DM Mono',monospace; font-size:10px; cursor:pointer; border:none; }

  /* Analyze result */
  .result-hero { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:10px; margin-bottom:14px; }
  .result-circle { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:'DM Mono',monospace; font-weight:700; font-size:9px; letter-spacing:1px; }
  .result-ticker { font-family:'Syne',sans-serif; font-weight:800; font-size:14px; }
  .result-rec { font-size:11px; color:var(--dim); margin-top:3px; line-height:1.5; }
  .levels-grid { display:flex; gap:20px; }
  .level-group label { font-size:9px; letter-spacing:1px; display:block; margin-bottom:5px; }
  .level-val { font-size:14px; font-weight:700; font-family:'DM Mono',monospace; }
  .exit-bar { margin-top:10px; padding:7px 10px; background:rgba(255,23,68,0.07); border-radius:6px; font-size:10px; color:#ff8a80; }

  /* Stats */
  .strat-block { margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .strat-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .strat-name { font-family:'Syne',sans-serif; font-weight:700; font-size:12px; }
  .win-bar-track { height:3px; background:#1e2535; border-radius:2px; margin-top:8px; }
  .win-bar-fill { height:100%; border-radius:2px; }

  /* Strategy picker */
  .strat-pills { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .strat-pill { padding:5px 10px; border-radius:6px; font-size:9px; cursor:pointer; border:1px solid var(--border); color:var(--muted); background:transparent; font-family:'DM Mono',monospace; letter-spacing:0.5px; transition:all 0.15s; }
  .strat-pill.active { border-color:var(--green); color:var(--green); background:rgba(0,230,118,0.08); }

  /* Mode toggle */
  .mode-toggle { display:flex; gap:6px; margin-bottom:16px; }
  .mode-btn { flex:1; padding:7px; border-radius:6px; font-size:10px; cursor:pointer; font-family:'DM Mono',monospace; letter-spacing:1px; transition:all 0.15s; }

  /* Upload area */
  .upload-section { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
  .upload-btn { padding:8px 14px; background:#1e2535; border:1px solid var(--border); border-radius:7px; color:var(--dim); font-family:'DM Mono',monospace; font-size:10px; cursor:pointer; white-space:nowrap; }

  /* Loading state */
  .loading-center { display:flex; flex-direction:column; align-items:center; justify-content:center; height:320px; gap:14px; }
  .loading-text { color:var(--dim); font-size:11px; letter-spacing:2px; }

  /* Hero signal */
  .signal-hero { display:flex; align-items:center; gap:20px; margin-bottom:20px; padding:18px 20px; border-radius:12px; }
  .signal-ball { width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700; font-size:11px; letter-spacing:1px; color:var(--bg); }
  .signal-title { font-family:'Syne',sans-serif; font-weight:800; font-size:19px; }
  .signal-summary { font-size:11px; color:var(--dim); margin-top:5px; line-height:1.5; }

  /* Data source indicator */
  .data-badge { font-size:9px; color:var(--muted); letter-spacing:1px; display:flex; align-items:center; gap:5px; }
  .data-dot { width:5px; height:5px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }

  /* Notification */
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--green); color:var(--green); padding:10px 20px; border-radius:8px; font-size:11px; letter-spacing:1px; z-index:999; display:none; }

  /* Import trades */
  .import-area { background:var(--deep); border:1px dashed var(--border); border-radius:8px; padding:16px; margin-bottom:12px; text-align:center; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="logo">TRADE<span>WATCH</span></div>
      <div class="logo-sub" id="today-date"></div>
    </div>
    <div class="sig-pill" id="header-signal" style="display:none"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('signal')">SIGNAL</button>
    <button class="tab" onclick="showTab('calendar')">CALENDAR</button>
    <button class="tab" onclick="showTab('analyze')">ANALYZE</button>
    <button class="tab" onclick="showTab('trades')">TRADES</button>
    <button class="tab" onclick="showTab('stats')">STATS</button>
  </div>
  <div class="content">
    <div id="tab-signal"></div>
    <div id="tab-calendar" style="display:none"></div>
    <div id="tab-analyze" style="display:none"></div>
    <div id="tab-trades" style="display:none"></div>
    <div id="tab-stats" style="display:none"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const AV_KEY = 'J0BM2LMG9Z7SFZFV';
const FRED_KEY = '7ad4fd5db412d76d3157866f174fe843';
const TRADES_KEY = 'tw_trades_v4';

// ── State ─────────────────────────────────────────────────────────────────────
let marketData = null;
let trades = JSON.parse(localStorage.getItem(TRADES_KEY) || '[]');
let currentTab = 'signal';
let analyzeResult = null;
let formLegs = [];
let formStrategy = 'PUT CREDIT SPREAD';

const DEFAULT_LEGS = {
  'PUT CREDIT SPREAD': [{action:'SELL',type:'PUT',contracts:1,strike:''},{action:'BUY',type:'PUT',contracts:1,strike:''}],
  'BWB / PUT RATIO':   [{action:'BUY',type:'PUT',contracts:1,strike:''},{action:'SELL',type:'PUT',contracts:2,strike:''},{action:'BUY',type:'PUT',contracts:1,strike:''}],
  'CASH SECURED PUT':  [{action:'SELL',type:'PUT',contracts:1,strike:''}],
  'COVERED CALL':      [{action:'SELL',type:'CALL',contracts:1,strike:''}],
  'CALL CREDIT SPREAD':[{action:'SELL',type:'CALL',contracts:1,strike:''},{action:'BUY',type:'CALL',contracts:1,strike:''}],
  'IRON CONDOR':       [{action:'SELL',type:'PUT',contracts:1,strike:''},{action:'BUY',type:'PUT',contracts:1,strike:''},{action:'SELL',type:'CALL',contracts:1,strike:''},{action:'BUY',type:'CALL',contracts:1,strike:''}],
  'PUT DEBIT SPREAD':  [{action:'BUY',type:'PUT',contracts:1,strike:''},{action:'SELL',type:'PUT',contracts:1,strike:''}],
  'CALL DEBIT SPREAD': [{action:'BUY',type:'CALL',contracts:1,strike:''},{action:'SELL',type:'CALL',contracts:1,strike:''}],
  'OTHER':             [{action:'BUY',type:'PUT',contracts:1,strike:''}]
};
const STRATEGIES = Object.keys(DEFAULT_LEGS);

// ── Utilities ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const sigColor = s => s==='GREEN'?'#00e676':s==='YELLOW'?'#ffd600':'#ff1744';
const barColor = s => s>=62?'#00e676':s>=42?'#ffd600':'#ff1744';
const cushColor = p => p>=7?'#00e676':p>=4?'#ffd600':'#ff1744';

function saveTrades() { localStorage.setItem(TRADES_KEY, JSON.stringify(trades)); }

function toast(msg, dur=2500) {
  const t = $('toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, dur);
}

function showTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['signal','calendar','analyze','trades','stats'];
    t.classList.toggle('active', names[i]===name);
  });
  ['signal','calendar','analyze','trades','stats'].forEach(n => {
    $(`tab-${n}`).style.display = n===name?'block':'none';
  });
  if(name==='trades') renderTrades();
  if(name==='stats') renderStats();
}

// ── Real Data Fetchers ────────────────────────────────────────────────────────

// VIX from FRED (VIXCLS series)
async function fetchVIX() {
  try {
    const url = `https://api.stlouisfed.org/fred/series/observations?series_id=VIXCLS&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=10`;
    const r = await fetch(url);
    const d = await r.json();
    const obs = d.observations.filter(o => o.value !== '.');
    const current = parseFloat(obs[0].value);
    const prev5 = parseFloat(obs[Math.min(4, obs.length-1)].value);
    const change5d = ((current - prev5) / prev5 * 100);
    return { level: current, change5d: parseFloat(change5d.toFixed(1)), date: obs[0].date };
  } catch(e) { console.error('VIX fetch failed', e); return { level: 20, change5d: 0, date: 'N/A' }; }
}

// Credit spreads - ICE BofA US Corporate Option-Adjusted Spread (BAMLC0A0CM)
async function fetchCreditSpreads() {
  try {
    const url = `https://api.stlouisfed.org/fred/series/observations?series_id=BAMLC0A0CM&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=8`;
    const r = await fetch(url);
    const d = await r.json();
    const obs = d.observations.filter(o => o.value !== '.');
    const current = parseFloat(obs[0].value);
    const prev = parseFloat(obs[Math.min(4, obs.length-1)].value);
    return { current, change: parseFloat((current - prev).toFixed(2)) };
  } catch(e) { return { current: 1.0, change: 0 }; }
}

// SPY price + 50/200 MA from Alpha Vantage
async function fetchSPY() {
  try {
    const url = `https://www.alphavantage.co/query?function=SMA&symbol=SPY&interval=daily&time_period=50&series_type=close&apikey=${AV_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    const sma50Data = d['Technical Analysis: SMA'];
    if (!sma50Data) return { price: 0, above50: true, above200: true };
    const dates = Object.keys(sma50Data).sort().reverse();
    const sma50 = parseFloat(sma50Data[dates[0]].SMA);

    const url2 = `https://www.alphavantage.co/query?function=SMA&symbol=SPY&interval=daily&time_period=200&series_type=close&apikey=${AV_KEY}`;
    const r2 = await fetch(url2);
    const d2 = await r2.json();
    const sma200Data = d2['Technical Analysis: SMA'];
    const sma200 = sma200Data ? parseFloat(sma200Data[Object.keys(sma200Data).sort().reverse()[0]].SMA) : 0;

    const quoteUrl = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=SPY&apikey=${AV_KEY}`;
    const rq = await fetch(quoteUrl);
    const dq = await rq.json();
    const price = parseFloat(dq['Global Quote']?.['05. price'] || 500);

    return { price, sma50, sma200, above50: price > sma50, above200: price > sma200 };
  } catch(e) { return { price: 500, above50: true, above200: true, sma50: 490, sma200: 480 }; }
}

// QQQ above 50MA
async function fetchQQQ() {
  try {
    const url = `https://www.alphavantage.co/query?function=SMA&symbol=QQQ&interval=daily&time_period=50&series_type=close&apikey=${AV_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    const smaData = d['Technical Analysis: SMA'];
    if (!smaData) return { above50: true };
    const latest = Object.keys(smaData).sort().reverse()[0];
    const sma50 = parseFloat(smaData[latest].SMA);
    const quoteUrl = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=QQQ&apikey=${AV_KEY}`;
    const rq = await fetch(quoteUrl);
    const dq = await rq.json();
    const price = parseFloat(dq['Global Quote']?.['05. price'] || 400);
    return { above50: price > sma50, price, sma50 };
  } catch(e) { return { above50: true }; }
}

// Real options data from Alpha Vantage - gets actual delta and IV
async function fetchOptionsChain(ticker, strike, expDate, optionType='put') {
  try {
    const url = `https://www.alphavantage.co/query?function=REALTIME_OPTIONS&symbol=${ticker}&apikey=${AV_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    const options = d.data || [];

    // Find closest matching option
    const targetStrike = parseFloat(strike);
    const putOptions = options.filter(o =>
      o.type?.toLowerCase() === optionType.toLowerCase() &&
      o.expiration === expDate
    );

    if (putOptions.length === 0) {
      // Try without expiration filter, find closest
      const allPuts = options.filter(o => o.type?.toLowerCase() === optionType.toLowerCase());
      if (allPuts.length === 0) return null;
      const closest = allPuts.reduce((prev, curr) =>
        Math.abs(parseFloat(curr.strike) - targetStrike) < Math.abs(parseFloat(prev.strike) - targetStrike) ? curr : prev
      );
      return {
        delta: parseFloat(closest.delta || 0),
        iv: parseFloat(closest.implied_volatility || 0) * 100,
        bid: parseFloat(closest.bid || 0),
        ask: parseFloat(closest.ask || 0),
        strike: closest.strike,
        expiration: closest.expiration
      };
    }

    const closest = putOptions.reduce((prev, curr) =>
      Math.abs(parseFloat(curr.strike) - targetStrike) < Math.abs(parseFloat(prev.strike) - targetStrike) ? curr : prev
    );
    return {
      delta: parseFloat(closest.delta || 0),
      iv: parseFloat(closest.implied_volatility || 0) * 100,
      bid: parseFloat(closest.bid || 0),
      ask: parseFloat(closest.ask || 0),
      strike: closest.strike,
      expiration: closest.expiration
    };
  } catch(e) { console.error('Options fetch failed', e); return null; }
}

// Real stock quote
async function fetchQuote(ticker) {
  try {
    const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${AV_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    const q = d['Global Quote'];
    return {
      price: parseFloat(q?.['05. price'] || 0),
      change: parseFloat(q?.['09. change'] || 0),
      changePct: q?.['10. change percent']?.replace('%','') || '0'
    };
  } catch(e) { return { price: 0, change: 0, changePct: '0' }; }
}

// Earnings date from Alpha Vantage
async function fetchEarnings(ticker) {
  try {
    const url = `https://www.alphavantage.co/query?function=EARNINGS_CALENDAR&symbol=${ticker}&horizon=3month&apikey=${AV_KEY}`;
    const r = await fetch(url);
    const text = await r.text();
    // Parse CSV
    const lines = text.trim().split('\n');
    if (lines.length < 2) return null;
    // Find matching ticker
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols[0]?.toUpperCase() === ticker.toUpperCase()) {
        return { date: cols[2], ticker: cols[0], estimate: cols[3] };
      }
    }
    return null;
  } catch(e) { return null; }
}

// Support/resistance from AV daily prices
async function fetchSupportLevels(ticker) {
  try {
    const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&apikey=${AV_KEY}&outputsize=compact`;
    const r = await fetch(url);
    const d = await r.json();
    const series = d['Time Series (Daily)'];
    if (!series) return { supports: [], resistances: [], sma20: 0, sma50: 0 };

    const dates = Object.keys(series).sort().reverse().slice(0, 60);
    const closes = dates.map(dt => parseFloat(series[dt]['4. close']));
    const highs = dates.map(dt => parseFloat(series[dt]['2. high']));
    const lows = dates.map(dt => parseFloat(series[dt]['3. low']));

    const sma20 = closes.slice(0,20).reduce((a,b)=>a+b,0)/20;
    const sma50 = closes.slice(0,50).reduce((a,b)=>a+b,0)/50;

    // Find local lows as support, local highs as resistance
    const supports = new Set();
    const resistances = new Set();
    for (let i = 2; i < Math.min(20, lows.length-2); i++) {
      if (lows[i] < lows[i-1] && lows[i] < lows[i+1] && lows[i] < lows[i-2] && lows[i] < lows[i+2]) {
        supports.add(Math.round(lows[i] * 2) / 2);
      }
      if (highs[i] > highs[i-1] && highs[i] > highs[i+1]) {
        resistances.add(Math.round(highs[i] * 2) / 2);
      }
    }

    supports.add(Math.round(sma20 * 2) / 2);
    supports.add(Math.round(sma50 * 2) / 2);

    const currentPrice = closes[0];
    const supArr = [...supports].filter(s => s < currentPrice).sort((a,b)=>b-a).slice(0,3);
    const resArr = [...resistances].filter(r => r > currentPrice).sort((a,b)=>a-b).slice(0,2);

    return { supports: supArr, resistances: resArr, sma20: sma20.toFixed(2), sma50: sma50.toFixed(2), currentPrice };
  } catch(e) { return { supports: [], resistances: [], sma20: 0, sma50: 0 }; }
}

// Breadth approximation from sector ETFs
async function fetchBreadth() {
  // Use SPY RSI as breadth proxy — when RSI is high, breadth is good
  try {
    const url = `https://www.alphavantage.co/query?function=RSI&symbol=SPY&interval=daily&time_period=14&series_type=close&apikey=${AV_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    const rsiData = d['Technical Analysis: RSI'];
    if (!rsiData) return 55;
    const latest = Object.keys(rsiData).sort().reverse()[0];
    const rsi = parseFloat(rsiData[latest].RSI);
    // Convert RSI to breadth-like percentage
    return Math.round(Math.min(95, Math.max(10, rsi)));
  } catch(e) { return 55; }
}

// ── Scoring (same logic, now with real data) ──────────────────────────────────
function scoreVix(level, change5d, inverted) {
  let s = 60;
  if (level < 18) s += 15; else if (level < 22) s += 5; else if (level < 28) s -= 8; else if (level < 35) s -= 22; else s -= 40;
  if (change5d > 40) s -= 30; else if (change5d > 25) s -= 18; else if (change5d > 15) s -= 8; else if (change5d < -20) s += 10; else if (change5d < -10) s += 5;
  if (inverted) s -= 25;
  return Math.max(0, Math.min(100, s));
}
function scoreStructure(spy50, spy200, qqq50, breadth) {
  let s = 55;
  if (spy50) s += 15; else s -= 20;
  if (spy200) s += 10; else s -= 12;
  if (qqq50) s += 10; else s -= 10;
  if (breadth > 65) s += 15; else if (breadth > 50) s += 5; else if (breadth > 35) s -= 5; else s -= 20;
  return Math.max(0, Math.min(100, s));
}
function scoreSentiment(creditSpreadChange) {
  let s = 65; // baseline positive — credit spreads are the real signal here
  if (creditSpreadChange > 20) s -= 30; else if (creditSpreadChange > 10) s -= 18; else if (creditSpreadChange > 5) s -= 8; else if (creditSpreadChange < -5) s += 10;
  return Math.max(0, Math.min(100, s));
}
function compositeSignal(vs, ss, sent, eventFlag) {
  const w = vs * 0.40 + ss * 0.35 + sent * 0.15 + (eventFlag ? 0 : 10);
  if (Math.min(vs, ss) < 25 || w < 38) return 'RED';
  if (Math.min(vs, ss) < 45 || w < 58) return 'YELLOW';
  return 'GREEN';
}

async function runAnalysis() {

  const strategy = $('az-strategy').value;

  $('az-btn').disabled = true; $('az-btn').textContent = 'FETCHING REAL DATA...';
  $('az-result').innerHTML = `<div class="loading-center" style="height:150px"><div class="spinner"></div><p class="loading-text">PULLING LIVE OPTIONS DATA...</p></div>`;

  try {
    // Fetch real data in parallel
    const [quote, levels, earnings] = await Promise.all([
      fetchQuote(ticker),
      fetchSupportLevels(ticker),
      fetchEarnings(ticker)
    ]);

    // Fetch real options data if we have a strike
    let optionsData = null;
    if (strike) {
      // Format expiration for AV API (YYYY-MM-DD)
      let expFormatted = exp;
      if (exp.includes('/')) {
        const parts = exp.split('/');
        expFormatted = `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
      }
      const optType = strategy.includes('CALL') && !strategy.includes('PUT') ? 'call' : 'put';
      optionsData = await fetchOptionsChain(ticker, strike, expFormatted, optType);
    }

    const stockPrice = quote.price;
    const strikeNum = parseFloat(strike) || 0;
    const cushionPct = stockPrice > 0 && strikeNum > 0 ? ((stockPrice - strikeNum) / stockPrice * 100) : null;

    // Check earnings risk
    let earningsRisk = false;
    let earningsDate = null;
    if (earnings) {
      const ed = new Date(earnings.date + 'T12:00:00');
      const expDate = exp ? new Date(exp) : null;
      earningsDate = earnings.date;
      if (expDate && ed <= expDate) earningsRisk = true;
      else if (!expDate) earningsRisk = true; // unknown, flag it
    }

    // Determine signal
    let signal = 'GO';
    let reasons = [];
    if (cushionPct !== null && cushionPct < 5) { signal = 'NO-GO'; reasons.push(`Only ${cushionPct.toFixed(1)}% cushion — below your 5-8% minimum`); }
    if (optionsData && Math.abs(optionsData.delta) > 0.30) { signal = signal==='GO'?'CAUTION':signal; reasons.push(`Delta ${Math.abs(optionsData.delta).toFixed(2)} is above your .28 target`); }
    if (earningsRisk) { signal = 'NO-GO'; reasons.push(`Earnings on ${earningsDate} falls within your expiration window`); }
    if (levels.supports.length > 0 && strikeNum > 0 && strikeNum > levels.supports[0]) {

          <button class="mode-btn" id="mode-builder" onclick="setMode('builder')" style="background:#1e2535;border:1px solid var(--green);color:var(--green)">🔧 BUILDER</button>
          <button class="mode-btn" id="mode-shorthand" onclick="setMode('shorthand')" style="background:transparent;border:1px solid var(--border);color:var(--muted)">⌨ SHORTHAND</button>
        </div>
        <div id="shorthand-area" style="display:none;margin-bottom:16px">
          <div class="field"><label>SHORTHAND (e.g. NVDA -1x110p +1x105p 5/23 0.45cr 500col)</label>
            <div style="display:flex;gap:8px">
              <input id="shorthand-input" placeholder="TICKER -Nx STRIKEp +Nx STRIKEp EXP CREDITcr COLLcol">
              <button onclick="parseShorthand()" style="padding:8px 12px;background:var(--green);border:none;border-radius:6px;color:var(--bg);font-family:'DM Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap">PARSE →</button>
            </div>
          </div>
        </div>
        <div class="field"><label>STRATEGY</label>
          <div class="strat-pills" id="strat-pills">
            ${STRATEGIES.map(s=>`<button class="strat-pill ${s===formStrategy?'active':''}" onclick="selectStrategy('${s}')">${s}</button>`).join('')}
          </div>
        </div>
        <div class="form-grid">
          <div class="field"><label>TICKER</label><input id="tf-ticker" placeholder="NVDA" oninput="this.value=this.value.toUpperCase()"></div>
          <div class="field"><label>STOCK PRICE AT OPEN $</label><input id="tf-stock" placeholder="118.50" type="number" step="0.01"></div>
        </div>
        <div class="field"><label>OPTION LEGS</label></div>
        <div id="legs-container"></div>
        <button onclick="addLeg()" style="padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;margin-bottom:12px">+ ADD LEG</button>
        <div class="form-grid">
          <div class="field"><label>EXPIRATION</label><input id="tf-exp" placeholder="05/23/2026"></div>
          <div class="field"><label>DTE AT OPEN</label><input id="tf-dte" placeholder="18" type="number"></div>
          <div class="field"><label>CREDIT / SHARE $</label><input id="tf-credit" placeholder="0.45" type="number" step="0.01"></div>
          <div class="field"><label>COLLATERAL $</label><input id="tf-collateral" placeholder="200" type="number"></div>
          <div class="field"><label>EXIT TRIGGER $</label><input id="tf-exit" placeholder="108" type="number" step="0.01"></div>
          <div class="field"><label>NOTES</label><input id="tf-notes" placeholder="Context..."></div>
        </div>
        <button class="btn btn-green" onclick="submitTrade()">→ LOG TRADE</button>
      </div>
    </div>`;

  if (open.length === 0) {
    html += `<div style="text-align:center;color:var(--muted);padding:50px 0;font-size:11px">NO OPEN TRADES</div>`;
  }

  open.forEach(t => {
    const cushion = parseFloat(t.cushionPct)||0;
    const pnl = parseFloat(t.currentPnlPct)||0;
    const daysLeft = t.expDate ? Math.ceil((new Date(t.expDate+'T12:00:00')-new Date())/86400000) : '?';
    const lowC = cushion>0 && cushion<5;
    const legs = t.legs||[];
    html += `
      <div class="trade-card ${lowC?'low-cushion':''}">
        ${lowC?`<div class="alert-bar alert-red">⚠ LOW CUSHION — MONITOR CLOSELY</div>`:''}
        <div class="trade-header">
          <div>
            <span class="trade-ticker">${t.ticker}</span><span class="trade-strategy">${t.strategy}</span>
            <div class="trade-meta">${t.expDate} · ${typeof daysLeft==='number'?`${daysLeft}D LEFT`:''}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:12px;color:${cushColor(cushion)}">${t.cushionPct||'?'}% CUSHION</div>
            <div style="font-size:10px;color:var(--muted)">BE $${t.breakeven||'?'}</div>
          </div>
        </div>
        <div style="margin-bottom:10px;flex-wrap:wrap;display:flex">
          ${legs.map(l=>`<span class="leg-badge ${l.action==='SELL'?'sell':'buy'}">${l.action} ${l.contracts}× $${l.strike} ${l.type}</span>`).join('')}
        </div>
        <div class="mini-grid g3" style="margin-bottom:10px">
          ${miniCard('CREDIT',`$${t.creditReceived||'?'}`, '#00e676')}
          ${miniCard('COLLATERAL',`$${t.maxRisk||'?'}`, 'var(--text)')}
          ${miniCard('EXIT $', t.exitSignal?`$${t.exitSignal}`:'—', '#ff8a80')}
        </div>
        <div class="trade-actions">
          <input type="number" placeholder="Current P&L %" value="${t.currentPnlPct||''}" onblur="updatePnl(${t.id},this.value)" style="color:${pnl>=40?'#00e676':pnl<-15?'#ff1744':'var(--text)'}">
          <button class="act-btn" onclick="closeTrade(${t.id},'PROFIT')" style="background:rgba(0,230,118,0.15);color:#00e676">✓ WIN</button>
          <button class="act-btn" onclick="closeTrade(${t.id},'STOP')" style="background:rgba(255,23,68,0.15);color:#ff1744">✗ LOSS</button>
          <button class="act-btn" onclick="deleteTrade(${t.id})" style="background:transparent;color:var(--muted);border:1px solid var(--border)">🗑</button>
        </div>
        ${t.exitSignal?`<div style="font-size:10px;color:#ff8a80;margin-top:6px">⚡ Close if ${t.ticker} breaks $${t.exitSignal}</div>`:''}
      </div>`;
  });

  if (closed.length > 0) {
    html += `<div class="section-label" style="margin-top:24px;margin-bottom:10px">CLOSED TRADES</div>`;
    closed.forEach(t => {
      const pnl = parseFloat(t.currentPnlPct)||0;
      html += `
        <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--deep);border-radius:8px;margin-bottom:6px;opacity:0.75">
          <div style="flex:1">
            <span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--dim);margin-right:8px">${t.ticker}</span>
            <span style="font-size:10px;color:var(--muted)">${t.strategy}</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:12px;color:${pnl>0?'#00e676':'#ff1744'}">${pnl>0?'+':''}${pnl}%</span>
            <span class="chip" style="background:${t.closeReason==='PROFIT'?'rgba(0,230,118,0.15)':'rgba(255,23,68,0.15)'};color:${t.closeReason==='PROFIT'?'#00e676':'#ff1744'}">${t.closeReason}</span>
            <button onclick="deleteTrade(${t.id})" style="background:transparent;border:none;color:var(--muted);cursor:pointer;padding:2px 6px">✕</button>
          </div>
        </div>`;
    });
  }

  $('tab-trades').innerHTML = html;
  renderLegs();
}

function toggleTradeForm() {
  const form = $('trade-form');
  const isHidden = form.style.display==='none';
  form.style.display = isHidden?'block':'none';
  $('trade-form-toggle').textContent = isHidden?'CANCEL':'+ LOG TRADE';
  $('trade-form-toggle').style.background = isHidden?'#1e2535':'var(--green)';
  $('trade-form-toggle').style.color = isHidden?'var(--muted)':'var(--bg)';
  if (isHidden) renderLegs();
}

function setMode(m) {
  $('shorthand-area').style.display = m==='shorthand'?'block':'none';
  ['builder','shorthand'].forEach(x => {
    const btn = $(`mode-${x}`);
    btn.style.background = x===m?'#1e2535':'transparent';
    btn.style.borderColor = x===m?'var(--green)':'var(--border)';
    btn.style.color = x===m?'var(--green)':'var(--muted)';
  });
}

function selectStrategy(s) {
  formStrategy = s;
  formLegs = DEFAULT_LEGS[s].map(l=>({...l}));
  document.querySelectorAll('.strat-pill').forEach(p => {
    p.classList.toggle('active', p.textContent===s);
  });
  renderLegs();
}

function renderLegs() {
  const container = $('legs-container');
  if (!container) return;
  container.innerHTML = formLegs.map((leg,i) => `
    <div class="leg-row ${leg.action==='SELL'?'sell':'buy'}">
      <select class="leg-action" style="color:${leg.action==='SELL'?'#ff1744':'#00e676'}" onchange="updateLeg(${i},'action',this.value)">
        <option ${leg.action==='SELL'?'selected':''}>SELL</option>
        <option ${leg.action==='BUY'?'selected':''}>BUY</option>
      </select>
      <input class="leg-contracts" type="number" value="${leg.contracts}" min="1" max="10" onchange="updateLeg(${i},'contracts',parseInt(this.value)||1)" style="width:40px;text-align:center;padding:5px 6px">
      <span style="color:var(--muted);font-size:10px">×</span>
      <select class="leg-type" onchange="updateLeg(${i},'type',this.value)">
        <option ${leg.type==='PUT'?'selected':''}>PUT</option>
        <option ${leg.type==='CALL'?'selected':''}>CALL</option>
      </select>
      <input class="leg-strike" type="number" value="${leg.strike}" placeholder="Strike $" step="0.5" onchange="updateLeg(${i},'strike',this.value)" style="flex:1;padding:5px 8px">
      ${formLegs.length>1?`<button class="leg-remove" onclick="removeLeg(${i})">×</button>`:''}
    </div>`).join('');
}

function updateLeg(i, field, val) { formLegs[i][field] = val; }
function addLeg() { formLegs.push({action:'BUY',type:'PUT',contracts:1,strike:''}); renderLegs(); }
function removeLeg(i) { formLegs.splice(i,1); renderLegs(); }

async function parseShorthand() {
  const input = $('shorthand-input').value.trim();
  if (!input) return;
  // Simple parser: extract ticker, legs, exp, credit, collateral
  const parts = input.split(' ');
  const ticker = parts[0].toUpperCase();
  const legs = [];
  let exp='', credit='', collateral='';
  parts.slice(1).forEach(p => {
    const legMatch = p.match(/([+-]?)(\d+)x(\d+(?:\.\d+)?)(p|c)/i);
    if (legMatch) {
      const action = (legMatch[1]==='-')?'SELL':'BUY';
      legs.push({action, contracts:parseInt(legMatch[2]), strike:legMatch[3], type:legMatch[4].toUpperCase()==='P'?'PUT':'CALL'});
    } else if (p.includes('cr')) { credit = p.replace('cr',''); }
    else if (p.includes('col')) { collateral = p.replace('col',''); }
    else if (p.match(/\d+\/\d+/)) { exp = p; }
  });
  if (ticker) { const el=$('tf-ticker'); if(el) el.value=ticker; }
  if (credit) { const el=$('tf-credit'); if(el) el.value=credit; }
  if (collateral) { const el=$('tf-collateral'); if(el) el.value=collateral; }
  if (exp) { const el=$('tf-exp'); if(el) el.value=exp; }
  if (legs.length > 0) { formLegs = legs; renderLegs(); }
  setMode('builder');
  toast('Parsed! Review legs and submit.');
}

function submitTrade() {
  const ticker = $('tf-ticker')?.value?.trim()?.toUpperCase();
  if (!ticker) { alert('Enter a ticker'); return; }
  const stockPrice = parseFloat($('tf-stock')?.value)||0;
  const credit = parseFloat($('tf-credit')?.value)||0;
  const collateral = parseFloat($('tf-collateral')?.value)||0;
  const shortLeg = formLegs.find(l=>l.action==='SELL');
  const strike = parseFloat(shortLeg?.strike)||0;
  const be = strike>0&&credit>0?(strike-credit).toFixed(2):'?';
  const cushion = stockPrice>0&&be!=='?'?((stockPrice-parseFloat(be))/stockPrice*100).toFixed(1):'?';
  const rr = collateral>0&&credit>0?(credit/collateral*100).toFixed(1):'?';

  const trade = {
    id: Date.now(), ticker, strategy: formStrategy,
    legs: formLegs.map(l=>({...l})),
    expDate: $('tf-exp')?.value||'',
    dteOpen: $('tf-dte')?.value||'',
    creditReceived: $('tf-credit')?.value||'',
    maxRisk: $('tf-collateral')?.value||'',
    stockAtOpen: $('tf-stock')?.value||'',
    exitSignal: $('tf-exit')?.value||'',
    notes: $('tf-notes')?.value||'',
    openDate: new Date().toISOString().slice(0,10),
    shortStrike: shortLeg?.strike||'',
    breakeven: be, cushionPct: cushion, rrPct: rr,
    status: 'OPEN', currentPnlPct: '', closeReason: ''
  };
  trades.unshift(trade);
  saveTrades();
  formLegs = DEFAULT_LEGS[formStrategy].map(l=>({...l}));
  toast('Trade logged!');
  renderTrades();
}

function updatePnl(id, val) {
  const t = trades.find(t=>t.id===id);
  if (t) { t.currentPnlPct = val; saveTrades(); }
}

function closeTrade(id, reason) {
  const t = trades.find(t=>t.id===id);
  if (t) { t.status='CLOSED'; t.closeReason=reason; saveTrades(); renderTrades(); }
}

function deleteTrade(id) {
  trades = trades.filter(t=>t.id!==id);
  saveTrades(); renderTrades();
}

// ── Stats Tab ─────────────────────────────────────────────────────────────────
function renderStats() {
  const closed = trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const open = trades.filter(t=>t.status==='OPEN');

  if (closed.length===0) {
    $('tab-stats').innerHTML = `<div style="text-align:center;color:var(--muted);padding:60px 20px;font-size:11px">STATS APPEAR AFTER YOUR FIRST CLOSED TRADE</div>`;
    return;
  }

  const wins = closed.filter(t=>parseFloat(t.currentPnlPct)>0).length;
  const wr = ((wins/closed.length)*100).toFixed(0);
  const avgPnl = (closed.reduce((s,t)=>s+parseFloat(t.currentPnlPct||0),0)/closed.length).toFixed(1);
  const totalDollar = closed.reduce((acc,t)=>{
    const cr=parseFloat(t.creditReceived)||0;
    const pnl=parseFloat(t.currentPnlPct)||0;
    return acc+(cr*100*pnl/100);
  },0);

  // Group by strategy
  const byStrat = {};
  closed.forEach(t => {
    const k = t.strategy||'UNKNOWN';
    const cr = parseFloat(t.creditReceived)||0;
    const col = parseFloat(t.maxRisk)||100;
    const pnl = parseFloat(t.currentPnlPct)||0;
    const dollarPnl = cr*100*pnl/100;
    const roc = (dollarPnl/col)*100;
    const legs = t.legs||[];
    const sell = legs.find(l=>l.action==='SELL');
    const buy = legs.find(l=>l.action==='BUY');
    const width = sell&&buy?Math.abs((parseFloat(sell.strike)||0)-(parseFloat(buy.strike)||0)):0;
    if(!byStrat[k]) byStrat[k]={wins:0,losses:0,totalRoc:0,count:0,widths:[],collaterals:[]};
    if(pnl>0)byStrat[k].wins++; else byStrat[k].losses++;
    byStrat[k].totalRoc+=roc; byStrat[k].count++;
    if(width>0)byStrat[k].widths.push(width);
    if(col>0)byStrat[k].collaterals.push(col);
  });

  let html = `
    <div class="section-label">PERFORMANCE</div>
    <div class="mini-grid g2">
      ${miniCard('WIN RATE',`${wr}%`, parseInt(wr)>65?'#00e676':'#ffd600')}
      ${miniCard('AVG P&L %',`${avgPnl>0?'+':''}${avgPnl}%`, parseFloat(avgPnl)>0?'#00e676':'#ff1744')}
      ${miniCard('EST. TOTAL P&L',`$${totalDollar.toFixed(0)}`, totalDollar>0?'#00e676':'#ff1744')}
      ${miniCard('TRADES',`${wins}W / ${closed.length-wins}L`, 'var(--text)')}
    </div>
    <div class="card">
      <div class="section-label">BY STRATEGY + COLLATERAL</div>`;

  Object.entries(byStrat).forEach(([strat,d]) => {
    const wr2 = ((d.wins/d.count)*100).toFixed(0);
    const avgRoc = (d.totalRoc/d.count).toFixed(1);
    const avgW = d.widths.length?(d.widths.reduce((a,b)=>a+b,0)/d.widths.length).toFixed(1):'N/A';
    const avgCol = d.collaterals.length?(d.collaterals.reduce((a,b)=>a+b,0)/d.collaterals.length).toFixed(0):'N/A';
    const wc = parseInt(wr2)>=65?'#00e676':'#ffd600';
    html += `
      <div class="strat-block">
        <div class="strat-header">
          <span class="strat-name">${strat}</span>
          <div style="display:flex;gap:6px">
            <span class="chip" style="background:${wc}20;border:1px solid ${wc}40;color:${wc}">${wr2}% WIN</span>
            <span class="chip" style="background:rgba(136,146,164,0.1);color:var(--muted)">${d.count}×</span>
          </div>
        </div>
        <div class="mini-grid g3" style="margin-bottom:8px">
          ${miniCard('AVG WIDTH', avgW!=='N/A'?`$${avgW}`:'N/A', 'var(--text)')}
          ${miniCard('AVG COLLATERAL', avgCol!=='N/A'?`$${avgCol}`:'N/A', 'var(--text)')}
          ${miniCard('AVG ROC', `${parseFloat(avgRoc)>0?'+':''}${avgRoc}%`, parseFloat(avgRoc)>0?'#00e676':'#ff1744')}
        </div>
        <div class="win-bar-track"><div class="win-bar-fill" style="width:${wr2}%;background:${wc}"></div></div>
      </div>`;
  });

  html += `</div>
    <div class="card" id="coaching-card">
      <div class="section-label">AI COACHING</div>
      <button class="btn btn-purple" onclick="getCoaching()">✦ GENERATE COACHING INSIGHT</button>
      <div id="coaching-result" style="margin-top:12px;font-size:12px;color:#c8d0dc;line-height:1.7"></div>
    </div>`;

  $('tab-stats').innerHTML = html;
}

async function getCoaching() {
  const closed = trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  if (closed.length===0) return;
  const btn = document.querySelector('#coaching-card .btn-purple');
  btn.disabled=true; btn.textContent='ANALYZING...';

  const summary = closed.map(t=>`${t.ticker} ${t.strategy} legs:${(t.legs||[]).map(l=>`${l.action}${l.contracts}x$${l.strike}${l.type}`).join('/')} col:$${t.maxRisk} cr:$${t.creditReceived} pnl:${t.currentPnlPct}% ${t.closeReason}`).join('\n');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:500,
        messages:[{role:'user',content:`Options trading coach. Analyze these closed trades for a part-time trader using put credit spreads and BWBs, 14-21 DTE, closes 40-60% profit. Give 3 specific actionable insights about spread widths, collateral sizing, and ROC. Plain text, 3 short paragraphs.\n\n${summary}`}]
      })
    });
    const d = await resp.json();
    $('coaching-result').textContent = d.content?.map(c=>c.text||'').join('');
  } catch(e) { $('coaching-result').textContent = 'Could not generate — try again.'; }
  finally { btn.disabled=false; btn.textContent='↺ REGENERATE'; }
}

// ── Init ──────────────────────────────────────────────────────────────────────
$('today-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
loadSignalTab();
renderCalendar();
renderAnalyze();
renderTrades();
</script>
