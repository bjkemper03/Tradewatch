<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TRADEWATCH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500;700&display=swap');
:root{--bg:#0a0e1a;--card:#111827;--deep:#060a12;--border:#1e2535;--green:#00e676;--yellow:#ffd600;--red:#ff1744;--muted:#5a6a7e;--dim:#8892a4;--text:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spin{width:28px;height:28px;border:3px solid var(--green);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2535;border-radius:2px}
/* Remove number input arrows */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
#app{max-width:700px;margin:0 auto;padding-bottom:60px}
.hdr{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px}
.logo span{color:var(--green)}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.sig-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px}
.tabs{display:flex;padding:14px 16px 0;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{flex:1 0 auto;padding:9px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;letter-spacing:1px;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab.active{border-bottom-color:var(--green);color:var(--text)}
.content{padding:16px}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px}
.lbl{font-size:9px;color:var(--muted);letter-spacing:2px;display:block;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.mc{background:var(--deep);border-radius:8px;padding:10px 12px}
.mc-l{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.mc-v{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
.sb{margin-bottom:14px}
.sb-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px}
.sb-t{height:5px;background:#1e2535;border-radius:3px}
.sb-f{height:100%;border-radius:3px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
/* Buttons */
.btn{padding:11px 16px;border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s}
.btn-w{width:100%;display:block}
.btn-g{background:var(--green);color:var(--bg)}
.btn-g:disabled{background:#1e2535;color:var(--muted);cursor:default}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-og{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.btn-purple{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);color:#a78bfa}
/* Standard inputs */
input,select,textarea{width:100%;background:#1e2535;border:1px solid #2d3748;border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:9px 11px;outline:none;box-sizing:border-box}
textarea{resize:vertical;line-height:1.6;min-height:60px}
select{appearance:none;cursor:pointer}
.fld{margin-bottom:10px}
.fld label{font-size:9px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:5px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
/* STRIKE INPUT -- large, clear, no arrows */
.strike-input{
  width:100%;background:#1e2535;border:2px solid #3d4f6b;border-radius:8px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:16px;font-weight:700;
  padding:12px 14px;outline:none;box-sizing:border-box;
  -webkit-appearance:none;-moz-appearance:textfield;
}
.strike-input:focus{border-color:var(--green);}
.strike-input::placeholder{color:#3d4f6b;font-weight:400;font-size:14px}
/* Leg rows */
.leg-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;padding:12px 14px;background:var(--deep);border-radius:10px}
.leg-row.sell{border:1px solid rgba(255,23,68,.3)}
.leg-row.buy-l{border:1px solid rgba(0,230,118,.3)}
.leg-action{background:#1e2535;border:none;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;outline:none;padding:6px 8px;border-radius:5px;cursor:pointer;min-width:56px}
.leg-ct{width:46px;text-align:center;padding:6px;background:#1e2535;border:1px solid #2d3748;border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
.leg-type{background:#1e2535;border:none;color:var(--dim);font-family:'DM Mono',monospace;font-size:12px;outline:none;padding:6px 8px;border-radius:5px;cursor:pointer;min-width:52px}
.leg-x{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0}
/* Calendar */
.cal-ev{display:flex;gap:14px;padding:10px 14px;border-radius:9px;margin-bottom:6px;align-items:center;border:1px solid var(--border);background:var(--card);transition:background .2s}
.cal-ev.dte{background:rgba(255,214,0,.04);border-color:rgba(255,214,0,.35)}
.cal-ev.imm{background:rgba(255,23,68,.04);border-color:rgba(255,23,68,.3)}
.cal-date{min-width:42px;text-align:center;flex-shrink:0}
.cal-day{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;line-height:1}
.cal-mon{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:8px;letter-spacing:.5px;font-family:'DM Mono',monospace}
/* Sectors */
.sec{background:var(--card);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:14px;border-left:4px solid var(--border)}
/* Trades */
.tc{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.tc.safe{border-color:rgba(0,230,118,.3)}
.tc.warn{border-color:rgba(255,214,0,.4)}
.tc.risk{border-color:rgba(255,23,68,.4)}
.lb{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:9px;margin:0 4px 4px 0;font-family:'DM Mono',monospace}
.lb-sell{background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.2);color:var(--red)}
.lb-buy{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:var(--green)}
.sp{padding:5px 10px;border-radius:6px;font-size:9px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;font-family:'DM Mono',monospace;transition:all .15s}
.sp.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
/* Stats */
.stat-h{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.sh{background:var(--deep);border-radius:10px;padding:14px;text-align:center}
.sh-v{font-size:24px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.sh-l{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:4px}
.wbar{height:4px;background:#1e2535;border-radius:2px;margin-top:8px}
.wbar-f{height:100%;border-radius:2px}
.dl{display:inline-flex;align-items:center;gap:5px;font-size:9px;color:var(--muted);margin-top:6px}
.dl-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.lc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:240px;gap:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:8px;font-size:11px;letter-spacing:1px;z-index:999;display:none;white-space:nowrap}
.mhdr{font-size:10px;color:var(--green);letter-spacing:2px;margin:16px 0 8px;font-weight:700;font-family:'Syne',sans-serif}
.bwb-score{border-radius:12px;padding:16px;margin-bottom:14px}
.bwb-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
.bwb-row:last-child{border-bottom:none}
.est{font-size:8px;padding:1px 5px;border-radius:4px;background:rgba(255,214,0,.15);color:var(--yellow);border:1px solid rgba(255,214,0,.3)}
.real-tag{font-size:8px;padding:1px 5px;border-radius:4px;background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><div class="logo">TRADE<span>WATCH</span></div><div class="logo-sub" id="hdr-date"></div></div>
    <div class="sig-pill" id="hdr-sig" style="display:none"></div>
  </div>
  <div class="tabs">

    <div id="t-stats" style="display:none"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// WARNING: Keys visible in frontend -- personal use only. Move to backend before sharing.
const AV='J0BM2LMG9Z7SFZFV';
const PROXY='https://api.allorigins.win/get?url=';
const CK={mkt:'tw8_mkt',sec:'tw8_sec',earn:'tw8_earn_',lp:'tw8_lp_'};
const TTL={mkt:4*3600000,sec:4*3600000,earn:12*3600000,lp:15*60000};
const TK='tw8_trades',HK='tw8_hist';

let trades=JSON.parse(localStorage.getItem(TK)||'[]');
let hist=JSON.parse(localStorage.getItem(HK)||JSON.stringify({
  totalTrades:56,wins:42,losses:13,breakeven:1,
  realizedPnl:736,winPct:76.36,avgWinPct:51.71,avgLossPct:-47.56,profitFactor:2.84
}));
let curTab='signal',azLegs=[],azStrat='PUT CREDIT SPREAD',azResult=null;
let formLegs=[],formStrat='PUT CREDIT SPREAD',showHistory=false;

const STRATS=['PUT CREDIT SPREAD','BWB / PUT RATIO','CASH SECURED PUT','COVERED CALL','CALL CREDIT SPREAD','IRON CONDOR','PUT DEBIT SPREAD','CALL DEBIT SPREAD','OTHER'];
const DEF={
  'PUT CREDIT SPREAD':[{a:'SELL',t:'PUT',n:1,s:''},{a:'BUY',t:'PUT',n:1,s:''}],
  'BWB / PUT RATIO':[{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'PUT',n:2,s:''},{a:'BUY',t:'PUT',n:1,s:''}],
  'CASH SECURED PUT':[{a:'SELL',t:'PUT',n:1,s:''}],
  'COVERED CALL':[{a:'SELL',t:'CALL',n:1,s:''}],
  'CALL CREDIT SPREAD':[{a:'SELL',t:'CALL',n:1,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'IRON CONDOR':[{a:'SELL',t:'PUT',n:1,s:''},{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'CALL',n:1,s:''},{a:'BUY',t:'CALL',n:1,s:''}],
  'PUT DEBIT SPREAD':[{a:'BUY',t:'PUT',n:1,s:''},{a:'SELL',t:'PUT',n:1,s:''}],
  'CALL DEBIT SPREAD':[{a:'BUY',t:'CALL',n:1,s:''},{a:'SELL',t:'CALL',n:1,s:''}],
  'OTHER':[{a:'BUY',t:'PUT',n:1,s:''}]
};

const $=id=>document.getElementById(id);
const sigC=s=>s==='GREEN'?'#00e676':s==='YELLOW'?'#ffd600':'#ff1744';
const barC=s=>s>=62?'#00e676':s>=42?'#ffd600':'#ff1744';
const cushC=p=>p>=7?'#00e676':p>=4?'#ffd600':'#ff1744';
const saveTrades=()=>localStorage.setItem(TK,JSON.stringify(trades));
const saveHist=()=>localStorage.setItem(HK,JSON.stringify(hist));
function toast(m,d=2500){const t=$('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',d);}

function nav(n){
  curTab=n;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['signal','calendar','sectors','analyze','trades','stats'][i]===n));
  ['signal','calendar','sectors','analyze','trades','stats'].forEach(x=>$('t-'+x).style.display=x===n?'block':'none');
  if(n==='trades')renderTrades();
  if(n==='stats')renderStats();
  if(n==='calendar')renderCalendar();
  if(n==='sectors')loadSectors();
}

function gc(k,ttl){try{const c=JSON.parse(localStorage.getItem(k)||'null');if(c&&Date.now()-c.ts<ttl)return c.data;}catch(e){}return null;}
function sc2(k,d){localStorage.setItem(k,JSON.stringify({data:d,ts:Date.now()}));}

// ── Math ──────────────────────────────────────────────────────────────────────
function ncdf(x){const a=[.254829592,-.284496736,1.421413741,-1.453152027,1.061405429],p=.3275911;const sgn=x<0?-1:1;x=Math.abs(x)/Math.sqrt(2);const t2=1/(1+p*x);let y=1-(((((a[4]*t2+a[3])*t2+a[2])*t2+a[1])*t2+a[0])*t2*Math.exp(-x*x));return .5*(1+sgn*y);}
function bsDelta(S,K,T,sig,type='put'){if(!S||!K||!T||!sig||T<=0||sig<=0)return null;const d1=(Math.log(S/K)+.5*sig*sig*T)/(sig*Math.sqrt(T));return type==='call'?ncdf(d1):ncdf(d1)-1;}
function calcHV(cl,days=30){if(cl.length<days+1)return .3;const sl=cl.slice(0,days+1);const ret=sl.slice(0,-1).map((c,i)=>Math.log(c/sl[i+1]));const m=ret.reduce((a,b)=>a+b,0)/ret.length;const v=ret.reduce((a,r)=>a+Math.pow(r-m,2),0)/(ret.length-1);return Math.sqrt(v*252);}


// Safe number parsing -- prevents NaN bugs
function safeNum(v, fallback) {
  if (fallback === undefined) fallback = 0;
  var n = parseFloat(v);
  return Number.isFinite(n) ? n : fallback;
}

function calcBWBMaxLoss(legs,cr){
  const buys=legs.filter(l=>l.a==='BUY').map(l=>parseFloat(l.s)||0).filter(s=>s>0).sort((a,b)=>b-a);
  const sells=legs.filter(l=>l.a==='SELL').map(l=>parseFloat(l.s)||0).filter(s=>s>0);
  if(buys.length<2||sells.length<1)return null;
  const topLong=buys[0],bottomLong=buys[buys.length-1],short=sells[0];
  const contracts=legs.find(l=>l.a==='SELL')?.n||1;
  const credit=parseFloat(cr)||0;
  const upper=topLong-short,lower=short-bottomLong;
  if(upper<=0||lower<=0)return null;
  const maxLoss=Math.max(0,(lower-upper)*100*contracts-(credit*100*contracts));
  return{maxLoss,upper,lower,topLong,short,bottomLong,contracts};
}
function calcBWBBreakeven(legs,cr){const sells=legs.filter(l=>l.a==='SELL');if(!sells.length)return null;const s=parseFloat(sells[0].s)||0,c=parseFloat(cr)||0;return s&&c?parseFloat((s-c).toFixed(2)):null;}
function calcCollateral(strat,legs,cr){
  const sells=legs.filter(l=>l.a==='SELL'),buys=legs.filter(l=>l.a==='BUY');
  const contracts=Math.max(...[...sells,...buys].map(l=>l.n||1),1);
  const credit=parseFloat(cr)||0;
  if(strat==='CASH SECURED PUT'){return(parseFloat(sells[0]?.s)||0)*100;}
  if(strat==='COVERED CALL')return 0;
  if(strat==='BWB / PUT RATIO'){const b=calcBWBMaxLoss(legs,cr);return b?b.maxLoss:0;}
  if(sells.length>0&&buys.length>0){const w=Math.abs((parseFloat(sells[0]?.s)||0)-(parseFloat(buys[0]?.s)||0));return Math.max(0,(w-credit)*100*contracts);}
  return 0;
}

function scoreBWB(legs,credit,price,dte,earningsRisk){
  const cr=parseFloat(credit)||0,bwb=calcBWBMaxLoss(legs,cr),be=calcBWBBreakeven(legs,cr);
  if(!bwb||!be)return null;
  const crDollar=cr*100*bwb.contracts,crRatio=bwb.maxLoss>0?parseFloat((crDollar/bwb.maxLoss*100).toFixed(1)):0;
  const beCushion=price>0?parseFloat(((price-be)/price*100).toFixed(1)):0;
  const dteOk=dte>=12&&dte<=23;
  const wingRatio=bwb.upper>0?parseFloat((bwb.lower/bwb.upper).toFixed(2)):0;
  let score=0;const notes=[];
  if(crRatio>=20){score+=35;notes.push(`✓ Strong credit/risk ratio ${crRatio}%`);}
  else if(crRatio>=12){score+=20;notes.push(`△ Moderate credit ratio ${crRatio}%`);}
  else{score+=5;notes.push(`✗ Low credit ratio ${crRatio}%`);}
  if(beCushion>=8){score+=30;notes.push(`✓ ${beCushion}% cushion to breakeven`);}
  else if(beCushion>=5){score+=18;notes.push(`△ ${beCushion}% cushion to BE -- acceptable`);}
  else if(beCushion>=3){score+=8;notes.push(`⚠ ${beCushion}% cushion to BE -- tight`);}
  else{notes.push(`✗ ${beCushion}% cushion -- too tight`);}
  if(!earningsRisk){score+=20;notes.push('✓ Earnings clear');}else{notes.push('✗ Earnings within expiration');}
  if(dteOk){score+=10;notes.push(`✓ DTE ${dte} in range`);}else{notes.push(`△ DTE ${dte} outside 14-21`);}
  if(wingRatio>=1.5&&wingRatio<=3){score+=5;notes.push(`✓ Wing ratio ${wingRatio}:1`);}
  else{notes.push(`△ Wing ratio ${wingRatio}:1`);}
  let grade,gc2,gl;
  if(score>=75){grade='A';gc2='#00e676';gl='Strong setup';}
  else if(score>=50){grade='B';gc2='#ffd600';gl='Acceptable -- monitor';}
  else{grade='SKIP';gc2='#ff1744';gl='Below your criteria';}
  return{grade,gc2,gl,score,notes,crRatio,beCushion,maxLoss:bwb.maxLoss,crDollar,be,wingRatio};
}

// ── Data fetchers ─────────────────────────────────────────────────────────────
// Single batched call for multiple AV symbols
async function fetchAVBatch(symbols){
  const results={};
  // AV doesn't have a true batch endpoint on free tier, so we stagger carefully
  for(const sym of symbols){
    try{
      const r=await fetch(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${sym}&outputsize=compact&apikey=${AV}`,{signal:AbortSignal.timeout(10000)});
      const d=await r.json();
      const ts=d['Time Series (Daily)'];
      if(!ts){results[sym]=null;await new Promise(r=>setTimeout(r,1200));continue;}
      const dates=Object.keys(ts).sort().reverse();
      const closes=dates.map(dt=>parseFloat(ts[dt]['4. close']));
      const highs=dates.map(dt=>parseFloat(ts[dt]['2. high']));
      const lows=dates.map(dt=>parseFloat(ts[dt]['3. low']));
      const price=closes[0];
      const lastDate=dates[0];
      const n50=Math.min(50,closes.length),n200=Math.min(200,closes.length),n20=Math.min(20,closes.length);
      const sma50=closes.slice(0,n50).reduce((a,b)=>a+b,0)/n50;
      const sma200=closes.slice(0,n200).reduce((a,b)=>a+b,0)/n200;
      const sma20=closes.slice(0,n20).reduce((a,b)=>a+b,0)/n20;
      const perf5=closes.length>5?parseFloat(((price-closes[5])/closes[5]*100).toFixed(2)):0;
      const hv30=calcHV(closes,30);
      const supports=new Set([Math.round(sma20*4)/4,Math.round(sma50*4)/4]);
      const resistances=new Set();
      for(let i=2;i<Math.min(25,lows.length-2);i++){
        if(lows[i]<lows[i-1]&&lows[i]<lows[i+1]&&lows[i]<lows[i-2])supports.add(Math.round(lows[i]*4)/4);
        if(highs[i]>highs[i-1]&&highs[i]>highs[i+1])resistances.add(Math.round(highs[i]*4)/4);
      }
      results[sym]={price:parseFloat(price.toFixed(2)),closes,sma20:parseFloat(sma20.toFixed(2)),sma50:parseFloat(sma50.toFixed(2)),sma200:parseFloat(sma200.toFixed(2)),above50:price>sma50,above200:price>sma200,perf5,hv30,lastDate,supports:[...supports].filter(s=>s<price).sort((a,b)=>b-a).slice(0,3),resistances:[...resistances].filter(r=>r>price).sort((a,b)=>a-b).slice(0,2)};
    }catch(e){results[sym]=null;}
    await new Promise(r=>setTimeout(r,1500)); // 1s between calls to respect rate limit
  }
  return results;
}

async function fetchVIX(){
  try{
    const url=encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=15d');
    const r=await fetch(PROXY+url,{signal:AbortSignal.timeout(10000)});
    const w=await r.json();
    const d=JSON.parse(w.contents);
    const pr=d.chart.result[0].indicators.quote[0].close.filter(Boolean);
    const ts=d.chart.result[0].timestamp;
    const cur=pr[pr.length-1],prev5=pr[Math.max(0,pr.length-6)];
    const date=new Date(ts[ts.length-1]*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return{level:parseFloat(cur.toFixed(2)),chg:parseFloat(((cur-prev5)/prev5*100).toFixed(1)),date,ok:true};
  }catch(e){return{level:null,chg:0,date:'N/A',ok:false};}
}

async function fetchFearGreed(){
  try{
    const url=encodeURIComponent('https://production.dataviz.cnn.io/index/fearandgreed/graphdata');
    const r=await fetch(PROXY+url,{signal:AbortSignal.timeout(8000)});
    const w=await r.json();
    const d=JSON.parse(w.contents);
    const score=d.fear_and_greed?.score;
    const rating=d.fear_and_greed?.rating;
    if(score===undefined)return null;
    return{score:Math.round(score),rating:rating||'N/A'};
  }catch(e){return null;}
}

async function fetchEarnings(ticker){
  const ck=CK.earn+ticker;

  try{
    const r=await fetch(`https://www.alphavantage.co/query?function=EARNINGS_CALENDAR&symbol=${ticker}&horizon=3month&apikey=${AV}`,{signal:AbortSignal.timeout(8000)});
    const text=await r.text();
    const lines=text.trim().split('\n');
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',');
      if(cols[0]?.toUpperCase()===ticker.toUpperCase()){const res={ticker:cols[0],date:cols[2]};sc2(ck,res);return res;}
    }
    sc2(ck,null);return null;
  }catch(e){return null;}
}

async function fetchYahooOptions(ticker,expDateStr){
  try{
    let ts='';
    if(expDateStr){const p=expDateStr.includes('/')?expDateStr.split('/'):[expDateStr.slice(5,7),expDateStr.slice(8,10),expDateStr.slice(0,4)];const dt=new Date(`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}T00:00:00Z`);ts=Math.floor(dt.getTime()/1000);}
    const yurl=`https://query1.finance.yahoo.com/v7/finance/options/${ticker}${ts?'?date='+ts:''}`;
    const r=await fetch(PROXY+encodeURIComponent(yurl),{signal:AbortSignal.timeout(10000)});
    const w=await r.json();
    const d=JSON.parse(w.contents);
    const chain=d.optionChain?.result?.[0];
    if(!chain)return null;
    return{puts:chain.options?.[0]?.puts||[],calls:chain.options?.[0]?.calls||[]};
  }catch(e){return null;}
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function sVIX(lv,chg){
  let s=62;if(lv===null)return s;
  if(lv<16)s+=18;else if(lv<20)s+=10;else if(lv<24)s+=2;else if(lv<28)s-=10;else if(lv<33)s-=22;else s-=38;
  if(chg>35)s-=28;else if(chg>20)s-=16;else if(chg>12)s-=7;else if(chg<-15)s+=8;else if(chg<-8)s+=4;
  return Math.max(0,Math.min(100,s));
}
function sStruct(s50,s200,q50,rspDiff){
  let s=55;
  if(s50)s+=15;else s-=18;if(s200)s+=10;else s-=10;if(q50)s+=10;else s-=8;
  if(rspDiff>0.5)s+=10;else if(rspDiff<-1.5)s-=15;else if(rspDiff<-0.5)s-=5;
  return Math.max(0,Math.min(100,s));
}
function sSent(fg,creditChg){
  let s=65;
  if(fg){if(fg.score>75)s-=5;else if(fg.score<30)s-=20;else if(fg.score<45)s-=10;}
  if(creditChg>20)s-=28;else if(creditChg>10)s-=15;else if(creditChg>4)s-=7;else if(creditChg<-5)s+=10;
  return Math.max(0,Math.min(100,s));
}
function getSig(vs,ss,sent){
  const w=vs*.40+ss*.35+sent*.15+10;
  if(Math.min(vs,ss)<25||w<36)return'RED';
  if(Math.min(vs,ss)<42||w<56)return'YELLOW';
  return'GREEN';
}
function assessTrade(c,dte){
  const cush2=parseFloat(c)||0,d=parseInt(dte)||999;
  if(cush2>=7&&d>7)return{label:'SAFE',color:'#00e676',cls:'safe'};
  if(cush2>=7&&d<=7)return{label:'EXPIRING',color:'#ffd600',cls:'warn'};
  if(cush2>=4&&d>5)return{label:'MONITOR',color:'#ffd600',cls:'warn'};
  if(cush2>=4&&d<=5)return{label:'AT RISK',color:'#ff1744',cls:'risk'};
  return{label:'CRITICAL',color:'#ff1744',cls:'risk'};
}

function sbar(l,s,w){const c=barC(s);return`<div class="sb"><div class="sb-row"><span style="color:var(--dim)">${l}</span><span style="color:${c}">${Math.round(s)}/100 · ${w}</span></div><div class="sb-t"><div class="sb-f" style="width:${s}%;background:${c}"></div></div></div>`;}
function mc2(l,v,c){return`<div class="mc"><div class="mc-l">${l}</div><div class="mc-v" style="color:${c||'var(--text)'}">${v}</div></div>`;}

function buildGuidance(sig,vix,spy,creditChg,fg,rspDiff){

  if(sig==='YELLOW')return`Mixed environment. ${vix?.ok&&vix?.chg>10?`VIX spiked ${vix.chg}% in 5 days. `:''}${fg&&fg.score<35?'Fear/Greed showing fear -- elevated caution. ':''}${rspDiff<-1?'Breadth narrowing -- only big caps holding up. ':''}Size down, close weak positions, check calendar before any new opens.`;
  return`Elevated risk. ${vix?.ok&&vix?.level>30?`VIX at ${vix.level} is high fear territory. `:''}${fg&&fg.score<25?'Extreme fear in market. ':''}${creditChg>10?'Credit spreads widening. ':''}Avoid new positions until conditions normalize.`;
}

async function runAnalysis(){
  azLegs=azLegData;
  const ticker=$('az-tk')?.value?.trim()?.toUpperCase();
  const exp=$('az-exp')?.value?.trim();
  const credit=parseFloat($('az-cr')?.value)||0;
  const collateral=parseFloat($('az-col')?.value)||0;
  if(!ticker){alert('Enter a ticker symbol');return;}
  $('az-btn').disabled=true;$('az-btn').textContent='FETCHING DATA...';
  $('az-result').innerHTML=`<div class="lc" style="height:100px"><div class="spin"></div><p style="color:var(--dim);font-size:10px;letter-spacing:2px;margin-left:12px">PULLING ${ticker}...</p></div>`;
  try{
    const shortLeg=azLegData.find(l=>l.a==='SELL');
    const shortStrike=parseFloat(shortLeg?.s)||0;
    const optType=(shortLeg?.t||'PUT').toLowerCase();
    let dte=null,expDate=null;
    if(exp){const p=exp.split('/');if(p.length===3){expDate=new Date(`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}T16:00:00`);dte=Math.ceil((expDate-new Date())/86400000);}}
    const[dataMap,earnings,yahooChain]=await Promise.all([
      fetchAVBatch([ticker]),fetchEarnings(ticker),exp?fetchYahooOptions(ticker,exp):Promise.resolve(null)
    ]);
    const data=dataMap[ticker];
    const price=data?.price||0;
    const hv30=data?.hv30||.3;
    const lastDate=data?.lastDate||'';
    // Real delta from Yahoo options chain
    let absDelta=null,deltaSource='BS';
    if(yahooChain&&shortStrike>0){
      const chain=optType==='put'?yahooChain.puts:yahooChain.calls;
      const match=chain?.find(o=>Math.abs(parseFloat(o.strike||0)-shortStrike)<0.26);
      if(match&&match.delta){absDelta=Math.abs(match.delta);deltaSource='Yahoo';}
    }
    if(absDelta===null){
      const T=dte?dte/365:21/365;
      const bd=shortStrike>0?bsDelta(price,shortStrike,T,hv30,optType):null;
      if(bd!==null){absDelta=Math.abs(bd);deltaSource='BS';}
    }
    const cushionPct=price>0&&shortStrike>0?parseFloat(((price-shortStrike)/price*100).toFixed(1)):null;
    let earningsRisk=false,earningsDate=null;
    if(earnings){earningsDate=earnings.date;if(expDate){const ed=new Date(earnings.date+'T12:00:00');if(ed<=expDate)earningsRisk=true;}else earningsRisk=true;}
    const supBelow=data?.supports||[];
    const aboveSupport=shortStrike>0&&supBelow.length>0&&shortStrike>supBelow[0];
    const exitSignal=supBelow.length>0?supBelow[0]:null;
    let signal='GO';const reasons=[];
    if(earningsRisk){signal='NO-GO';reasons.push(`Earnings ${earningsDate} within expiration`);}
    if(cushionPct!==null&&cushionPct<5){signal='NO-GO';reasons.push(`${cushionPct}% cushion below 5% minimum`);}
    if(absDelta&&absDelta>0.30){signal=signal==='GO'?'CAUTION':signal;reasons.push(`Delta ~${absDelta.toFixed(3)} above .28 target`);}
    if(aboveSupport&&supBelow[0]){signal=signal==='GO'?'CAUTION':signal;reasons.push(`Short strike $${shortStrike} above support $${supBelow[0]}`);}
    if(reasons.length===0)reasons.push('All checks passed -- structure looks solid');
    const isBWB=azStrat==='BWB / PUT RATIO';
    const bwbScore=isBWB?scoreBWB(azLegData,credit,price,dte,earningsRisk):null;
    const bwbInfo=isBWB?calcBWBMaxLoss(azLegData,credit):null;
    const be=isBWB?calcBWBBreakeven(azLegData,credit):null;
    const beCushion=price>0&&be?parseFloat(((price-be)/price*100).toFixed(1)):null;
    azResult={ticker,strategy:azStrat,legs:azLegData.map(l=>({...l})),shortStrike,exp,price,lastDate,credit,collateral,cushionPct,beCushion,breakeven:be,absDelta,deltaSource,hv30,dte,supports:supBelow,resistances:data?.resistances||[],exitSignal,earningsRisk,earningsDate,signal,bwbScore,bwbInfo};
    const sc3=signal==='GO'?'#00e676':signal==='CAUTION'?'#ffd600':'#ff1744';
    let html=`
      <div class="res-hero" style="background:${sc3}10;border:1px solid ${sc3}35">
        <div class="res-circle" style="background:${sc3};color:var(--bg);width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:9px;letter-spacing:1px;flex-shrink:0">${signal}</div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:${sc3}">${ticker} -- ${azStrat}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:4px;line-height:1.6">${reasons.join('. ')}.</div>
          ${lastDate?`<div style="font-size:9px;color:var(--muted);margin-top:3px">Price as of ${lastDate}</div>`:''}
        </div>
      </div>`;
    if(bwbScore){
      html+=`<div class="bwb-score" style="background:${bwbScore.gc2}10;border:1px solid ${bwbScore.gc2}30">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:4px">BWB QUALITY SCORE</div>
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:${bwbScore.gc2};line-height:1">${bwbScore.grade}</div>
            <div style="font-size:11px;color:${bwbScore.gc2};margin-top:2px">${bwbScore.gl}</div>
          </div>
          <div style="text-align:right"><div style="font-size:28px;font-weight:800;font-family:'Syne',sans-serif;color:${bwbScore.gc2}">${bwbScore.score}</div><div style="font-size:9px;color:var(--muted)">/ 100</div></div>
        </div>
        ${bwbScore.notes.map(n=>`<div class="bwb-row"><span style="color:var(--dim)">${n}</span></div>`).join('')}
        <div style="margin-top:10px" class="g3">
          ${mc2('CREDIT/MAX LOSS',`${bwbScore.crRatio}%`,bwbScore.crRatio>=20?'#00e676':bwbScore.crRatio>=12?'#ffd600':'#ff1744')}
          ${mc2('BE CUSHION',beCushion!==null?`${beCushion}%`:'N/A',beCushion!==null?cushC(beCushion):'var(--muted)')}
          ${mc2('MAX LOSS',bwbInfo?`$${bwbInfo.maxLoss.toFixed(0)}`:'N/A','var(--text)')}
        </div>
        ${bwbInfo?`<div style="font-size:10px;color:var(--dim);margin-top:8px;line-height:1.6">Upper: $${bwbInfo.upper} · Lower: $${bwbInfo.lower} · BE: $${be}</div>`:''}
      </div>`;
    }
    html+=`<div class="g2">
      ${mc2('DELTA',absDelta!==null?absDelta.toFixed(3):'N/A',absDelta?(absDelta<=0.28?'#00e676':'#ffd600'):'var(--muted)')}
      ${mc2('CUSHION TO SHORT',cushionPct!==null?`${cushionPct}%`:'N/A',cushionPct!==null?cushC(cushionPct):'var(--muted)')}
      ${mc2('LIVE PRICE',price?`$${price}`:'N/A','var(--text)')}
      ${mc2('DTE',dte!==null?`${dte}d`:'N/A',dte&&dte>=14&&dte<=21?'#00e676':dte&&dte<14?'#ffd600':'var(--dim)')}
      ${mc2('HV30',`${(hv30*100).toFixed(1)}%`,'var(--dim)')}
      ${(function(){
        var em = (price && hv30 && dte) ? (price * hv30 * Math.sqrt(dte/365)).toFixed(2) : null;
        return mc2('EXPECTED MOVE', em ? '$'+em : 'N/A', em ? '#ffd600' : 'var(--muted)');
      })()}
      ${(function(){
        var em = (price && hv30 && dte) ? price * hv30 * Math.sqrt(dte/365) : null;
        var dist = (shortStrike > 0 && price > 0) ? (price - shortStrike) : null;
        var outside = (em && dist !== null) ? dist > em : null;
        if (outside === null) return mc2('STRIKE vs EM', 'N/A', 'var(--muted)');
        return mc2('STRIKE vs EM', outside ? 'OUTSIDE ✓' : 'INSIDE ⚠', outside ? '#00e676' : '#ffd600');
      })()}
      ${mc2('EARNINGS',earningsRisk?`⚠ ${earningsDate}`:(earningsDate?`✓ ${earningsDate}`:'✓ CLEAR'),earningsRisk?'#ff1744':'#00e676')}
    </div>
    <div style="padding:7px 11px;margin-bottom:12px;border-radius:6px;font-size:9px;${deltaSource==='Yahoo'?'background:rgba(0,230,118,.08);color:#00e676;border:1px solid rgba(0,230,118,.2)':'background:rgba(255,214,0,.08);color:#ffd600;border:1px solid rgba(255,214,0,.2)'}">
      <span style="font-size:8px;padding:1px 5px;border-radius:4px;background:${deltaSource==='Yahoo'?'rgba(0,230,118,.15)':'rgba(255,214,0,.15)'};border:1px solid ${deltaSource==='Yahoo'?'rgba(0,230,118,.3)':'rgba(255,214,0,.3)'};margin-right:5px">${deltaSource==='Yahoo'?'REAL':'EST'}</span>
      ${deltaSource==='Yahoo'?'Delta from Yahoo Finance options chain.':'Delta estimated via HV30. Use as screening estimate only -- may differ on high-IV or skewed names.'}
    </div>`;
    if(supBelow.length>0){
      html+=`<div class="card">
        <span class="lbl">KEY LEVELS</span>
        <div style="display:flex;gap:24px;margin-bottom:10px">
          <div><div style="font-size:9px;color:#00e676;letter-spacing:1px;margin-bottom:6px">SUPPORT</div>${supBelow.map(p=>`<div style="font-size:16px;font-weight:700;color:#00e676;font-family:'DM Mono',monospace">$${p}</div>`).join('')}</div>
          <div><div style="font-size:9px;color:#ff1744;letter-spacing:1px;margin-bottom:6px">RESISTANCE</div>${(data?.resistances||[]).map(p=>`<div style="font-size:16px;font-weight:700;color:#ff1744;font-family:'DM Mono',monospace">$${p}</div>`).join('')}</div>
        </div>
        ${exitSignal?`<div style="padding:8px 11px;background:rgba(255,23,68,.07);border-radius:7px;font-size:10px;color:#ff8a80;border:1px solid rgba(255,23,68,.15)">⚡ Exit signal -- Close if ${ticker} breaks $${exitSignal}</div>`:''}
        <div style="font-size:10px;color:var(--dim);margin-top:8px">SMA20: $${data?.sma20||'N/A'} · SMA50: $${data?.sma50||'N/A'}</div>

}

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:17px">${t.ticker}</span>
            <span class="badge" style="background:${assess.color}18;border:1px solid ${assess.color}35;color:${assess.color}">${assess.label}</span>
          </div>
          <div style="font-size:9px;color:var(--muted)">${t.strategy}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">EXP ${t.expDate||'?'} · <span style="color:${dteC};font-weight:700">${dte!==undefined?`${dte}D LEFT`:'?'}</span></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:700;color:${cushC(liveCushion)}">${liveCushion}%</div>
          <div style="font-size:9px;color:var(--muted)">CUSHION${lp?' (live)':''}</div>
          <div style="font-size:10px;color:var(--dim);margin-top:2px">BE $${t.breakeven||'?'}</div>
        </div>
      </div>
      <div style="margin-bottom:10px;display:flex;flex-wrap:wrap">${legs.map(l=>`<span class="lb ${l.a==='SELL'?'lb-sell':'lb-buy'}">${l.a} ${l.n}× $${l.s} ${l.t}</span>`).join('')}</div>
      <div class="g3" style="margin-bottom:10px">
        ${mc2('PRICE',priceLabel||'N/A',lp?'#00e676':'var(--text)')}
        ${mc2('CREDIT/SHR',`$${t.creditReceived||'?'}`,'#00e676')}
        ${mc2('COLLATERAL',`$${t.maxRisk||'?'}`,'var(--text)')}
      </div>
      ${t.notes?`<div style="font-size:10px;color:var(--dim);margin-bottom:8px;padding:6px 10px;background:var(--deep);border-radius:6px">${t.notes}</div>`:''}
      ${t.exitSignal?`<div style="padding:6px 10px;background:rgba(255,23,68,.06);border-radius:6px;font-size:10px;color:#ff8a80;margin-bottom:8px;border:1px solid rgba(255,23,68,.12)">⚡ Exit if ${t.ticker} breaks $${t.exitSignal}</div>`:''}
      <div style="display:flex;gap:6px">
        <input type="number" placeholder="Current P&L %" value="${t.currentPnlPct||''}" onblur="updPnl(${t.id},this.value)" style="flex:1;color:${pnl>=40?'#00e676':pnl<-15?'#ff1744':'var(--text)'}">
        <button onclick="closeT(${t.id},'PROFIT')" style="padding:7px 12px;background:rgba(0,230,118,.15);border:1px solid rgba(0,230,118,.3);border-radius:7px;color:#00e676;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;white-space:nowrap">✓ WIN</button>
        <button onclick="closeT(${t.id},'STOP')" style="padding:7px 12px;background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.3);border-radius:7px;color:#ff1744;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;white-space:nowrap">✗ LOSS</button>
        <button onclick="delT(${t.id})" style="padding:7px 10px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer">🗑</button>
      </div>
    </div>`;
  });

  if(recent.length>0){html+=`<div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin:24px 0 10px">RECENTLY CLOSED</div>`;recent.forEach(t=>html+=closedRow(t));}
  if(old.length>0){
    html+=`<button class="btn btn-ghost btn-w" style="margin-top:10px;font-size:10px" onclick="showHistory=!showHistory;renderTrades()">${showHistory?'▲ HIDE':'▼ SHOW'} OLDER TRADES (${old.length})</button>`;
    if(showHistory)old.forEach(t=>html+=closedRow(t));
  }
  $('t-trades').innerHTML=html;
  formLegData=DEF[formStrat].map(l=>({...l}));formLegs=formLegData;
  buildLegs();
}

function closedRow(t){
  const pnl=parseFloat(t.currentPnlPct)||0;
  return`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--deep);border-radius:9px;margin-bottom:7px;opacity:.8">
    <div style="flex:1">
      <span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--dim);margin-right:8px">${t.ticker}</span>
      <span style="font-size:10px;color:var(--muted)">${t.strategy}</span>
      ${t.expDate?`<div style="font-size:9px;color:var(--muted);margin-top:2px">${t.expDate}</div>`:''}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:13px;font-weight:700;color:${pnl>0?'#00e676':'#ff1744'}">${pnl>0?'+':''}${pnl}%</span>
      <span class="chip" style="background:${t.closeReason==='PROFIT'?'rgba(0,230,118,.12)':'rgba(255,23,68,.12)'};color:${t.closeReason==='PROFIT'?'#00e676':'#ff1744'}">${t.closeReason}</span>
      <button onclick="delT(${t.id})" style="background:transparent;border:none;color:var(--muted);cursor:pointer;padding:2px 6px">✕</button>
    </div>
  </div>`;
}

function toggleForm(){
  const f=$('tfm'),tog=$('tfm-tog');const show=f.style.display==='none';
  f.style.display=show?'block':'none';tog.textContent=show?'CANCEL':'+ LOG TRADE';
  tog.style.background=show?'#1e2535':'var(--green)';tog.style.color=show?'var(--muted)':'var(--bg)';
  if(show)buildLegs();
}

function selectStrat(s){
  formStrat=s;formLegData=DEF[s].map(l=>({...l}));formLegs=formLegData;
  document.querySelectorAll('.sp').forEach(p=>p.classList.toggle('active',p.textContent===s));
  buildLegs();tradeAutoCol();
}

function buildLegs(){
  const c=$('lc');if(!c)return;
  c.innerHTML=formLegData.map((leg,i)=>`
    <div class="leg-row ${leg.a==='SELL'?'sell':'buy-l'}">
      <select class="leg-action" style="color:${leg.a==='SELL'?'#ff1744':'#00e676'}" onchange="formLegData[${i}].a=this.value;buildLegs();tradeAutoCol()">
        <option ${leg.a==='SELL'?'selected':''}>SELL</option><option ${leg.a==='BUY'?'selected':''}>BUY</option>
      </select>
      <input type="number" value="${leg.n||1}" min="1" max="20" class="leg-ct" onblur="formLegData[${i}].n=parseInt(this.value)||1;tradeAutoCol()">
      <span style="color:var(--muted);font-size:10px">×</span>
      <select class="leg-type" onchange="formLegData[${i}].t=this.value">
        <option ${leg.t==='PUT'?'selected':''}>PUT</option><option ${leg.t==='CALL'?'selected':''}>CALL</option>
      </select>
      <input type="number" value="${leg.s||''}" placeholder="Strike $" class="strike-input" style="flex:1"
        oninput="formLegData[${i}].s=this.value" onblur="formLegData[${i}].s=this.value;tradeAutoCol()">
      ${formLegData.length>1?`<button class="leg-x" onclick="formLegData.splice(${i},1);formLegs=formLegData;buildLegs();tradeAutoCol()">×</button>`:''}
    </div>`).join('');
}

function tradeAutoCol(){
  formLegs=formLegData;
  const cr=parseFloat($('tf-cr')?.value)||0;
  const col=calcCollateral(formStrat,formLegData,cr);
  const el=$('tf-col');if(el&&col>0)el.value=col.toFixed(0);
}
function addLeg(){formLegData.push({a:'BUY',t:'PUT',n:1,s:''});formLegs=formLegData;buildLegs();}
function removeLeg(i){formLegData.splice(i,1);formLegs=formLegData;buildLegs();}

function submitTrade(){
  formLegs=formLegData;
  const ticker=$('tf-tk')?.value?.trim()?.toUpperCase();
  if(!ticker){alert('Enter a ticker');return;}
  const stock=parseFloat($('tf-px')?.value)||0,credit=parseFloat($('tf-cr')?.value)||0,collateral=parseFloat($('tf-col')?.value)||0;
  const expRaw=$('tf-exp')?.value||'';
  const shortLeg=formLegData.find(l=>l.a==='SELL');
  const strike=parseFloat(shortLeg?.s)||0;
  const be=strike>0&&credit>0?parseFloat((strike-credit).toFixed(2)):null;
  const cushionVal=stock>0&&be?parseFloat(((stock-be)/stock*100).toFixed(1)):null;
  let dte=null;
  if(expRaw){const p=expRaw.split('/');if(p.length===3){const ed=new Date(`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}T16:00:00`);dte=Math.max(0,Math.ceil((ed-new Date())/86400000));}}
  trades.unshift({
    id:Date.now(),ticker,strategy:formStrat,legs:formLegData.map(l=>({...l})),
    expDate:expRaw,dteOpen:$('tf-dte')?.value||dte?.toString()||'',
    creditReceived:credit.toString(),maxRisk:collateral.toString(),
    stockAtOpen:stock.toString(),exitSignal:$('tf-exit')?.value||'',
    notes:$('tf-notes')?.value||'',openDate:new Date().toISOString().slice(0,10),
    breakeven:be,cushionPct:cushionVal,status:'OPEN',currentPnlPct:'',closeReason:''
  });
  saveTrades();toast('Trade logged!');renderTrades();
}

function updPnl(id,v){const t=trades.find(t=>t.id===id);if(t){t.currentPnlPct=v;saveTrades();}}
function closeT(id,r){const t=trades.find(t=>t.id===id);if(t){t.status='CLOSED';t.closeReason=r;t.closeDate=new Date().toISOString().slice(0,10);saveTrades();renderTrades();toast(`${t.ticker} closed -- ${r}`);}}
function delT(id){if(confirm('Delete this trade?')){trades=trades.filter(t=>t.id!==id);saveTrades();renderTrades();}}

// ── Stats Tab ──────────────────────────────────────────────────────────────────
function renderStats(){
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const open=trades.filter(t=>t.status==='OPEN');
  const nw=closed.filter(t=>parseFloat(t.currentPnlPct)>0).length;
  const nTotal=hist.totalTrades+closed.length,nWins=hist.wins+nw;
  const totalPnl=hist.realizedPnl+closed.reduce((acc,t)=>{const cr=parseFloat(t.creditReceived)||0;return acc+(cr*100*(parseFloat(t.currentPnlPct)||0)/100);},0);
  const wr=nTotal>0?((nWins/nTotal)*100).toFixed(1):hist.winPct.toFixed(1);
  const wrc=parseFloat(wr)>70?'#00e676':parseFloat(wr)>55?'#ffd600':'#ff1744';
  const colInUse=open.reduce((a,t)=>a+(parseFloat(t.maxRisk)||0),0);

  let html=`<span class="lbl">PERFORMANCE -- ALL TIME</span>
    <div class="stat-h">
      <div class="sh"><div class="sh-v" style="color:${wrc}">${wr}%</div><div class="sh-l">WIN RATE</div><div class="wbar"><div class="wbar-f" style="width:${wr}%;background:${wrc}"></div></div></div>
      <div class="sh"><div class="sh-v">${nTotal}</div><div class="sh-l">TOTAL TRADES</div></div>
      <div class="sh"><div class="sh-v" style="color:#00e676">$${totalPnl.toFixed(0)}</div><div class="sh-l">REALIZED P&L</div></div>
    </div>
    <div class="g2">
      ${mc2('WINS / LOSSES',`${nWins} / ${nTotal-nWins}`,nWins>nTotal-nWins?'#00e676':'#ffd600')}
      ${mc2('PROFIT FACTOR',hist.profitFactor.toFixed(2),'#00e676')}
      ${mc2('AVG WIN %',`+${hist.avgWinPct}%`,'#00e676')}
      ${mc2('AVG LOSS %',`${hist.avgLossPct}%`,'#ff1744')}
      ${mc2('OPEN NOW',open.length,'var(--green)')}
      ${mc2('COLLATERAL IN USE',`$${colInUse.toFixed(0)}`,'var(--yellow)')}
    </div>`;

  html+=`<div class="card"><span class="lbl">TRADE LOG</span>
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--deep);border-radius:9px;margin-bottom:7px;border:1px solid rgba(0,230,118,.15)">
      <div style="flex:1"><span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--green);margin-right:8px">BASELINE</span><span style="font-size:10px;color:var(--muted)">56 trades · 5 weeks pre-TradeWatch</span>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">76.4% win rate · $736 P&L · 2.84 profit factor</div></div>
      <span style="font-size:13px;font-weight:700;color:#00e676">+$736</span>
    </div>`;
  [...closed,...open].sort((a,b)=>b.id-a.id).forEach(t=>{
    const pnl=parseFloat(t.currentPnlPct)||0;const isOpen=t.status==='OPEN';
    const cr=parseFloat(t.creditReceived)||0;const dp=isOpen?null:(cr*100*pnl/100);
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--deep);border-radius:9px;margin-bottom:6px;${isOpen?'border:1px solid rgba(0,230,118,.1)':'opacity:.8'}">
      <div style="flex:1"><span style="font-family:'Syne',sans-serif;font-weight:700;${isOpen?'color:var(--text)':'color:var(--dim)'};margin-right:8px">${t.ticker}</span><span style="font-size:10px;color:var(--muted)">${t.strategy}</span>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">${t.expDate||''} ${isOpen?'· <span style="color:var(--green)">OPEN</span>':`· ${t.closeReason||'CLOSED'}`}</div></div>
      <div style="text-align:right">${isOpen?`<span class="badge" style="background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:var(--green)">OPEN</span>`:`<div style="font-size:13px;font-weight:700;color:${pnl>0?'#00e676':'#ff1744'}">${pnl>0?'+':''}${pnl}%</div>${dp!==null?`<div style="font-size:10px;color:var(--dim)">$${dp.toFixed(0)}</div>`:''}`}</div>
    </div>`;
  });
  html+=`</div>`;

  if(closed.length>0){
    const byS={};
    closed.forEach(t=>{
      const k=t.strategy||'UNKNOWN';const cr=parseFloat(t.creditReceived)||0;const col=parseFloat(t.maxRisk)||100;
      const pnl=parseFloat(t.currentPnlPct)||0;const roc=(cr*100*pnl/100)/col*100;
      const legs=t.legs||[];const sell=legs.find(l=>l.a==='SELL');const buy=legs.find(l=>l.a==='BUY');
      const w=sell&&buy?Math.abs((parseFloat(sell.s)||0)-(parseFloat(buy.s)||0)):0;
      if(!byS[k])byS[k]={wins:0,losses:0,roc:0,count:0,widths:[],cols:[]};
      if(pnl>0)byS[k].wins++;else byS[k].losses++;
      byS[k].roc+=roc;byS[k].count++;if(w>0)byS[k].widths.push(w);if(col>0)byS[k].cols.push(col);
    });
    html+=`<div class="card"><span class="lbl">BY STRATEGY</span>`;
    Object.entries(byS).forEach(([s,d])=>{
      const wr2=((d.wins/d.count)*100).toFixed(0),ar=(d.roc/d.count).toFixed(1);
      const aw=d.widths.length?(d.widths.reduce((a,b)=>a+b,0)/d.widths.length).toFixed(1):'N/A';
      const ac=d.cols.length?(d.cols.reduce((a,b)=>a+b,0)/d.cols.length).toFixed(0):'N/A';
      const wc=parseInt(wr2)>=65?'#00e676':'#ffd600';
      html+=`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:12px">${s}</span>
          <div style="display:flex;gap:6px"><span class="chip" style="background:${wc}15;border:1px solid ${wc}35;color:${wc}">${wr2}% WIN</span><span class="chip" style="background:rgba(136,146,164,.1);color:var(--muted)">${d.count}×</span></div>
        </div>
        <div class="g3">${mc2('AVG WIDTH',aw!=='N/A'?`$${aw}`:'N/A','var(--text)')}${mc2('AVG COLLATERAL',ac!=='N/A'?`$${ac}`:'N/A','var(--text)')}${mc2('AVG ROC',`${parseFloat(ar)>0?'+':''}${ar}%`,parseFloat(ar)>0?'#00e676':'#ff1744')}</div>
        <div class="wbar"><div class="wbar-f" style="width:${wr2}%;background:${wc}"></div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="card"><span class="lbl">HISTORICAL BASELINE</span>
    <div style="font-size:11px;color:var(--dim);line-height:1.9;margin-bottom:12px">5 weeks · ${hist.totalTrades} trades · ${hist.winPct}% win rate · $${hist.realizedPnl} P&L · ${hist.profitFactor} profit factor<br>Avg winner: +${hist.avgWinPct}% · Avg loser: ${hist.avgLossPct}%</div>
    <button class="btn btn-ghost" onclick="editHist()" style="width:auto;padding:7px 14px;font-size:10px">EDIT NUMBERS</button>
  </div>
  <div class="card" id="cc"><span class="lbl">AI COACHING</span>
    <div style="font-size:10px;color:var(--muted);margin-bottom:10px">Works in Claude.ai artifact viewer. Needs backend setup for GitHub Pages.</div>
    <button class="btn btn-purple btn-w" onclick="getCoaching()">✦ GENERATE COACHING INSIGHT</button>
    <div id="co" style="margin-top:12px;font-size:12px;color:#c8d0dc;line-height:1.8"></div>
  </div>`;
  $('t-stats').innerHTML=html;
}

function editHist(){
  const inp=prompt(`Edit baseline:\ntotalTrades,wins,losses,realizedPnl,winPct,avgWinPct,avgLossPct,profitFactor\nCurrent: ${hist.totalTrades},${hist.wins},${hist.losses},${hist.realizedPnl},${hist.winPct},${hist.avgWinPct},${hist.avgLossPct},${hist.profitFactor}`);
  if(!inp)return;const p=inp.split(',');
  if(p.length>=8){hist={totalTrades:+p[0],wins:+p[1],losses:+p[2],realizedPnl:+p[3],winPct:+p[4],avgWinPct:+p[5],avgLossPct:+p[6],profitFactor:+p[7]};saveHist();renderStats();toast('Updated!');}
}

async function getCoaching(){
  const btn=document.querySelector('#cc .btn-purple');if(btn){btn.disabled=true;btn.textContent='ANALYZING...';}
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const summary=closed.length>0?closed.map(t=>`${t.ticker} ${t.strategy} legs:${(t.legs||[]).map(l=>`${l.a}${l.n}x$${l.s}${l.t}`).join('/')} col:$${t.maxRisk} cr:$${t.creditReceived} pnl:${t.currentPnlPct}% ${t.closeReason}`).join('\n'):'No new trades yet.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:`Options trading coach. Trader: ${hist.totalTrades} trades, ${hist.winPct}% win rate, $${hist.realizedPnl} P&L, ${hist.profitFactor} profit factor. Uses put credit spreads and BWBs for high upfront credit, 14-21 DTE, closes 40-60% profit.\n\nNew trades:\n${summary}\n\nGive 3 specific actionable insights. Plain text, 3 paragraphs, no markdown.`}]})});
    const d=await resp.json();$('co').textContent=d.content?.map(c=>c.text||'').join('')||'No response.';
  }catch(e){$('co').textContent='Coaching requires a backend API key setup. Coming in v2. Your stats above cover the key metrics.';}
  finally{if(btn){btn.disabled=false;btn.textContent='↺ REGENERATE';}}
}

// ── Init ───────────────────────────────────────────────────────────────────────
$('hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
if(!localStorage.getItem(HK))saveHist();
loadSignal();
renderAnalyze();
</script>
</body>
</html>
