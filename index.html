const STRATS=['PUT CREDIT SPREAD','BWB / PUT RATIO','CASH SECURED PUT','COVERED CALL','CALL CREDIT SPREAD','IRON CONDOR','PUT DEBIT SPREAD','CALL DEBIT SPREAD','OTHER'];
const DEF={

};

const $=id=>document.getElementById(id);

function gc(k,ttl){try{const c=JSON.parse(localStorage.getItem(k)||'null');if(c&&Date.now()-c.ts<ttl)return c.data;}catch(e){}return null;}
function sc2(k,d){localStorage.setItem(k,JSON.stringify({data:d,ts:Date.now()}));}

// ── Black-Scholes (for screening estimate only) ───────────────────────────────
function ncdf(x){
  const a=[.254829592,-.284496736,1.421413741,-1.453152027,1.061405429],p=.3275911;
  const sgn=x<0?-1:1;x=Math.abs(x)/Math.sqrt(2);
  const t2=1/(1+p*x);
  let y=1-(((((a[4]*t2+a[3])*t2+a[2])*t2+a[1])*t2+a[0])*t2*Math.exp(-x*x));
  return .5*(1+sgn*y);
}
function bsDelta(S,K,T,sigma,type='put'){
  if(!S||!K||!T||!sigma||T<=0||sigma<=0)return null;
  const d1=(Math.log(S/K)+.5*sigma*sigma*T)/(sigma*Math.sqrt(T));
  return type==='call'?ncdf(d1):ncdf(d1)-1;
}
function calcHV(closes,days=30){
  if(closes.length<days+1)return .3;
  const sl=closes.slice(0,days+1);
  const ret=sl.slice(0,-1).map((c,i)=>Math.log(c/sl[i+1]));
  const m=ret.reduce((a,b)=>a+b,0)/ret.length;
  const v=ret.reduce((a,r)=>a+Math.pow(r-m,2),0)/(ret.length-1);
  return Math.sqrt(v*252);
}

// ── BWB calculations ──────────────────────────────────────────────────────────
function calcBWBMaxLoss(legs,creditPerShare){
  // Identify legs: top long (highest strike buy), short, bottom long (lowest strike buy)
  const buys=legs.filter(l=>l.a==='BUY').map(l=>parseFloat(l.s)||0).filter(s=>s>0).sort((a,b)=>b-a);
  const sells=legs.filter(l=>l.a==='SELL').map(l=>parseFloat(l.s)||0).filter(s=>s>0);
  if(buys.length<2||sells.length<1)return null;
  const topLong=buys[0];
  const bottomLong=buys[buys.length-1];
  const shortStrike=sells[0];
  const contracts=legs.find(l=>l.a==='SELL')?.n||1;
  const cr=parseFloat(creditPerShare)||0;
  const upperWidth=topLong-shortStrike;
  const lowerWidth=shortStrike-bottomLong;
  if(upperWidth<=0||lowerWidth<=0)return null;
  const maxLoss=(lowerWidth-upperWidth)*100*contracts-(cr*100*contracts);
  return{maxLoss:Math.max(0,maxLoss),upperWidth,lowerWidth,topLong,shortStrike,bottomLong,contracts};
}

function calcBWBBreakeven(legs,creditPerShare){
  const sells=legs.filter(l=>l.a==='SELL');
  if(!sells.length)return null;
  const shortStrike=parseFloat(sells[0].s)||0;
  const cr=parseFloat(creditPerShare)||0;
  if(!shortStrike||!cr)return null;
  // Lower breakeven = shortStrike - credit (like a spread)
  return parseFloat((shortStrike-cr).toFixed(2));
}

// ── Collateral calc ───────────────────────────────────────────────────────────
function calcCollateral(strat,legs,credit){
  const sells=legs.filter(l=>l.a==='SELL');
  const buys=legs.filter(l=>l.a==='BUY');
  const contracts=Math.max(...[...sells,...buys].map(l=>l.n||1),1);
  const cr=parseFloat(credit)||0;
  if(strat==='CASH SECURED PUT'){const s=parseFloat(sells[0]?.s)||0;return s*100;}
  if(strat==='COVERED CALL')return 0;
  if(strat==='BWB / PUT RATIO'){
    const bwb=calcBWBMaxLoss(legs,cr);
    return bwb?bwb.maxLoss:0;
  }
  if(sells.length>0&&buys.length>0){
    const ss=parseFloat(sells[0]?.s)||0;
    const bs=parseFloat(buys[0]?.s)||0;
    const w=Math.abs(ss-bs);
    return Math.max(0,(w-cr)*100*contracts);
  }
  return 0;
}

// ── BWB quality scorer ────────────────────────────────────────────────────────
function scoreBWB(legs,credit,price,dte,earningsRisk){
  const cr=parseFloat(credit)||0;
  const bwb=calcBWBMaxLoss(legs,cr);
  const be=calcBWBBreakeven(legs,cr);
  if(!bwb||!be)return null;
  const maxLoss=bwb.maxLoss;
  const crDollar=cr*100*bwb.contracts;
  // Key metrics
  const crRatio=maxLoss>0?parseFloat((crDollar/maxLoss*100).toFixed(1)):0; // credit as % of max loss
  const beCushion=price>0?parseFloat(((price-be)/price*100).toFixed(1)):0; // % cushion to breakeven
  const shortStrike=bwb.shortStrike;
  const shortDelta=price>0&&shortStrike>0&&dte?Math.abs(bsDelta(price,shortStrike,dte/365,.35,'put')||0):0;
  const dteOk=dte>=12&&dte<=23;
  const wingRatio=bwb.upperWidth>0?parseFloat((bwb.lowerWidth/bwb.upperWidth).toFixed(2)):0;
  // Scoring
  let score=0;const notes=[];
  // Credit/Max Loss — most important for your style
  if(crRatio>=20){score+=35;notes.push(`✓ Strong credit ratio ${crRatio}%`);}
  else if(crRatio>=12){score+=20;notes.push(`△ Moderate credit ratio ${crRatio}%`);}
  else{score+=5;notes.push(`✗ Low credit ratio ${crRatio}% — consider different strikes`);}
  // BE cushion — your primary metric
  if(beCushion>=8){score+=30;notes.push(`✓ ${beCushion}% cushion to breakeven`);}
  else if(beCushion>=5){score+=18;notes.push(`△ ${beCushion}% cushion to BE — acceptable`);}
  else if(beCushion>=3){score+=8;notes.push(`⚠ ${beCushion}% cushion to BE — tight`);}
  else{score+=0;notes.push(`✗ ${beCushion}% cushion to BE — too tight`);}
  // Earnings
  if(!earningsRisk){score+=20;notes.push('✓ Earnings clear');}
  else{score+=0;notes.push('✗ Earnings within expiration — binary risk');}
  // DTE
  if(dteOk){score+=10;notes.push(`✓ DTE ${dte} in sweet spot`);}
  else{score+=3;notes.push(`△ DTE ${dte} outside 14-21 range`);}
  // Wing ratio (lower/upper) — 2:1 is classic, 1.5-3x acceptable
  if(wingRatio>=1.5&&wingRatio<=3){score+=5;notes.push(`✓ Wing ratio ${wingRatio}:1`);}
  else{notes.push(`△ Wing ratio ${wingRatio}:1 — unusual structure`);}
  // Grade
  let grade,gradeColor,gradeLabel;
  if(score>=75){grade='A';gradeColor='#00e676';gradeLabel='Strong setup';}
  else if(score>=50){grade='B';gradeColor='#ffd600';gradeLabel='Acceptable — monitor closely';}
  else{grade='SKIP';gradeColor='#ff1744';gradeLabel='Not meeting your criteria';}
  return{grade,gradeColor,gradeLabel,score,notes,crRatio,beCushion,maxLoss,crDollar,be,wingRatio,shortDelta};
}

// ── Data fetchers ─────────────────────────────────────────────────────────────
async function fetchVIX(){
  try{
    const url=encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=15d');
    const r=await fetch(PROXY+url,{signal:AbortSignal.timeout(8000)});
    const w=await r.json();
    const d=JSON.parse(w.contents);
    const pr=d.chart.result[0].indicators.quote[0].close.filter(Boolean);
    const ts=d.chart.result[0].timestamp;
    const cur=pr[pr.length-1],prev5=pr[Math.max(0,pr.length-6)];
    const date=new Date(ts[ts.length-1]*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return{level:parseFloat(cur.toFixed(2)),chg:parseFloat(((cur-prev5)/prev5*100).toFixed(1)),date,ok:true};
  }catch(e){return{level:null,chg:0,date:'N/A',ok:false};}
}

async function fetchAVDaily(sym){
  try{
    const r=await fetch(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${sym}&outputsize=compact&apikey=${AV}`,{signal:AbortSignal.timeout(10000)});
    const d=await r.json();
    const ts=d['Time Series (Daily)'];
    if(!ts)return null;
    const dates=Object.keys(ts).sort().reverse();
    const closes=dates.map(dt=>parseFloat(ts[dt]['4. close']));
    const highs=dates.map(dt=>parseFloat(ts[dt]['2. high']));
    const lows=dates.map(dt=>parseFloat(ts[dt]['3. low']));
    const price=closes[0];
    const n50=Math.min(50,closes.length),n200=Math.min(200,closes.length),n20=Math.min(20,closes.length);
    const sma50=closes.slice(0,n50).reduce((a,b)=>a+b,0)/n50;
    const sma200=closes.slice(0,n200).reduce((a,b)=>a+b,0)/n200;
    const sma20=closes.slice(0,n20).reduce((a,b)=>a+b,0)/n20;
    const perf5=closes.length>5?parseFloat(((price-closes[5])/closes[5]*100).toFixed(2)):0;
    const hv30=calcHV(closes,30);
    const supports=new Set([Math.round(sma20*4)/4,Math.round(sma50*4)/4]);
    const resistances=new Set();
    for(let i=2;i<Math.min(25,lows.length-2);i++){
      if(lows[i]<lows[i-1]&&lows[i]<lows[i+1]&&lows[i]<lows[i-2])supports.add(Math.round(lows[i]*4)/4);
      if(highs[i]>highs[i-1]&&highs[i]>highs[i+1])resistances.add(Math.round(highs[i]*4)/4);
    }
    const supArr=[...supports].filter(s=>s<price).sort((a,b)=>b-a).slice(0,3);
    const resArr=[...resistances].filter(r=>r>price).sort((a,b)=>a-b).slice(0,2);
    return{price:parseFloat(price.toFixed(2)),closes,highs,lows,sma20:parseFloat(sma20.toFixed(2)),sma50:parseFloat(sma50.toFixed(2)),sma200:parseFloat(sma200.toFixed(2)),above50:price>sma50,above200:price>sma200,perf5,hv30,supports:supArr,resistances:resArr};
  }catch(e){return null;}
}

async function fetchYahooOptions(ticker,expDateStr){
  try{
    let ts='';
    if(expDateStr){
      const p=expDateStr.includes('/')?expDateStr.split('/'):[expDateStr.slice(5,7),expDateStr.slice(8,10),expDateStr.slice(0,4)];
      const dt=new Date(`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}T00:00:00Z`);
      ts=Math.floor(dt.getTime()/1000);
    }
    const yurl=`https://query1.finance.yahoo.com/v7/finance/options/${ticker}${ts?'?date='+ts:''}`;
    const r=await fetch(PROXY+encodeURIComponent(yurl),{signal:AbortSignal.timeout(10000)});
    const w=await r.json();
    const d=JSON.parse(w.contents);
    const chain=d.optionChain?.result?.[0];
    if(!chain)return null;
    return{puts:chain.options?.[0]?.puts||[],calls:chain.options?.[0]?.calls||[]};
  }catch(e){return null;}
}

// ── Breadth — RSP vs SPY + QQQE vs QQQ + sector participation ────────────────
function calcBreadthScore(rspPerf,spyPerf,qqqePerf,qqqPerf,sectorsPositive){
  let score=50;
  // RSP vs SPY (40% weight)
  const rspDiff=rspPerf-spyPerf;
  if(rspDiff>0.5)score+=15;
  else if(rspDiff>0)score+=5;
  else if(rspDiff<-1.5)score-=20;
  else if(rspDiff<-0.5)score-=10;
  // QQQE vs QQQ (30% weight)
  if(qqqePerf!==null&&qqqPerf!==null){
    const qDiff=qqqePerf-qqqPerf;
    if(qDiff>0.5)score+=10;
    else if(qDiff>0)score+=3;
    else if(qDiff<-1.5)score-=15;
    else if(qDiff<-0.5)score-=8;
  }
  // Sector participation (30% weight)
  if(sectorsPositive>=7)score+=15;
  else if(sectorsPositive>=5)score+=5;
  else if(sectorsPositive<=2)score-=20;
  else if(sectorsPositive<=3)score-=10;
  return Math.max(0,Math.min(100,score));
}

function breadthLabel(score){
  if(score>=70)return{label:'BROAD PARTICIPATION',color:'#00e676'};
  if(score>=45)return{label:'MIXED BREADTH',color:'#ffd600'};
  return{label:'NARROW / WEAK',color:'#ff1744'};
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function sVIX(lv,chg){
  let s=62;if(lv===null)return s;
  if(lv<16)s+=18;else if(lv<20)s+=10;else if(lv<24)s+=2;else if(lv<28)s-=10;else if(lv<33)s-=22;else s-=38;
  if(chg>35)s-=28;else if(chg>20)s-=16;else if(chg>12)s-=7;else if(chg<-15)s+=8;else if(chg<-8)s+=4;
  return Math.max(0,Math.min(100,s));
}
function sStruct(s50,s200,q50,breadthScore){
  let s=55;
  if(s50)s+=15;else s-=18;if(s200)s+=10;else s-=10;if(q50)s+=10;else s-=8;
  // Use real breadth score instead of placeholder
  if(breadthScore>=70)s+=12;else if(breadthScore>=50)s+=4;else if(breadthScore>=38)s-=4;else s-=18;
  return Math.max(0,Math.min(100,s));
}
function sSent(csc){
  let s=65;if(csc>20)s-=28;else if(csc>10)s-=15;else if(csc>4)s-=7;else if(csc<-5)s+=10;
  return Math.max(0,Math.min(100,s));
}
function getSig(vs,ss,sent){
  const w=vs*.40+ss*.35+sent*.15+10;
  if(Math.min(vs,ss)<25||w<36)return'RED';
  if(Math.min(vs,ss)<42||w<56)return'YELLOW';
  return'GREEN';
}
function assessTrade(cushionPct,dte){
  const c=parseFloat(cushionPct)||0,d=parseInt(dte)||999;
  if(c>=7&&d>7)return{label:'SAFE',color:'#00e676',cls:'safe'};
  if(c>=7&&d<=7)return{label:'EXPIRING',color:'#ffd600',cls:'warn'};
  if(c>=4&&d>5)return{label:'MONITOR',color:'#ffd600',cls:'warn'};
  if(c>=4&&d<=5)return{label:'AT RISK',color:'#ff1744',cls:'risk'};
  return{label:'CRITICAL',color:'#ff1744',cls:'risk'};
}

function buildGuidance(sig,vix,spy,creditChg,bl){

}

function addAzLeg(){azLegs.push({a:'BUY',t:'PUT',n:1,s:''});renderAzLegs();}

function azAutoCol(){

async function runAnalysis(){
  const ticker=$('az-tk')?.value?.trim()?.toUpperCase();
  const exp=$('az-exp')?.value?.trim();
  const credit=parseFloat($('az-cr')?.value)||0;
  const collateral=parseFloat($('az-col')?.value)||0;
  if(!ticker){alert('Enter a ticker');return;}
  $('az-btn').disabled=true;$('az-btn').textContent='FETCHING DATA...';
  $('az-result').innerHTML=`<div class="lc" style="height:100px"><div class="spin"></div><p style="color:var(--dim);font-size:10px;letter-spacing:2px">PULLING ${ticker}...</p></div>`;
  try{
    const shortLeg=azLegs.find(l=>l.a==='SELL');
    const shortStrike=parseFloat(shortLeg?.s)||0;
    const optType=(shortLeg?.t||'PUT').toLowerCase();
    let dte=null,expDate=null;
    if(exp){const parts=exp.split('/');if(parts.length===3){expDate=new Date(`${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}T16:00:00`);dte=Math.ceil((expDate-new Date())/86400000);}}
    const[data,earnings,yahooChain]=await Promise.all([
      fetchAVDaily(ticker),fetchEarnings(ticker),exp?fetchYahooOptions(ticker,exp):Promise.resolve(null)
    ]);
    const price=data?.price||0;
    const hv30=data?.hv30||.3;
    // Real delta from Yahoo if available
    let absDelta=null,deltaSource='BS';
    if(yahooChain&&shortStrike>0){
      const chain=optType==='put'?yahooChain.puts:yahooChain.calls;
      const match=chain?.find(o=>Math.abs(parseFloat(o.strike||0)-shortStrike)<0.26);
      if(match&&match.delta){absDelta=Math.abs(match.delta);deltaSource='Yahoo';}
    }
    if(absDelta===null){
      const T=dte?dte/365:21/365;
      const bd=shortStrike>0?bsDelta(price,shortStrike,T,hv30,optType):null;
      if(bd!==null){absDelta=Math.abs(bd);deltaSource='BS';}
    }
    // Cushion to short strike
    const cushionPct=price>0&&shortStrike>0?parseFloat(((price-shortStrike)/price*100).toFixed(1)):null;
    // Earnings risk
    let earningsRisk=false,earningsDate=null;
    if(earnings){earningsDate=earnings.date;if(expDate){const ed=new Date(earnings.date+'T12:00:00');if(ed<=expDate)earningsRisk=true;}else earningsRisk=true;}
    // Support check
    const supBelow=data?.supports||[];
    const aboveSupport=shortStrike>0&&supBelow.length>0&&shortStrike>supBelow[0];
    const exitSignal=supBelow.length>0?supBelow[0]:null;
    // Basic signal
    let signal='GO';const reasons=[];
    if(earningsRisk){signal='NO-GO';reasons.push(`Earnings ${earningsDate} within expiration window`);}
    if(cushionPct!==null&&cushionPct<5){signal='NO-GO';reasons.push(`${cushionPct}% cushion below 5% minimum`);}
    if(absDelta&&absDelta>0.30){signal=signal==='GO'?'CAUTION':signal;reasons.push(`Delta ~${absDelta.toFixed(3)} above .28 target`);}
    if(aboveSupport&&supBelow[0]){signal=signal==='GO'?'CAUTION':signal;reasons.push(`Short strike $${shortStrike} above support $${supBelow[0]}`);}
    if(reasons.length===0)reasons.push('All checks passed — structure looks solid');
    // BWB score if applicable
    const isBWB=azStrat==='BWB / PUT RATIO';
    const bwbScore=isBWB?scoreBWB(azLegs,credit,price,dte,earningsRisk):null;
    const bwbInfo=isBWB?calcBWBMaxLoss(azLegs,credit):null;
    const be=isBWB?calcBWBBreakeven(azLegs,credit):null;
    const beCushion=price>0&&be?parseFloat(((price-be)/price*100).toFixed(1)):null;
    azResult={ticker,strategy:azStrat,legs:azLegs.map(l=>({...l})),shortStrike,exp,price,credit,collateral,cushionPct,beCushion,breakeven:be,absDelta,deltaSource,hv30,dte,supports:supBelow,resistances:data?.resistances||[],exitSignal,earningsRisk,earningsDate,signal,bwbScore,bwbInfo};
    const sigCol2=signal==='GO'?'#00e676':signal==='CAUTION'?'#ffd600':'#ff1744';
    let html=`
      <div class="res-hero" style="background:${sigCol2}10;border:1px solid ${sigCol2}35">
        <div class="res-circle" style="background:${sigCol2};color:var(--bg)">${signal}</div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:${sigCol2}">${ticker} — ${azStrat}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:4px;line-height:1.6">${reasons.join('. ')}.</div>
        </div>
      </div>`;
    // BWB quality score block
    if(bwbScore){
      html+=`<div class="bwb-score" style="background:${bwbScore.gradeColor}10;border:1px solid ${bwbScore.gradeColor}30">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div>
            <div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:4px">BWB QUALITY SCORE</div>
            <div class="bwb-grade" style="color:${bwbScore.gradeColor}">${bwbScore.grade}</div>
            <div style="font-size:11px;color:${bwbScore.gradeColor};margin-top:2px">${bwbScore.gradeLabel}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:28px;font-weight:800;font-family:'Syne',sans-serif;color:${bwbScore.gradeColor}">${bwbScore.score}</div>
            <div style="font-size:9px;color:var(--muted)">/ 100</div>
          </div>
        </div>
        ${bwbScore.notes.map(n=>`<div class="bwb-row"><span style="color:var(--dim)">${n}</span></div>`).join('')}
        <div style="margin-top:10px" class="g3">
          ${mc2('CREDIT/MAX LOSS',`${bwbScore.crRatio}%`,bwbScore.crRatio>=20?'#00e676':bwbScore.crRatio>=12?'#ffd600':'#ff1744')}
          ${mc2('BE CUSHION',beCushion!==null?`${beCushion}%`:'N/A',beCushion!==null?cush(beCushion):'var(--muted)')}
          ${mc2('MAX LOSS',bwbInfo?`$${bwbInfo.maxLoss.toFixed(0)}`:'N/A','var(--text)')}
        </div>
        ${bwbInfo?`<div style="font-size:10px;color:var(--dim);margin-top:8px;line-height:1.6">Upper width: $${bwbInfo.upperWidth} · Lower width: $${bwbInfo.lowerWidth} · Breakeven: $${be}</div>`:''}
      </div>`;
    }
    html+=`<div class="g2">
      ${mc2('DELTA',absDelta!==null?absDelta.toFixed(3):'N/A',absDelta?(absDelta<=0.28?'#00e676':'#ffd600'):'var(--muted)')}
      ${mc2('CUSHION TO SHORT',cushionPct!==null?`${cushionPct}%`:'N/A',cushionPct!==null?cush(cushionPct):'var(--muted)')}
      ${mc2('LIVE PRICE',price?`$${price}`:'N/A','var(--text)')}
      ${mc2('DTE',dte!==null?`${dte}d`:'N/A',dte&&dte>=14&&dte<=21?'#00e676':dte&&dte<14?'#ffd600':'var(--dim)')}
      ${mc2('HV30',`${(hv30*100).toFixed(1)}%`,'var(--dim)')}
      ${mc2('EARNINGS',earningsRisk?`⚠ ${earningsDate}`:(earningsDate?`✓ ${earningsDate}`:'✓ CLEAR'),earningsRisk?'#ff1744':'#00e676')}
    </div>
    <div style="padding:7px 11px;margin-bottom:12px;border-radius:6px;font-size:9px;${deltaSource==='Yahoo'?'background:rgba(0,230,118,.08);color:#00e676;border:1px solid rgba(0,230,118,.2)':'background:rgba(255,214,0,.08);color:#ffd600;border:1px solid rgba(255,214,0,.2)'}">
      <span class="${deltaSource==='Yahoo'?'real-tag':'est'}">${deltaSource==='Yahoo'?'REAL':'EST'}</span> ${deltaSource==='Yahoo'?'Delta from Yahoo Finance options chain.':'Delta estimated via HV30. Use as screening estimate only — broker delta may differ materially on high-IV or skewed names.'}
    </div>`;
    if(supBelow.length>0){
      html+=`<div class="card">
        <span class="lbl">KEY LEVELS — REAL PRICE DATA</span>
        <div style="display:flex;gap:24px;margin-bottom:10px">
          <div><div style="font-size:9px;color:#00e676;letter-spacing:1px;margin-bottom:6px">SUPPORT</div>${supBelow.map(p=>`<div style="font-size:16px;font-weight:700;color:#00e676;font-family:'DM Mono',monospace">$${p}</div>`).join('')}</div>
          <div><div style="font-size:9px;color:#ff1744;letter-spacing:1px;margin-bottom:6px">RESISTANCE</div>${(data?.resistances||[]).map(p=>`<div style="font-size:16px;font-weight:700;color:#ff1744;font-family:'DM Mono',monospace">$${p}</div>`).join('')}</div>
        </div>
        ${exitSignal?`<div style="padding:8px 11px;background:rgba(255,23,68,.07);border-radius:7px;font-size:10px;color:#ff8a80;border:1px solid rgba(255,23,68,.15)">⚡ Exit signal — Close if ${ticker} breaks $${exitSignal}</div>`:''}
        <div style="font-size:10px;color:var(--dim);margin-top:8px">SMA20: $${data?.sma20||'N/A'} · SMA50: $${data?.sma50||'N/A'}</div>
      </div>`;
    }
    html+=`<button class="btn btn-og btn-w" onclick="logFromAnalysis()">✓ I TOOK THIS TRADE — LOG IT</button>`;
    $('az-result').innerHTML=html;
  }catch(e){
    $('az-result').innerHTML=`<p style="color:var(--red);font-size:11px;padding:12px">Fetch failed: ${e.message}</p>`;
  }finally{$('az-btn').disabled=false;$('az-btn').textContent='→ ANALYZE';}
}

function logFromAnalysis(){
  if(!azResult)return;
  formStrat=azResult.strategy||'PUT CREDIT SPREAD';
  formLegs=azResult.legs||DEF[formStrat].map(l=>({...l}));
  nav('trades');
  setTimeout(()=>{
    const tog=$('tfm-tog');
    if(tog&&$('tfm')?.style.display==='none')tog.click();
    setTimeout(()=>{
      if($('tf-tk'))$('tf-tk').value=azResult.ticker||'';
      if($('tf-px'))$('tf-px').value=azResult.price?.toFixed(2)||'';
      if($('tf-exp'))$('tf-exp').value=azResult.exp||'';
      if($('tf-cr'))$('tf-cr').value=azResult.credit?.toString()||'';
      if($('tf-col'))$('tf-col').value=azResult.collateral?.toFixed(0)||'';
      if($('tf-exit'))$('tf-exit').value=azResult.exitSignal?.toString()||'';
      if($('tf-notes'))$('tf-notes').value=`Delta:${azResult.absDelta?.toFixed(3)||'?'} (${azResult.deltaSource}) HV30:${(azResult.hv30*100).toFixed(1)}%${azResult.earningsRisk?' ⚠ Earnings:'+azResult.earningsDate:''}${azResult.bwbScore?' BWB:'+azResult.bwbScore.grade:''}`;

}

        ${mc2('COLLATERAL',`$${t.maxRisk||'?'}`,'var(--text)')}
      </div>
      ${t.notes?`<div style="font-size:10px;color:var(--dim);margin-bottom:8px;padding:6px 10px;background:var(--deep);border-radius:6px">${t.notes}</div>`:''}
      ${t.exitSignal?`<div style="padding:6px 10px;background:rgba(255,23,68,.06);border-radius:6px;font-size:10px;color:#ff8a80;margin-bottom:8px;border:1px solid rgba(255,23,68,.12)">⚡ Exit if ${t.ticker} breaks $${t.exitSignal}</div>`:''}
      <div style="display:flex;gap:6px">
        <input type="number" placeholder="Current P&L %" value="${t.currentPnlPct||''}" onblur="updPnl(${t.id},this.value)" style="flex:1;color:${pnl>=40?'#00e676':pnl<-15?'#ff1744':'var(--text)'}">
        <button onclick="closeT(${t.id},'PROFIT')" style="padding:7px 12px;background:rgba(0,230,118,.15);border:1px solid rgba(0,230,118,.3);border-radius:7px;color:#00e676;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer">✓ WIN</button>
        <button onclick="closeT(${t.id},'STOP')" style="padding:7px 12px;background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.3);border-radius:7px;color:#ff1744;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer">✗ LOSS</button>
        <button onclick="delT(${t.id})" style="padding:7px 10px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer">🗑</button>
      </div>
    </div>`;
  });

  if(recent.length>0){html+=`<div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin:24px 0 10px">RECENTLY CLOSED</div>`;recent.forEach(t=>html+=closedRow(t));}
  if(old.length>0){
    html+=`<button class="btn btn-ghost btn-w" style="margin-top:10px;font-size:10px" onclick="showHistory=!showHistory;renderTrades()">${showHistory?'▲ HIDE':'▼ SHOW'} OLDER TRADES (${old.length})</button>`;
    if(showHistory)old.forEach(t=>html+=closedRow(t));
  }
  $('t-trades').innerHTML=html;
  formLegs=DEF[formStrat].map(l=>({...l}));renderLegs();
}

function closedRow(t){
  const pnl=parseFloat(t.currentPnlPct)||0;
  return`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--deep);border-radius:9px;margin-bottom:7px;opacity:.8">
    <div style="flex:1"><span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--dim);margin-right:8px">${t.ticker}</span><span style="font-size:10px;color:var(--muted)">${t.strategy}</span>${t.expDate?`<div style="font-size:9px;color:var(--muted);margin-top:2px">${t.expDate}</div>`:''}</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:13px;font-weight:700;color:${pnl>0?'#00e676':'#ff1744'}">${pnl>0?'+':''}${pnl}%</span>
      <span class="chip" style="background:${t.closeReason==='PROFIT'?'rgba(0,230,118,.12)':'rgba(255,23,68,.12)'};color:${t.closeReason==='PROFIT'?'#00e676':'#ff1744'}">${t.closeReason}</span>
      <button onclick="delT(${t.id})" style="background:transparent;border:none;color:var(--muted);cursor:pointer;padding:2px 6px">✕</button>
    </div>
  </div>`;
}

function toggleForm(){
  const f=$('tfm'),tog=$('tfm-tog');const show=f.style.display==='none';
  f.style.display=show?'block':'none';tog.textContent=show?'CANCEL':'+ LOG TRADE';
  tog.style.background=show?'#1e2535':'var(--green)';tog.style.color=show?'var(--muted)':'var(--bg)';
  if(show)renderLegs();
}
function selectStrat(s){
  formStrat=s;formLegs=DEF[s].map(l=>({...l}));
  document.querySelectorAll('.sp').forEach(p=>p.classList.toggle('active',p.textContent===s));
  renderLegs();autoCol();
}
function renderLegs(){
  const c=$('lc');if(!c)return;
  c.innerHTML=formLegs.map((leg,i)=>`
    <div class="leg-row ${leg.a==='SELL'?'sell':'buy-l'}">
      <select onchange="updateLeg(${i},'a',this.value)" style="background:#1e2535;border:none;color:${leg.a==='SELL'?'#ff1744':'#00e676'};font-family:'DM Mono',monospace;font-size:11px;font-weight:700;outline:none;padding:4px 6px;border-radius:4px;cursor:pointer;min-width:52px">
        <option ${leg.a==='SELL'?'selected':''}>SELL</option><option ${leg.a==='BUY'?'selected':''}>BUY</option>
      </select>
      <input type="number" value="${leg.n}" min="1" max="20" onchange="updateLeg(${i},'n',parseInt(this.value)||1);autoCol()" style="width:44px;text-align:center;padding:5px;background:#1e2535;border:1px solid #2d3748;border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none">
      <span style="color:var(--muted);font-size:10px">×</span>
      <select onchange="updateLeg(${i},'t',this.value)" style="background:#1e2535;border:none;color:var(--dim);font-family:'DM Mono',monospace;font-size:11px;outline:none;padding:4px 6px;border-radius:4px;cursor:pointer">
        <option ${leg.t==='PUT'?'selected':''}>PUT</option><option ${leg.t==='CALL'?'selected':''}>CALL</option>
      </select>
      <input type="number" value="${leg.s}" placeholder="Strike $" step="0.5" onchange="updateLeg(${i},'s',this.value);autoCol()" style="flex:1;padding:5px 8px;background:#1e2535;border:1px solid #2d3748;border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none">
      ${formLegs.length>1?`<button onclick="removeLeg(${i})" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 4px">×</button>`:''}
    </div>`).join('');
}
function updateLeg(i,f,v){formLegs[i][f]=v;}
function addLeg(){formLegs.push({a:'BUY',t:'PUT',n:1,s:''});renderLegs();}
function removeLeg(i){formLegs.splice(i,1);renderLegs();}
function autoCol(){
  const cr=parseFloat($('tf-cr')?.value)||0;
  const col=calcCollateral(formStrat,formLegs,cr);
  const el=$('tf-col');if(el&&col>0)el.value=col.toFixed(0);
}
function submitTrade(){
  const ticker=$('tf-tk')?.value?.trim()?.toUpperCase();
  if(!ticker){alert('Enter a ticker');return;}
  const stock=parseFloat($('tf-px')?.value)||0,credit=parseFloat($('tf-cr')?.value)||0,collateral=parseFloat($('tf-col')?.value)||0;
  const expRaw=$('tf-exp')?.value||'';
  const shortLeg=formLegs.find(l=>l.a==='SELL');
  const strike=parseFloat(shortLeg?.s)||0;
  const be=strike>0&&credit>0?parseFloat((strike-credit).toFixed(2)):null;
  const cushionPct2=stock>0&&be?parseFloat(((stock-be)/stock*100).toFixed(1)):null;
  let dte=null;
  if(expRaw){const p=expRaw.split('/');if(p.length===3){const ed=new Date(`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}T16:00:00`);dte=Math.max(0,Math.ceil((ed-new Date())/86400000));}}
  trades.unshift({
    id:Date.now(),ticker,strategy:formStrat,legs:formLegs.map(l=>({...l})),
    expDate:expRaw,dteOpen:$('tf-dte')?.value||dte?.toString()||'',
    creditReceived:credit.toString(),maxRisk:collateral.toString(),
    stockAtOpen:stock.toString(),exitSignal:$('tf-exit')?.value||'',
    notes:$('tf-notes')?.value||'',openDate:new Date().toISOString().slice(0,10),
    breakeven:be,cushionPct:cushionPct2,status:'OPEN',currentPnlPct:'',closeReason:''
  });
  saveTrades();toast('Trade logged!');renderTrades();
}
function updPnl(id,v){const t=trades.find(t=>t.id===id);if(t){t.currentPnlPct=v;saveTrades();}}
function closeT(id,r){const t=trades.find(t=>t.id===id);if(t){t.status='CLOSED';t.closeReason=r;t.closeDate=new Date().toISOString().slice(0,10);saveTrades();renderTrades();toast(`${t.ticker} closed — ${r}`);}}
function delT(id){if(confirm('Delete?')){trades=trades.filter(t=>t.id!==id);saveTrades();renderTrades();}}

// ── Stats Tab ──────────────────────────────────────────────────────────────────
function renderStats(){
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const open=trades.filter(t=>t.status==='OPEN');
  const nw=closed.filter(t=>parseFloat(t.currentPnlPct)>0).length;
  const nTotal=hist.totalTrades+closed.length,nWins=hist.wins+nw;
  const totalPnl=hist.realizedPnl+closed.reduce((acc,t)=>{const cr=parseFloat(t.creditReceived)||0;return acc+(cr*100*(parseFloat(t.currentPnlPct)||0)/100);},0);
  const wr=nTotal>0?((nWins/nTotal)*100).toFixed(1):hist.winPct.toFixed(1);
  const wrc=parseFloat(wr)>70?'#00e676':parseFloat(wr)>55?'#ffd600':'#ff1744';
  const colInUse=open.reduce((a,t)=>a+(parseFloat(t.maxRisk)||0),0);

  let html=`
    <span class="lbl">PERFORMANCE — ALL TIME</span>
    <div class="stat-h">
      <div class="sh"><div class="sh-v" style="color:${wrc}">${wr}%</div><div class="sh-l">WIN RATE</div><div class="wbar"><div class="wbar-f" style="width:${wr}%;background:${wrc}"></div></div></div>
      <div class="sh"><div class="sh-v">${nTotal}</div><div class="sh-l">TOTAL TRADES</div></div>
      <div class="sh"><div class="sh-v" style="color:#00e676">$${totalPnl.toFixed(0)}</div><div class="sh-l">REALIZED P&L</div></div>
    </div>
    <div class="g2">
      ${mc2('WINS / LOSSES',`${nWins} / ${nTotal-nWins}`,nWins>nTotal-nWins?'#00e676':'#ffd600')}
      ${mc2('PROFIT FACTOR',hist.profitFactor.toFixed(2),'#00e676')}
      ${mc2('AVG WIN %',`+${hist.avgWinPct}%`,'#00e676')}
      ${mc2('AVG LOSS %',`${hist.avgLossPct}%`,'#ff1744')}
      ${mc2('OPEN NOW',open.length,'var(--green)')}
      ${mc2('COLLATERAL IN USE',`$${colInUse.toFixed(0)}`,'var(--yellow)')}
    </div>`;

  // Full trade log
  html+=`<div class="card"><span class="lbl">TRADE LOG</span>
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--deep);border-radius:9px;margin-bottom:7px;border:1px solid rgba(0,230,118,.15)">
      <div style="flex:1">
        <span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--green);margin-right:8px">BASELINE</span>
        <span style="font-size:10px;color:var(--muted)">56 trades · 5 weeks pre-TradeWatch</span>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">76.4% win rate · $736 P&L · 2.84 profit factor</div>
      </div>
      <span style="font-size:13px;font-weight:700;color:#00e676">+$736</span>
    </div>`;
  [...closed,...open].sort((a,b)=>b.id-a.id).forEach(t=>{
    const pnl=parseFloat(t.currentPnlPct)||0;const isOpen=t.status==='OPEN';
    const cr=parseFloat(t.creditReceived)||0;const dp=isOpen?null:(cr*100*pnl/100);
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--deep);border-radius:9px;margin-bottom:6px;${isOpen?'border:1px solid rgba(0,230,118,.1)':'opacity:.8'}">
      <div style="flex:1">
        <span style="font-family:'Syne',sans-serif;font-weight:700;${isOpen?'color:var(--text)':'color:var(--dim)'};margin-right:8px">${t.ticker}</span>
        <span style="font-size:10px;color:var(--muted)">${t.strategy}</span>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">${t.expDate||''} ${isOpen?'· <span style="color:var(--green)">OPEN</span>':`· ${t.closeReason||'CLOSED'}`}</div>
      </div>
      <div style="text-align:right">
        ${isOpen?`<span class="badge" style="background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:var(--green)">OPEN</span>`:
          `<div style="font-size:13px;font-weight:700;color:${pnl>0?'#00e676':'#ff1744'}">${pnl>0?'+':''}${pnl}%</div>${dp!==null?`<div style="font-size:10px;color:var(--dim)">$${dp.toFixed(0)}</div>`:''}`}
      </div>
    </div>`;
  });
  html+=`</div>`;

  if(closed.length>0){
    const byS={};
    closed.forEach(t=>{
      const k=t.strategy||'UNKNOWN';const cr=parseFloat(t.creditReceived)||0;const col=parseFloat(t.maxRisk)||100;
      const pnl=parseFloat(t.currentPnlPct)||0;const roc=(cr*100*pnl/100)/col*100;
      const legs=t.legs||[];const sell=legs.find(l=>l.a==='SELL');const buy=legs.find(l=>l.a==='BUY');
      const w=sell&&buy?Math.abs((parseFloat(sell.s)||0)-(parseFloat(buy.s)||0)):0;
      if(!byS[k])byS[k]={wins:0,losses:0,roc:0,count:0,widths:[],cols:[]};
      if(pnl>0)byS[k].wins++;else byS[k].losses++;
      byS[k].roc+=roc;byS[k].count++;if(w>0)byS[k].widths.push(w);if(col>0)byS[k].cols.push(col);
    });
    html+=`<div class="card"><span class="lbl">BY STRATEGY</span>`;
    Object.entries(byS).forEach(([s,d])=>{
      const wr2=((d.wins/d.count)*100).toFixed(0);const ar=(d.roc/d.count).toFixed(1);
      const aw=d.widths.length?(d.widths.reduce((a,b)=>a+b,0)/d.widths.length).toFixed(1):'N/A';
      const ac=d.cols.length?(d.cols.reduce((a,b)=>a+b,0)/d.cols.length).toFixed(0):'N/A';
      const wc=parseInt(wr2)>=65?'#00e676':'#ffd600';
      html+=`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:12px">${s}</span>
          <div style="display:flex;gap:6px">
            <span class="chip" style="background:${wc}15;border:1px solid ${wc}35;color:${wc}">${wr2}% WIN</span>
            <span class="chip" style="background:rgba(136,146,164,.1);color:var(--muted)">${d.count}×</span>
          </div>
        </div>
        <div class="g3">${mc2('AVG WIDTH',aw!=='N/A'?`$${aw}`:'N/A','var(--text)')}${mc2('AVG COLLATERAL',ac!=='N/A'?`$${ac}`:'N/A','var(--text)')}${mc2('AVG ROC',`${parseFloat(ar)>0?'+':''}${ar}%`,parseFloat(ar)>0?'#00e676':'#ff1744')}</div>
        <div class="wbar"><div class="wbar-f" style="width:${wr2}%;background:${wc}"></div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`
    <div class="card"><span class="lbl">HISTORICAL BASELINE</span>
      <div style="font-size:11px;color:var(--dim);line-height:1.9;margin-bottom:12px">5 weeks · ${hist.totalTrades} trades · ${hist.winPct}% win rate · $${hist.realizedPnl} P&L · ${hist.profitFactor} profit factor<br>Avg winner: +${hist.avgWinPct}% · Avg loser: ${hist.avgLossPct}%</div>
      <button class="btn btn-ghost" onclick="editHist()" style="width:auto;padding:7px 14px;font-size:10px">EDIT NUMBERS</button>
    </div>
    <div class="card" id="cc"><span class="lbl">AI COACHING</span>
      <div style="font-size:10px;color:var(--muted);margin-bottom:10px">Note: coaching requires Claude API access. Works in the Claude.ai artifact viewer; may not work on GitHub Pages until backend is set up.</div>
      <button class="btn btn-purple btn-w" onclick="getCoaching()">✦ GENERATE COACHING INSIGHT</button>
      <div id="co" style="margin-top:12px;font-size:12px;color:#c8d0dc;line-height:1.8"></div>
    </div>`;
  $('t-stats').innerHTML=html;
}

function editHist(){
  const inp=prompt(`Edit:\ntotalTrades,wins,losses,realizedPnl,winPct,avgWinPct,avgLossPct,profitFactor\nCurrent: ${hist.totalTrades},${hist.wins},${hist.losses},${hist.realizedPnl},${hist.winPct},${hist.avgWinPct},${hist.avgLossPct},${hist.profitFactor}`);
  if(!inp)return;
  const p=inp.split(',');
  if(p.length>=8){hist={totalTrades:+p[0],wins:+p[1],losses:+p[2],realizedPnl:+p[3],winPct:+p[4],avgWinPct:+p[5],avgLossPct:+p[6],profitFactor:+p[7]};saveHist();renderStats();toast('Updated!');}
}

async function getCoaching(){
  const btn=document.querySelector('#cc .btn-purple');
  if(btn){btn.disabled=true;btn.textContent='ANALYZING...';}
  const closed=trades.filter(t=>t.status==='CLOSED'&&t.currentPnlPct!=='');
  const summary=closed.length>0?closed.map(t=>`${t.ticker} ${t.strategy} legs:${(t.legs||[]).map(l=>`${l.a}${l.n}x$${l.s}${l.t}`).join('/')} col:$${t.maxRisk} cr:$${t.creditReceived} pnl:${t.currentPnlPct}% ${t.closeReason}`).join('\n'):'No new trades yet.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        messages:[{role:'user',content:`Options trading coach. Trader: ${hist.totalTrades} trades, ${hist.winPct}% win rate, $${hist.realizedPnl} P&L, ${hist.profitFactor} profit factor. Uses put credit spreads and BWBs for high upfront credit, 14-21 DTE, closes 40-60% profit, .18-.28 delta, 5-8% cushion to breakeven.\n\nNew trades:\n${summary}\n\nGive 3 specific actionable insights. Plain text, 3 paragraphs, no markdown.`}]})
    });
    const d=await resp.json();
    $('co').textContent=d.content?.map(c=>c.text||'').join('')||'No response.';
  }catch(e){$('co').textContent='Unavailable on GitHub Pages — needs backend. Try from Claude.ai artifact.';}
  finally{if(btn){btn.disabled=false;btn.textContent='↺ REGENERATE';}}
}

// ── Init ───────────────────────────────────────────────────────────────────────
$('hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
if(!localStorage.getItem(HK))saveHist();
loadSignal();
renderAnalyze();
</script>
</body>
</html>
